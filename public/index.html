<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0f14;
  --bg2:rgba(22,27,34,0.7);
  --bg3:#161b22;
  --bg4:#21262d;

  --text:#e6edf3;
  --text2:#9aa4af;
  --text3:#6b7280;

  --border:#2a2f36;
  --border2:#3a4048;

  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --blue:#3b82f6;
  --purple:#a855f7;

  --accent:#2563eb;

  --radius:10px;
  --radius-lg:14px;

  --shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BASE */
body{
  font-family:Inter,system-ui,-apple-system;
  background:linear-gradient(180deg,#0b0f14,#090c10);
  color:var(--text);
  font-size:13px;
}

/* TOPBAR (GLASS EFFECT) */
.topbar{
  backdrop-filter:blur(12px);
  background:rgba(13,17,23,0.7);
  border-bottom:1px solid var(--border);
  height:56px;
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.logo{
  font-weight:700;
  font-size:16px;
  letter-spacing:-0.3px;
}

/* MODE TABS (MODERN PILLS) */
.mode-tabs{
  display:flex;
  gap:6px;
  background:#0f141a;
  padding:4px;
  border-radius:999px;
  border:1px solid var(--border);
}

.mode-tab{
  padding:6px 14px;
  border-radius:999px;
  border:none;
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  transition:all .25s ease;
  font-size:12px;
}

.mode-tab:hover{
  background:#1a222c;
  color:#fff;
}

.mode-tab.active{
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  color:#fff;
  box-shadow:0 4px 12px rgba(59,130,246,0.4);
}

/* MAIN */
.main{
  padding:20px;
}

/* STAT CARDS (PREMIUM) */
.sc{
  background:linear-gradient(180deg,#11161c,#0f141a);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px;
  transition:all .25s ease;
  box-shadow:var(--shadow);
}

.sc:hover{
  transform:translateY(-4px);
  border-color:#4b5563;
}

.sc .l{
  font-size:11px;
  color:var(--text3);
  margin-bottom:6px;
}

.sc .v{
  font-size:22px;
  font-weight:700;
}

/* TABLE */
.tw{
  border-radius:var(--radius-lg);
  overflow:hidden;
  border:1px solid var(--border);
}

table{
  width:100%;
  border-collapse:collapse;
  background:#0f141a;
}

thead{
  position:sticky;
  top:0;
  background:#11161c;
}

th{
  padding:12px;
  font-size:11px;
  color:var(--text3);
}

td{
  padding:12px;
}

tbody tr:nth-child(even){
  background:#0d1217;
}

tbody tr:hover{
  background:#1a222c;
  transition:.2s;
}

/* POSITION CARDS */
.pos-card{
  background:linear-gradient(180deg,#11161c,#0d1217);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px;
  margin-bottom:12px;
  transition:all .25s ease;
}

.pos-card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.pos-card.up{border-left:4px solid var(--green)}
.pos-card.down{border-left:4px solid var(--red)}

/* PROGRESS BAR */
.prog-bar{
  height:5px;
  border-radius:4px;
  background:#222;
}

.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--amber),var(--green));
}

/* BUTTONS */
.btn{
  border-radius:8px;
  padding:6px 14px;
  background:#11161c;
  border:1px solid var(--border);
  color:var(--text);
  transition:all .2s ease;
}

.btn:hover{
  transform:scale(1.05);
  background:#1a222c;
}

.btn-primary{
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  border:none;
  color:#fff;
}

.btn-primary:hover{
  box-shadow:0 4px 14px rgba(59,130,246,0.5);
}

/* INPUTS */
input,select{
  background:#0f141a;
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 12px;
}

input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

/* FILTER PILLS */
.fpill{
  border-radius:999px;
  padding:4px 12px;
  border:1px solid var(--border);
  color:var(--text2);
  transition:all .2s;
}

.fpill.active{
  background:var(--blue);
  color:#fff;
}

/* SMOOTH SCROLL */
*{
  scroll-behavior:smooth;
}
</style>
