<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --border:#30363d;--border2:#444c56;
  --green:#3fb950;--green-bg:#0d2818;--green-text:#3fb950;
  --red:#f85149;--red-bg:#2d1117;--red-text:#f85149;
  --amber:#d29922;--amber-bg:#272115;--amber-text:#d29922;
  --blue:#58a6ff;--blue-bg:#0c2041;--blue-text:#58a6ff;
  --purple:#bc8cff;--purple-bg:#1f1535;--purple-text:#bc8cff;
  --teal:#39d353;--accent:#1f6feb;
  --text4:#484f58;--border3:#21262d;
  --amber-bright:#f59e0b;--emerald:#10b981;
  /* Conviction tier tokens */
  --tier-strong-buy-bg:#0d2818;--tier-strong-buy-text:#3fb950;--tier-strong-buy-border:#1a4428;
  --tier-buy-bg:#0c1f0e;--tier-buy-text:#57ab5a;--tier-buy-border:#1a3a1c;
  --tier-accumulate-bg:#272115;--tier-accumulate-text:#d29922;--tier-accumulate-border:#3d2e0f;
  --tier-watch-bg:#1c1c24;--tier-watch-text:#8b949e;--tier-watch-border:#30363d;
  --tier-avoid-bg:#2d1117;--tier-avoid-text:#f85149;--tier-avoid-border:#4a1a1a;
  --radius:6px;--radius-lg:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:"SF Pro Text","Inter",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex;flex-direction:column}

/* -- LAYOUT -- */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;height:44px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;z-index:200;
}
.logo{font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pdot 2s infinite;flex-shrink:0}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.4)}70%{box-shadow:0 0 0 6px transparent}}

/* -- MODE SWITCHER -- */
.mode-tabs{display:flex;gap:1px;background:var(--bg3);border-radius:var(--radius);padding:2px;border:1px solid var(--border)}
.mode-tab{padding:4px 12px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border-radius:4px;font-family:inherit;transition:all .15s;letter-spacing:-.1px}
.mode-tab:hover{color:var(--text);background:var(--bg4)}
.mode-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.4)}
.mode-tab.stocks.active{color:var(--blue)}
.mode-tab.crypto.active{color:var(--purple)}
.mode-tab#mode-mf.active{color:var(--green)}
.mode-tab.stockrec.active{color:#f59e0b}

/* -- HEADER STATS -- */
.hstat{text-align:right}
.hstat .l{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;font-weight:500}
.hstat .v{font-weight:600;font-size:13px;letter-spacing:-.2px;margin-top:1px}

/* -- MARKET BADGE -- */
@keyframes mfpulse{0%,100%{opacity:.3}50%{opacity:.9}}
.mkt-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green);border:1px solid #1a4428;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;letter-spacing:.2px}
.mkt-badge::before{content:"";width:5px;height:5px;background:var(--green);border-radius:50%;display:inline-block;animation:pdot 2s infinite}

/* -- SUBTABS -- */
.subtabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;flex-shrink:0;z-index:199;
}
.subtabs::-webkit-scrollbar{display:none}
.stab{
  padding:0 14px;height:38px;border:none;background:transparent;
  cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);
  border-bottom:2px solid transparent;font-family:inherit;
  white-space:nowrap;transition:all .15s;letter-spacing:-.1px;
}
.stab:hover{color:var(--text)}
.stab.stocks-active{border-bottom-color:var(--blue);color:var(--blue)}
.stab.crypto-active{border-bottom-color:var(--purple);color:var(--purple)}

/* -- MAIN CONTENT -- */
.main{padding:16px 20px;flex:1;overflow-y:auto;overflow-x:hidden}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* -- STAT CARDS -- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.sc{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:12px 14px;
  transition:border-color .15s;
}
.sc:hover{border-color:var(--border2)}
.sc .l{font-size:10px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.sc .v{font-weight:700;font-size:18px;letter-spacing:-.5px;line-height:1}
.sc .s{font-size:10px;color:var(--text3);margin-top:4px}

/* -- TABLES -- */
.tw{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg2)}
thead{background:var(--bg3)}
th{
  padding:8px 12px;text-align:left;font-size:11px;font-weight:600;
  color:var(--text3);border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none;letter-spacing:.4px;text-transform:uppercase;
}
th:hover{color:var(--text2)}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}

/* -- PILLS -- */
.pill{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.1px}
.conviction-pill{display:inline-flex;align-items:center;border-radius:4px;padding:2px 10px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.1px;border:1px solid}
.conviction-pill.strong-buy{background:var(--tier-strong-buy-bg);color:var(--tier-strong-buy-text);border-color:var(--tier-strong-buy-border)}
.conviction-pill.buy{background:var(--tier-buy-bg);color:var(--tier-buy-text);border-color:var(--tier-buy-border)}
.conviction-pill.accumulate{background:var(--tier-accumulate-bg);color:var(--tier-accumulate-text);border-color:var(--tier-accumulate-border)}
.conviction-pill.watch{background:var(--tier-watch-bg);color:var(--tier-watch-text);border-color:var(--tier-watch-border)}
.conviction-pill.avoid{background:var(--tier-avoid-bg);color:var(--tier-avoid-text);border-color:var(--tier-avoid-border)}
.horizon-pill{display:inline-flex;align-items:center;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;white-space:nowrap;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.horizon-pill.intraday{color:var(--purple);border-color:var(--purple-bg)}
.horizon-pill.swing{color:var(--blue);border-color:var(--blue-bg)}
.horizon-pill.positional{color:var(--green);border-color:var(--green-bg)}
.score-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--bg4);gap:1px}
.score-bar .seg{height:100%;transition:width .4s}
.score-bar .seg.fa{background:var(--blue)}
.score-bar .seg.ta{background:var(--green)}
.score-bar .seg.mom{background:var(--amber)}
.score-bar .seg.risk{background:var(--purple)}
.risk-banner{background:var(--amber-bg);color:var(--amber-text);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}
.risk-banner.danger{background:var(--red-bg);color:var(--red-text);border-bottom-color:var(--red)}
.pg{background:var(--green-bg);color:var(--green-text);border:1px solid #1a4428}
.pr{background:var(--red-bg);color:var(--red-text);border:1px solid #4a1a1a}
.pa{background:var(--amber-bg);color:var(--amber-text);border:1px solid #3d2e0f}
.pb{background:var(--blue-bg);color:var(--blue-text);border:1px solid #0c2d5e}
.pp{background:var(--purple-bg);color:var(--purple-text);border:1px solid #2d1a5e}
.pgr{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* -- POSITION CARDS -- */
.pos-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;
  transition:border-color .15s;
}
.pos-card.up{border-left:3px solid var(--green)}
.pos-card.down{border-left:3px solid var(--red)}
.pos-mini-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:6px;margin:10px 0}
.pos-cell{background:var(--bg3);border-radius:var(--radius);padding:7px 10px;border:1px solid var(--border)}
.pos-cell .l{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.pos-cell .v{font-weight:600;font-size:12px;color:var(--text)}
.prog-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:8px 0 3px}
.prog-fill{height:100%;border-radius:2px;transition:width .6s}
.prog-fill.positive{background:var(--green)}
.prog-fill.negative{background:var(--red)}

/* -- BUTTONS & INPUTS -- */
.btn{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius);padding:5px 12px;cursor:pointer;
  font-size:12px;font-weight:500;font-family:inherit;color:var(--text2);
  transition:all .15s;
}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--text3)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#1a5fc4;border-color:#1a5fc4;color:#fff}
input,select{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius);padding:6px 10px;font-size:12px;
  font-family:inherit;color:var(--text);outline:none;
  transition:border-color .15s;
}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,111,235,.15)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg3)}

/* -- FILTER PILLS -- */
.fr{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fpill{
  border-radius:20px;padding:3px 11px;font-size:11px;font-weight:500;
  border:1px solid var(--border2);background:transparent;
  cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;
}
.fpill:hover{border-color:var(--text3);color:var(--text)}
.fpill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* -- NEWS CARDS -- */
.news-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;margin-bottom:8px;
  transition:border-color .15s;
}
.news-card:hover{border-color:var(--border2)}
.news-card.bull{border-left:3px solid var(--green)}
.news-card.bear{border-left:border-left:3px solid var(--red)}

/* -- MISC -- */
.sec-title{font-weight:600;font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.empty{text-align:center;padding:48px 0;color:var(--text3);font-size:13px}
.empty::before{content:"—";display:block;font-size:32px;margin-bottom:8px;color:var(--border2)}
@keyframes sh{0%,100%{opacity:.2}50%{opacity:.5}}.sh{animation:sh 1.6s infinite;background:var(--bg3);border-radius:var(--radius)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.pulsing{animation:pulse 1.5s infinite}
.chart-wrap{position:relative;height:180px;margin-bottom:16px}
.divider{height:1px;background:var(--border);margin:14px 0}
.section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}

/* -- SCROLLBARS -- */
*::-webkit-scrollbar{width:4px;height:4px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* -- CANDLESTICK CHART CONTAINER -- */
#kite-chart-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px}
#tv-frame{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}

/* -- RESPONSIVE -- */
@media(max-width:768px){
  .hstat{display:none}
  .mf-full-table{display:none}
  .mf-mobile-cards{display:block}
}
@media(max-width:600px){
  .topbar{padding:0 12px;gap:8px}
  .main{padding:12px}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}
  .mode-tab{padding:4px 8px;font-size:11px}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <div style="font-size:40px;margin-bottom:12px">📈</div>
    <div style="font-weight:800;font-size:22px;margin-bottom:4px;color:var(--text)">ProTrader</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:28px">Sign in to continue</div>
    <input id="login-username" type="text" placeholder="Username" autocomplete="username"
      style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:10px"
      onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()"/>
    <input id="login-password" type="password" placeholder="Password" autocomplete="current-password"
      style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:10px"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <div id="login-error" style="display:none;color:var(--red);font-size:11px;margin-bottom:10px"></div>
    <button onclick="doLogin()" id="login-btn" style="width:100%;padding:11px;background:var(--blue);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;margin-bottom:12px">Sign In</button>
    <div style="font-size:10px;color:var(--text4)">Contact admin for access</div>
  </div>
</div>

<div id="app" style="display:none">
<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><span class="logo-dot"></span>ProTrader</div>
  <span id="market-badge" class="mkt-badge" style="display:none">NSE Open</span>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('mf')" id="mode-mf">MF Picks</button>
    <button class="mode-tab stockrec" onclick="setMode('stockrec')" id="mode-stockrec">Stock Picks</button>
    <button class="mode-tab stocks" onclick="setMode('stocks')" id="mode-stocks">Stocks RoboTrade</button>
    <button class="mode-tab crypto" onclick="setMode('crypto')" id="mode-crypto">Crypto RoboTrade</button>
    <button class="mode-tab" onclick="setMode('psuggest')" id="mode-psuggest" style="background:linear-gradient(135deg,#0a1a2e,#0a0f1e);color:#22d3ee;border-color:#22d3ee40">💼 Portfolio</button>
    <button class="mode-tab" onclick="setMode('stockdata')" id="mode-stockdata" style="color:#a78bfa">📊 Stock Data</button>
    <button class="mode-tab" onclick="setMode('admin')" id="mode-admin" style="color:#64748b;font-size:11px">⚙</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:20px;flex-wrap:wrap;align-items:center" id="topbar-stats"></div>
  <div style="display:flex;gap:8px;align-items:center;margin-left:12px;flex-shrink:0">
    <span id="user-badge" style="font-size:11px;color:var(--text3)"></span>
    <button id="logout-btn" onclick="doLogout()" style="font-size:11px;padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--red);cursor:pointer;font-weight:600;display:none" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">Logout</button>
  </div>
</div>
<!-- SUB TABS -->
<div class="subtabs" id="subtabs"></div>
<!-- MAIN -->
<div class="main" id="main-content"></div>
</div>

async function toggleTradingMode(){
  const goingLive = S.tradingMode !== 'LIVE';
  if(goingLive){
    const ok = confirm('⚠️ SWITCH TO LIVE TRADING?\n\nThis will place REAL orders on Kite Connect using real money.\n\n• BUY orders will be placed as LIMIT orders\n• SELL orders will be placed as MARKET orders\n• All trades will use your Kite account balance\n\nAre you sure you want to enable LIVE trading?');
    if(!ok) return;
  }
  try {
    const r = await fetch('/api/trading-mode', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ live: goingLive })
    });
    const d = await r.json();
    if(!r.ok){ alert('❌ ' + (d.error || 'Failed to toggle trading mode')); return; }
    S.tradingMode = d.mode || 'PAPER';
    renderTopBar();
    render();
  } catch(e){ alert('❌ Network error: ' + e.message); }
}

async function fetchAll(){
  try {
    const rs = await Promise.allSettled([
      fetch("/health"),fetch("/prices"),fetch("/paper-trades"),
      fetch("/paper-trades/stats"),fetch("/paper-trades/daily"),
      fetch("/scan-log"),fetch("/holdings"),fetch("/margin"),
    ]);
    if(rs[0].status==="fulfilled"&&rs[0].value.ok) S.health = await rs[0].value.json();
    if(rs[1].status==="fulfilled"&&rs[1].value.ok) S.prices = await rs[1].value.json();
    if(rs[2].status==="fulfilled"&&rs[2].value.ok){const d=await rs[2].value.json();if(Array.isArray(d))S.nseTrades=d;}
    if(rs[3].status==="fulfilled"&&rs[3].value.ok) S.nseStats = await rs[3].value.json();
    if(rs[4].status==="fulfilled"&&rs[4].value.ok){const d=await rs[4].value.json();if(Array.isArray(d))S.daily=d;}
    if(rs[5].status==="fulfilled"&&rs[5].value.ok){const d=await rs[5].value.json();if(Array.isArray(d))S.scanLog=d;}
    if(rs[6].status==="fulfilled"&&rs[6].value.ok){const d=await rs[6].value.json();if(Array.isArray(d))S.holdings=d;}
    if(rs[7].status==="fulfilled"&&rs[7].value.ok) S.margin = await rs[7].value.json();
  } catch(e){}
  // Live trades + trading mode
  try {
    const lr = await Promise.allSettled([
      fetch("/live-trades"),fetch("/live-trades/stats"),fetch("/live-trades/daily"),fetch("/api/trading-mode"),
    ]);
    if(lr[0].status==="fulfilled"&&lr[0].value.ok){const d=await lr[0].value.json();if(Array.isArray(d))S.liveTrades=d;}
    if(lr[1].status==="fulfilled"&&lr[1].value.ok) S.liveStats = await lr[1].value.json();
    if(lr[2].status==="fulfilled"&&lr[2].value.ok){const d=await lr[2].value.json();if(Array.isArray(d))S.liveDaily=d;}
    if(lr[3].status==="fulfilled"&&lr[3].value.ok){const d=await lr[3].value.json();S.tradingMode=d.mode||'PAPER';}
  } catch(e){}
  // Crypto - optional
  try {
    const cr = await Promise.allSettled([fetch("/crypto/trades"),fetch("/crypto/trades/stats")]);
    if(cr[0].status==="fulfilled"&&cr[0].value.ok){const d=await cr[0].value.json();if(Array.isArray(d))S.cryptoTrades=d;}
    if(cr[1].status==="fulfilled"&&cr[1].value.ok) S.cryptoStats = await cr[1].value.json();
  } catch(e){}
  if(S.mode!=="mf" && S.mode!=="stockrec" && S.mode!=="psuggest" && S.mode!=="admin") render(); // preserve MF + StockRec + Portfolio + Admin tab content
}

var _hashUpdating = false;
function _updateHash(){
  var h = S.mode;
  if(S.mode==='stocks') h += '/' + S.stocksTab;
  else if(S.mode==='crypto') h += '/' + S.cryptoTab;
  if(location.hash !== '#'+h){
    _hashUpdating = true;
    history.replaceState(null, '', '#'+h);
    _hashUpdating = false;
  }
}
function _readHash(){
  var h = (location.hash||'').replace('#','');
  if(!h) return null;
  var parts = h.split('/');
  return { mode: parts[0], tab: parts[1] || null };
}

function setMode(mode){
  S.mode=mode;
  window._currentMode = mode;
  _updateHash();
  try{ document.getElementById("mode-stocks").className   ="mode-tab stocks"  +(mode==="stocks"  ?" active":""); }catch(e){}
  try{ document.getElementById("mode-crypto").className   ="mode-tab crypto"  +(mode==="crypto"  ?" active":""); }catch(e){}

  try{ document.getElementById("mode-psuggest").className ="mode-tab"      +(mode==="psuggest"?" active":""); }catch(e){}
  try{ document.getElementById("mode-stockdata").className="mode-tab"      +(mode==="stockdata"?" active":""); }catch(e){}
  try{ document.getElementById("mode-admin").className    ="mode-tab"         +(mode==="admin"    ?" active":""); }catch(e){}
  if(mode==="mf"){
    try{ document.getElementById("subtabs").innerHTML=""; }catch(e){}
    try{ renderTopBar(); }catch(e){ console.log("renderTopBar error:", e.message); }
    renderMFPage();
    return;
  }
  if(mode==="stockrec"){
    try{ document.getElementById("subtabs").innerHTML=""; }catch(e){}
    try{ renderTopBar(); }catch(e){ console.log("renderTopBar error:", e.message); }
    renderStockRec();
    return;
  }
  if(mode==="psuggest"){
    try{ document.getElementById("subtabs").innerHTML=""; }catch(e){}
    try{ renderTopBar(); }catch(e){}
    renderPortfolioSuggestion();
    return;
  }
  if(mode==="stockdata"){
    try{ document.getElementById("subtabs").innerHTML=""; }catch(e){}
    try{ renderTopBar(); }catch(e){}
    renderStockDataPage();
    return;
  }
  if(mode==="admin"){
    try{ document.getElementById("subtabs").innerHTML=""; }catch(e){}
    renderAdmin();

  // Stop admin log polling when leaving admin tab
  if(_adminLogTimer){ clearInterval(_adminLogTimer); _adminLogTimer=null; }
  if(_adminPollTimer){ clearInterval(_adminPollTimer); _adminPollTimer=null; }
  try{ renderSubTabs(); }catch(e){}
  render();
}

function setTab(tab){
  if(S.mode==="stocks") S.stocksTab = tab;

function renderSubTabs(){
  if(S.mode==="mf"){ document.getElementById("subtabs").innerHTML=""; return; }
  const tabs = S.mode==="stocks" ? STOCKS_TABS : CRYPTO_TABS;
  const current = S.mode==="stocks" ? S.stocksTab : S.cryptoTab;
  const activeClass = S.mode==="stocks" ? "stocks-active" : "crypto-active";

    `<button class="stab${current===t.id?" "+activeClass:""}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("");
}

function renderTopBar(){

  const nseOpen=(S.nseTrades||[]).filter(t=>t.status==="OPEN").length;

  const nw=+(ns.wins||0),nl=+(ns.losses||0),nwr=nw+nl>0?Math.round(nw/(nw+nl)*100):0;
  const cw=+(cs.wins||0),cl=+(cs.losses||0),cwr=cw+cl>0?Math.round(cw/(cw+cl)*100):0;
  const cash=m?.equity?.net?.available?.live_balance;
  const sl=(S.scanLog||[])[0];
  const mb=document.getElementById("market-badge");
  if(mb) mb.style.display=h.marketOpen?"inline-flex":"none";
  function stat(l,v,c){ return '<div class="hstat"><div class="l">'+l+'</div><div class="v"'+(c?' style="color:'+c+'"':'')+'>'+v+'</div></div>'; }
  const el=document.getElementById("topbar-stats");
  if(!el) return;
  if(S.mode==="stocks"){
    var ls=S.liveStats||{}, livePnL=+(ls.total_pnl||0), liveOpen=(S.liveTrades||[]).filter(t=>t.status==="OPEN").length;
    var isLive=S.tradingMode==='LIVE';
    var modeToggle=isLive
      ?'<button onclick="toggleTradingMode()" style="background:#ef4444;color:#fff;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;border:2px solid #dc2626;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s" onmouseover="this.style.background=\'#dc2626\'" onmouseout="this.style.background=\'#ef4444\'"><span style="font-size:7px">&#9679;</span> LIVE</button>'
      :'<button onclick="toggleTradingMode()" style="background:#1e3a5f;color:#60a5fa;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;border:2px solid #3b82f6;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s" onmouseover="this.style.background=\'#2d4a6f\'" onmouseout="this.style.background=\'#1e3a5f\'"><span style="font-size:7px">&#9679;</span> PAPER</button>';
    var testBuyBtn='<button onclick="testBuyOrder()" style="background:#0d9488;color:#fff;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;border:2px solid #14b8a6;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s;margin-left:6px" onmouseover="this.style.background=\'#14b8a6\'" onmouseout="this.style.background=\'#0d9488\'">🧪 Test Buy</button>';
    el.innerHTML=[
      '<div class="hstat" style="display:flex;gap:4px">'+modeToggle+testBuyBtn+'</div>',
      S.liveTrades.length>0?stat("Live P&L",(livePnL>=0?"+":"")+INR(livePnL.toFixed(0)),clr(livePnL)):"",
      S.liveTrades.length>0?stat("Live Open",liveOpen,""):"",
      stat("Paper P&L",(nsePnL>=0?"+":"")+INR(nsePnL.toFixed(0)),clr(nsePnL)),
      stat("Open",nseOpen,""),
      stat("Win Rate",nwr+"%",nwr>=55?"var(--green)":"var(--red)"),
      cash!=null?stat("Cash",INR(cash.toFixed(0)),""):"",
      sl?stat("Last Scan",new Date(sl.scanned_at).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})+" · "+(sl.regime||""),""):"",
    ].filter(Boolean).join("");
  } else if(S.mode==="stockrec"){
    el.innerHTML=[
      stat("Universe",(window._universeCount||252)+" stocks","var(--text2)"),
      stat("Criteria","100 pts","#f59e0b"),
      stat("Pillars","5 factors","#f59e0b"),
      stat("Scope","Long term","var(--green)"),
      stat("Data","Kite + Screener.in","var(--text2)"),
    ].join("");
  } else if(S.mode==="crypto"){
    el.innerHTML=[
      stat("Crypto P&L",(cryptoPnL>=0?"+":"")+INR(cryptoPnL.toFixed(0)),clr(cryptoPnL)),
      stat("Open",cryptoOpen,""),
      stat("Win Rate",cwr+"%",cwr>=55?"var(--green)":"var(--red)"),
      stat("Pairs",(CRYPTO_LIST||[]).length,"var(--purple)"),
      stat("Status","24/7","var(--purple)"),
    ].join("");
  } else {
    el.innerHTML=[
      stat("Universe",(S.mfTotal||"-")+" funds","var(--text2)"),
      stat("Criteria","100 pts","var(--text2)"),
      stat("Data","Live NAV","var(--green)"),
    ].join("");
  }
  // Phase 3: Risk banner for drawdown warnings
  const ddLevel = ns.drawdown_level || h.drawdown_level || 'NORMAL';
  let riskBanner = document.getElementById('risk-banner');
  if (!riskBanner) {
    riskBanner = document.createElement('div');
    riskBanner.id = 'risk-banner';
    const subtabs = document.getElementById('subtabs');
    if (subtabs) subtabs.parentNode.insertBefore(riskBanner, subtabs);
  }
  if (ddLevel === 'REDUCE') {
    riskBanner.className = 'risk-banner';
    riskBanner.innerHTML = '⚠ Drawdown Warning — Position sizes reduced 50%. Equity curve declining.';
    riskBanner.style.display = 'flex';
  } else if (ddLevel === 'PAUSE' || ddLevel === 'PAUSED') {
    riskBanner.className = 'risk-banner danger';
    riskBanner.innerHTML = '⛔ Trading Paused — Drawdown exceeded 15%. New entries blocked for 24h.';
    riskBanner.style.display = 'flex';
  } else if (ddLevel === 'HALT') {
    riskBanner.className = 'risk-banner danger';
    riskBanner.innerHTML = '🛑 TRADING HALTED — Drawdown exceeded 20%. All activity stopped.';
    riskBanner.style.display = 'flex';
  } else {
    riskBanner.style.display = 'none';
  }
  }catch(e){ console.log("renderTopBar err:",e.message); }
}

    +'<div style="width:32px;height:32px;border-radius:7px;background:'+(t.status==="OPEN"?"var(--amber-bg)":+(t.pnl||0)>=0?"var(--green-bg)":"var(--red-bg)")+';display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">'+(t.status==="OPEN"?"⏳":+(t.pnl||0)>=0?"↑":"↓")+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-weight:500">'+t.symbol+' <span style="font-size:11px;color:var(--text2);font-weight:400">×'+t.quantity+' · '+(t.strategy||"")+'</span></div>'
    +'<div style="font-size:11px;color:var(--text2)">'+fmtT(t.entry_time)+(t.exit_reason?" · "+t.exit_reason:"")+(t.order_id?' · <span style="color:var(--text4)">Order: '+t.order_id+'</span>':"")+'</div>'
    +'</div>'
    +'<div style="text-align:right">'+(t.status==="OPEN"
      ?'<div style="font-weight:500;color:'+clr(lp)+'">'+(lp>=0?"+":"")+INR(lp.toFixed(0))+'</div><div style="font-size:10px;color:var(--text3)">live</div>'
      :'<div style="font-weight:500;color:'+clr(t.pnl)+'">'+(+(t.pnl||0)>=0?"+":"")+INR(t.pnl)+'</div><div style="font-size:11px;color:'+clr(t.pnl_pct)+'">'+pc(t.pnl_pct)+'</div>')
    +'</div></div>';
}

function renderStocksOverview(){
  const ns=S.nseStats||{};
  const open=S.nseTrades.filter(t=>t.status==="OPEN");
  const pnl=+(ns.total_pnl||0);
  const nw=+(ns.wins||0),nl=+(ns.losses||0),wr=nw+nl>0?Math.round(nw/(nw+nl)*100):0;
  const openPnL=open.reduce((s,t)=>{const c=S.prices[t.symbol]?.price??t.price;return s+(c-t.price)*t.quantity;},0);

  const daily=S.daily.slice().reverse();
  let cum=0;
  const eLabels=[],eData=[];
  daily.forEach(d=>{cum+=+(+d.pnl);eLabels.push(d.date?.slice(5,10));eData.push(+cum.toFixed(0));});

  document.getElementById("main-content").innerHTML=`
    <div class="stat-grid">
      ${sc("Total P&L (closed)",`${pnl>=0?"+":""}${INR(pnl.toFixed(0))}`,clr(pnl),`${S.nseTrades.filter(t=>t.status==="CLOSED").length} closed trades`)}
      ${sc("Open P&L (live)",`${openPnL>=0?"+":""}${INR(openPnL.toFixed(0))}`,clr(openPnL),`${open.length} positions`)}
      ${sc("Win rate",`${wr}%`,wr>=55?"var(--green)":wr>=40?"var(--amber)":"var(--red)",`${nw}W / ${nl}L`)}
      ${sc("Avg win",`+${INR((+(ns.avg_win||0)).toFixed(0))}`,"var(--green)")}
      ${sc("Avg loss",INR((+(ns.avg_loss||0)).toFixed(0)),"var(--red)")}
      ${sc("Best trade",`+${INR((+(ns.best_trade||0)).toFixed(0))}`,"var(--green)")}
      ${sc("Sharpe ratio",ns.sharpe_ratio!=null?ns.sharpe_ratio.toFixed(2):"--",ns.sharpe_ratio>1?"var(--green)":ns.sharpe_ratio>0?"var(--amber)":"var(--red)","Risk-adj return")}
      ${sc("Sortino ratio",ns.sortino_ratio!=null?ns.sortino_ratio.toFixed(2):"--",ns.sortino_ratio>1.5?"var(--green)":ns.sortino_ratio>0?"var(--amber)":"var(--red)","Downside risk")}
      ${sc("Max drawdown",ns.max_drawdown!=null?ns.max_drawdown.toFixed(1)+"%":"--",ns.max_drawdown<5?"var(--green)":ns.max_drawdown<15?"var(--amber)":"var(--red)")}
      ${sc("Profit factor",ns.profit_factor!=null?ns.profit_factor.toFixed(2):"--",ns.profit_factor>1.5?"var(--green)":ns.profit_factor>1?"var(--amber)":"var(--red)","W/L ratio")}
      ${sc("Kelly %",ns.kelly_pct!=null?ns.kelly_pct+"%":"--","var(--blue)","Optimal bet size")}
      ${sc("Available cash",S.margin?.equity?.net?.available?.live_balance!=null?INR(S.margin.equity.net.available.live_balance.toFixed(0)):"-","var(--text)","Kite margin")}
      ${sc("Holdings value",INR(S.holdings.reduce((s,h)=>s+(h.last_price||h.average_price||0)*h.quantity,0).toFixed(0)),"var(--text)",`${S.holdings.length} stocks`)}
    </div>
    <div class="sec-title">Cumulative P&L</div>
    <div class="chart-wrap"><canvas id="equity-chart"></canvas></div>
    <div class="sec-title">Recent trades</div>
    <div id="recent-list"></div>`;

  // Equity chart
  if(S.equityChart){S.equityChart.destroy();S.equityChart=null;}
  if(eLabels.length>0){
    const ctx=document.getElementById("equity-chart").getContext("2d");
    S.equityChart=new Chart(ctx,{type:"line",data:{labels:eLabels,datasets:[{label:"Cumulative P&L",data:eData,borderColor:pnl>=0?"#22c55e":"#ef4444",backgroundColor:pnl>=0?"#22c55e18":"#ef444418",fill:true,tension:.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:"#9ca3af"}},y:{ticks:{callback:v=>`₹${v}`,font:{size:10},color:"#9ca3af"}}}}});
  }

  var rl=document.getElementById("recent-list");
  var h='';
  // Live trades section
  if(S.liveTrades.length>0){
    var liveRecent=S.liveTrades.slice(0,5);
    h+=sectionHeader('Real Trades (Kite)',true,S.liveTrades.length+' total');
    h+=liveRecent.map(function(t){return tradeCard(t,S.prices);}).join('');
  }
  // Paper trades section
  h+=sectionHeader('Paper Trades (Simulated)',false,S.nseTrades.length+' total');
  var recent=S.nseTrades.slice(0,8);
  h+=recent.length===0
    ?'<div class="empty">No trades yet - bot scans every 3 min during 9:15-15:30 IST</div>'
    :recent.map(function(t){return tradeCard(t,S.prices);}).join('');
  if(S.nseTrades.length>8) h+='<button class="btn" onclick="setTab(\'trades\')" style="margin-top:10px;font-size:12px">View all '+S.nseTrades.length+' trades -></button>';
  rl.innerHTML=h;
}

function _positionCard(pos){
  const cmp=S.prices[pos.symbol]?.price??pos.price;
  const pnl=+((cmp-pos.price)*pos.quantity).toFixed(2);
  const pct=+((cmp-pos.price)/pos.price*100).toFixed(2);
  const prog=Math.max(0,Math.min(100,((cmp-pos.stop_loss)/(pos.target-pos.stop_loss))*100));
  return`<div class="pos-card ${pnl>=0?"up":"down"}">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap">
      ${pill("▲ BUY","g")}
      <div>
        <div style="font-weight:500;font-size:15px">${pos.symbol} <span style="font-size:12px;color:var(--text2);font-weight:400">× ${pos.quantity}</span></div>
        <div style="font-size:11px;color:var(--text2)">${pos.name||""} · ${pos.strategy||""} · ${pos.regime||""} · ${fmtT(pos.entry_time)}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="font-weight:600;font-size:20px;color:${clr(pnl)}">${pnl>=0?"+":""}${INR(pnl.toFixed(0))}</div>
        <div style="font-size:12px;color:${clr(pct)}">${pc(pct)}</div>
      </div>
    </div>
    <div class="pos-mini-grid">
      ${[["Entry",INR(pos.price)],["Live CMP",INR(cmp)],["Stop Loss",INR(pos.stop_loss)],["Target",INR(pos.target)],["Capital",INR(pos.capital)],["Score",pos.signal_score||"-"]].map(([l,v])=>`<div class="pos-cell"><div class="l">${l}</div><div class="v">${v}</div></div>`).join("")}
    </div>
    <div class="prog-bar"><div class="prog-fill ${pnl>=0?'positive':'negative'}" style="width:${prog}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)"><span>SL ${INR(pos.stop_loss)}</span><span>progress to target</span><span>TGT ${INR(pos.target)}</span></div>
    ${pos.indicators?`<div style="margin-top:7px;font-size:10px;color:var(--text3);background:var(--bg2);border-radius:5px;padding:5px 9px;overflow-wrap:break-word">${pos.indicators}</div>`:""}
    ${pos.order_id?`<div style="margin-top:4px;font-size:10px;color:var(--text3)">Order ID: ${pos.order_id}</div>`:""}
  </div>`;
}

function _closedTable(closed){
  return`<div class="tw"><table><thead><tr><th>Stock</th><th>Qty</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Return</th><th>Reason</th><th>Result</th></tr></thead><tbody>
    ${closed.map(t=>`<tr><td style="font-weight:500">${t.symbol}</td><td>${t.quantity}</td><td>${INR(t.price)}</td><td>${t.exit_price?INR(t.exit_price):"-"}</td><td style="font-weight:500;color:${clr(t.pnl)}">${+(t.pnl||0)>=0?"+":""}${INR(t.pnl)}</td><td style="color:${clr(t.pnl_pct)}">${pc(t.pnl_pct)}</td><td style="font-size:11px;color:var(--text2)">${t.exit_reason||"-"}</td><td>${+(t.pnl||0)>=0?pill("Win","g"):pill("Loss","r")}</td></tr>`).join("")}
  </tbody></table></div>`;
}

function renderStocksPositions(){
  const paperOpen=S.nseTrades.filter(t=>t.status==="OPEN");
  const paperClosed=S.nseTrades.filter(t=>t.status==="CLOSED");
  const liveOpen=(S.liveTrades||[]).filter(t=>t.status==="OPEN");
  const liveClosed=(S.liveTrades||[]).filter(t=>t.status==="CLOSED");
  document.getElementById("main-content").innerHTML=`<div id="pos-list"></div>`;
  const el=document.getElementById("pos-list");
  var h='';

  /* ── Live Positions ── */
  if(S.tradingMode==='LIVE'||liveOpen.length||liveClosed.length){
    h+=sectionHeader('Live Positions',true,liveOpen.length+' open · '+liveClosed.length+' closed');
    if(!liveOpen.length) h+='<div class="empty" style="margin:4px 0 12px">No live open positions</div>';
    else h+=liveOpen.map(pos=>_positionCard(pos)).join('');
    if(liveClosed.length>0){
      h+='<div style="margin-top:12px;margin-bottom:6px;font-size:12px;color:var(--text2);font-weight:500">Live Closed ('+liveClosed.length+')</div>';
      h+=_closedTable(liveClosed);
    }
  }

  /* ── Paper Positions ── */
  h+=sectionHeader('Paper Positions',false,paperOpen.length+' open · '+paperClosed.length+' closed');
  if(!paperOpen.length) h+='<div class="empty" style="margin:4px 0 12px">No paper open positions</div>';
  else h+=paperOpen.map(pos=>_positionCard(pos)).join('');
  if(paperClosed.length>0){
    h+='<div style="margin-top:12px;margin-bottom:6px;font-size:12px;color:var(--text2);font-weight:500">Paper Closed ('+paperClosed.length+')</div>';
    h+=_closedTable(paperClosed);
  }

  el.innerHTML=h;
}

function _tradesTableRows(trades){
  return trades.map(t=>`<tr>
    <td style="font-weight:500">${t.symbol}</td><td>${t.quantity}</td>
    <td>${INR(t.price)}</td><td>${t.exit_price?INR(t.exit_price):"-"}</td>
    <td style="font-size:11px;color:var(--text2);white-space:nowrap">${fmtT(t.entry_time)}</td>
    <td style="font-size:11px;color:var(--text2);white-space:nowrap">${fmtT(t.exit_time)}</td>
    <td style="font-weight:500;color:${t.status==="OPEN"?"var(--text2)":clr(t.pnl)}">${t.status==="OPEN"?"-":`${+(t.pnl||0)>=0?"+":""}${INR(t.pnl)}`}</td>
    <td style="color:${t.status==="OPEN"?"var(--text2)":clr(t.pnl_pct)}">${t.status==="OPEN"?"-":pc(t.pnl_pct)}</td>
    <td style="font-size:11px">${t.strategy||"-"}</td><td style="font-size:11px">${t.regime||"-"}</td>
    <td style="font-size:11px;color:var(--text2)">${t.exit_reason||"-"}</td>
    <td>${t.status==="OPEN"?pill("Open","a"):+(t.pnl||0)>=0?pill("Win","g"):pill("Loss","r")}</td>
  </tr>`).join("");
}

function _tradesStatsFooter(stats){
  if(!stats) return '';
  const pnl=+(stats.total_pnl||0), nw=+(stats.wins||0), nl=+(stats.losses||0);
  const wr=nw+nl>0?Math.round(nw/(nw+nl)*100):0;
  const closed=nw+nl;
  if(!closed) return '';
  return`<div style="padding:6px 0;font-size:12px;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:4px"><span>Closed: <b>${closed}</b></span><span>Net P&L: <b style="color:${clr(pnl)}">${pnl>=0?"+":""}${INR(pnl.toFixed(0))}</b></span><span>Win rate: <b>${wr}%</b></span><span>Best: <b style="color:var(--green)">+${INR((+(stats.best_trade||0)).toFixed(0))}</b></span><span>Worst: <b style="color:var(--red)">${INR((+(stats.worst_trade||0)).toFixed(0))}</b></span></div>`;
}

function _tradesTable(trades, emptyMsg){
  const thRow='<thead><tr><th>Stock</th><th>Qty</th><th>Entry</th><th>Exit</th><th>Entry time</th><th>Exit time</th><th>P&L</th><th>Return</th><th>Strategy</th><th>Regime</th><th>Exit reason</th><th>Result</th></tr></thead>';
  return`<div class="tw"><table>${thRow}<tbody>${trades.length===0?`<tr><td colspan="12" style="text-align:center;padding:20px;color:var(--text2)">${emptyMsg}</td></tr>`:_tradesTableRows(trades)}</tbody></table></div>`;
}

function renderStocksTrades(){
  const ns=S.nseStats||{};
  const ls=S.liveStats||{};
  const paperClosed=S.nseTrades.filter(t=>t.status==="CLOSED");
  const liveTrades=S.liveTrades||[];
  const liveClosed=liveTrades.filter(t=>t.status==="CLOSED");
  const allClosed=liveClosed.concat(paperClosed);

  document.getElementById("main-content").innerHTML=`
    <div class="chart-wrap" style="height:140px;margin-bottom:14px"><canvas id="pnl-chart"></canvas></div>
    <div id="trades-sections"></div>`;

  if(S.pnlChart){S.pnlChart.destroy();S.pnlChart=null;}
  if(allClosed.length>0){
    const data=allClosed.slice(0,30).reverse().map(t=>+(t.pnl||0));
    const ctx=document.getElementById("pnl-chart").getContext("2d");
    S.pnlChart=new Chart(ctx,{type:"bar",data:{labels:allClosed.slice(0,30).reverse().map(t=>t.symbol),datasets:[{data,backgroundColor:data.map(v=>v>=0?"#22c55e":"#ef4444"),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},color:"#9ca3af"}},y:{ticks:{callback:v=>`₹${v}`,font:{size:10},color:"#9ca3af"}}}}});
  }

  var h='';

  /* ── Live Trades Section ── */
  if(S.tradingMode==='LIVE'||liveTrades.length>0){
    h+=sectionHeader('Live Trades',true,liveTrades.length+' trades · '+liveClosed.length+' closed');
    h+=_tradesTable(liveTrades,'No live trades yet');
    h+=_tradesStatsFooter(ls);
  }

  /* ── Paper Trades Section ── */
  h+=sectionHeader('Paper Trades',false,S.nseTrades.length+' trades · '+paperClosed.length+' closed');
  h+=_tradesTable(S.nseTrades,'No paper trades yet - bot trades 9:15-15:30 IST');
  h+=_tradesStatsFooter(ns);

  document.getElementById("trades-sections").innerHTML=h;
}

// STOCKS — CANDIDATES (Structure Filter + LLM Filter view)

async function renderStocksCandidates(){
  document.getElementById("main-content").innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <p style="font-size:13px;color:var(--text2);flex:1;margin:0">
        Live view of the last scan's BUY candidates after the Structure Filter (pivot zones, VWAP, PDH/PDL)
        and optional LLM review. Updates every scan (~3 min during market hours).
      </p>
      <button class="btn btn-sm" onclick="renderStocksCandidates()">↻ Refresh</button>
      <button class="btn btn-sm" onclick="scanNow()">▶ Scan now</button>
    </div>
    <div id="cand-stats" style="margin-bottom:14px"></div>
    <div id="cand-pass2" style="margin-bottom:14px"></div>
    <div id="cand-table-wrap"></div>
    <div id="cand-config" style="margin-top:14px;font-size:11px;color:var(--text3)"></div>`;

  let data;
  try {
    const r = await fetch("/api/candidates/latest");
    if (!r.ok) throw new Error("HTTP "+r.status);
    data = await r.json();
  } catch (e) {
    document.getElementById("cand-table-wrap").innerHTML =
      `<div class="empty">Failed to load candidates: ${e.message}</div>`;
    return;
  }

  const cands = data.candidates || [];
  const stats = data.stats || null;
  const cfg   = data.config || {};

  // --- Stats summary cards ---
  const statsHtml = (()=>{
    if (!stats || !stats.total) {
      return `<div class="empty">No scan data yet. Run a scan, or wait for the next auto-scan during market hours.</div>`;
    }
    const topReasons = Object.entries(stats.rejectReasons || {})
      .sort((a,b)=>b[1]-a[1]).slice(0,3)
      .map(([k,v])=>`${k}×${v}`).join(", ") || "-";
    return `<div class="stat-grid">
      ${sc("Scanned", stats.total, "var(--text)", "BUY candidates in last pass")}
      ${sc("Approved", stats.approved, "var(--green)", "Passed filter")}
      ${sc("Rejected (Structure)", stats.rejectedByStructure, stats.rejectedByStructure>0?"var(--amber)":"var(--text2)")}
      ${sc("Rejected (LLM)", stats.rejectedByLLM, stats.rejectedByLLM>0?"var(--amber)":"var(--text2)", cfg.llmFilterEnabled?"LLM enabled":"LLM disabled")}
      ${sc("LLM Calls", stats.llmCalls||0, "var(--blue)", `A:${stats.llmApprove||0} C:${stats.llmCaution||0} R:${stats.llmReject||0}`)}
      ${sc("Top Reject Reasons", topReasons, "var(--text2)")}
    </div>`;
  })();
  document.getElementById("cand-stats").innerHTML = statsHtml;

  // --- Candidates table ---
  const tableHtml = (()=>{
    if (!cands.length) {
      return `<div class="empty">No BUY candidates in the last scan.</div>`;
    }
    const rows = cands.map(c=>{
      const s      = c.structure || {};
      const flags  = s.flags || {};
      const R      = s.nearestResistance;
      const Sup    = s.nearestSupport;
      const vwap   = s.vwap;
      const llm    = c.llmDecision;
      const orig   = (+c.originalScore||0).toFixed(2);
      const adj    = (+c.adjustedScore||0).toFixed(2);
      const delta  = (+c.adjustedScore - +c.originalScore);
      const deltaCol = delta > 0 ? "var(--green)" : delta < 0 ? "var(--red)" : "var(--text2)";
      const deltaStr = (delta>=0?"+":"") + delta.toFixed(2);

      const rStr = R
        ? `<div style="font-size:11px">${INR(R.zoneLow)}–${INR(R.zoneHigh)}</div>
           <div style="font-size:10px;color:var(--text3)">${R.strengthLabel} · ${R.touches}t · ${R.distancePct}%</div>`
        : `<span style="color:var(--text3)">—</span>`;
      const sStr = Sup
        ? `<div style="font-size:11px">${INR(Sup.zoneLow)}–${INR(Sup.zoneHigh)}</div>
           <div style="font-size:10px;color:var(--text3)">${Sup.strengthLabel} · ${Sup.touches}t · ${Sup.distancePct}%</div>`
        : `<span style="color:var(--text3)">—</span>`;

      const vwapStr = vwap
        ? `<span style="color:${flags.priceAboveVWAP?"var(--green)":"var(--red)"}">${flags.priceAboveVWAP?"▲":"▼"} ${INR(vwap.current)}</span>
           <div style="font-size:10px;color:var(--text3)">${(flags.distanceFromVWAPPct>=0?"+":"")}${flags.distanceFromVWAPPct}% · ${vwap.bias}</div>`
        : `<span style="color:var(--text3)">—</span>`;

      const flagBits = [];
      if (flags.nearResistance)          flagBits.push(`<span style="color:var(--red)">nearR</span>`);
      if (flags.breakoutAboveResistance) flagBits.push(`<span style="color:var(--green)">breakout</span>`);
      if (flags.breakoutIntoResistance)  flagBits.push(`<span style="color:var(--red)">intoR</span>`);
      if (flags.trappedBetweenZones)     flagBits.push(`<span style="color:var(--amber)">trapped</span>`);
      if (flags.stackedResistance)       flagBits.push(`<span style="color:var(--amber)">stackedR</span>`);
      if (flags.nearSupport)             flagBits.push(`<span style="color:var(--green)">nearS</span>`);
      if (flags.abovePDH)                flagBits.push(`<span style="color:var(--green)">&gt;PDH</span>`);
      if (flags.nearPDH)                 flagBits.push(`<span style="color:var(--text2)">~PDH</span>`);
      if (flags.nearPDL)                 flagBits.push(`<span style="color:var(--text2)">~PDL</span>`);
      const flagsStr = flagBits.length ? flagBits.join(" · ") : `<span style="color:var(--text3)">—</span>`;

      const llmStr = llm
        ? `<div style="font-size:11px">${llm.decision||"-"}</div>
           <div style="font-size:10px;color:var(--text3)">conf ${llm.confidence!=null?llm.confidence:"-"}</div>
           ${llm.reason?`<div style="font-size:10px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(llm.reason||'').replace(/"/g,'&quot;')}">${llm.reason}</div>`:""}`
        : `<span style="color:var(--text3)">—</span>`;

      const finalCol = c.finalDecision === "APPROVED" ? "g" :
                       c.finalDecision === "REJECTED" ? "r" : "a";
      const finalStr = pill(c.finalDecision||"-", finalCol);

      const rejectStr = c.rejectReason
        ? `<span style="font-size:10px;color:var(--red)">${c.rejectReason}</span>`
        : `<span style="color:var(--text3)">—</span>`;

      return `<tr>
        <td style="font-weight:600">${c.symbol}<div style="font-size:10px;color:var(--text3);font-weight:400">${c.name||""}</div></td>
        <td style="font-size:11px">${c.strategy||"-"}</td>
        <td>${c.regime?pill(c.regime,"b"):"-"}</td>
        <td style="text-align:right;font-family:monospace">${orig}</td>
        <td style="text-align:right;font-family:monospace;font-weight:600">${adj}</td>
        <td style="text-align:right;font-family:monospace;color:${deltaCol}">${deltaStr}</td>
        <td>${rStr}</td>
        <td>${sStr}</td>
        <td>${vwapStr}</td>
        <td style="font-size:10px;line-height:1.5">${flagsStr}</td>
        <td>${llmStr}</td>
        <td>${finalStr}</td>
        <td>${rejectStr}</td>
      </tr>`;
    }).join("");

    return `<div class="tw"><table>
      <thead><tr>
        <th>Symbol</th><th>Strategy</th><th>Regime</th>
        <th style="text-align:right">Orig</th><th style="text-align:right">Adj</th><th style="text-align:right">Δ</th>
        <th>Nearest R</th><th>Nearest S</th><th>VWAP</th>
        <th>Flags</th><th>LLM</th><th>Final</th><th>Reject</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  })();
  document.getElementById("cand-table-wrap").innerHTML = tableHtml;

  // --- Config footer ---
  const scanned = data.scannedAt ? new Date(data.scannedAt).toLocaleString() : "never";
  document.getElementById("cand-config").innerHTML =
    `Last scan: ${scanned} · Structure filter: ${cfg.structureFilterEnabled?"ON":"OFF"} · LLM filter: ${cfg.llmFilterEnabled?"ON":"OFF"} · Reject if R within ${cfg.rejectIfResistanceWithinPct||"?"}% · LLM top ${cfg.llmTopCandidatesPerScan||"?"} · LLM min score ${cfg.llmMinScoreThreshold||"?"}`;

  // --- Pass 2 debug (ranked candidates + skip reasons) ---
  try {
    const dbgR = await fetch("/api/scan/pass2-debug");
    if (dbgR.ok) {
      const dbg = await dbgR.json();
      const entered   = dbg.topEntered   || [];
      const skipped   = dbg.topSkipped   || [];
      const tEl = document.getElementById("cand-pass2");
      if (!tEl) return;
      if (!entered.length && !skipped.length) {
        tEl.innerHTML = `<div class="empty" style="margin:0">No Pass 2 data yet — run a scan.</div>`;
        return;
      }
      const fmtRow = (c, isEntered) => {
        const statCol = c.status === "ENTERED" ? "var(--green)"
                      : c.status === "SKIPPED" ? "var(--amber)"
                      : c.status === "REJECTED"? "var(--red)" : "var(--text2)";
        const reason = c.skipReason || c.rejectReason || "—";
        return `<tr>
          <td style="text-align:right;color:var(--text3);font-family:monospace">${c.rank}</td>
          <td style="font-weight:600">${c.symbol}</td>
          <td style="font-size:11px">${c.strategy||"-"}</td>
          <td>${c.regime?pill(c.regime,"b"):"-"}</td>
          <td style="text-align:right;font-family:monospace">${c.score!=null?(+c.score).toFixed(2):"-"}</td>
          <td style="text-align:right;font-family:monospace;font-weight:600">${c.adjScore!=null?(+c.adjScore).toFixed(2):"-"}</td>
          <td style="text-align:right;font-family:monospace">${c.confidence!=null?(+c.confidence).toFixed(2):"-"}</td>
          <td style="color:${statCol};font-size:11px;font-weight:600">${c.status||"-"}</td>
          <td style="font-size:10px;color:var(--text3)">${reason}</td>
        </tr>`;
      };
      const scannedStr = dbg.scannedAt ? new Date(dbg.scannedAt).toLocaleTimeString() : "-";
      tEl.innerHTML = `
        <div class="sec-title" style="display:flex;align-items:center;gap:8px;margin-top:0">
          <span>Pass 2 · Ranked candidates</span>
          <span style="font-size:11px;color:var(--text3);font-weight:400">entered ${dbg.entered||0} · skipSlots ${dbg.skippedSlots||0} · skipCorr ${dbg.skippedCorr||0} · skipDup ${dbg.skippedDup||0} · structRej ${dbg.rejectedStructure||0} · llmRej ${dbg.rejectedLLM||0} · @${scannedStr}</span>
        </div>
        <div class="tw"><table>
          <thead><tr>
            <th style="text-align:right">#</th><th>Symbol</th><th>Strategy</th><th>Regime</th>
            <th style="text-align:right">Score</th><th style="text-align:right">Adj</th>
            <th style="text-align:right">Conf</th><th>Status</th><th>Reason</th>
          </tr></thead>
          <tbody>${[...entered, ...skipped].map((c,i)=>fmtRow(c, i<entered.length)).join("")}</tbody>
        </table></div>`;
    }
  } catch(e) { /* ignore pass2 debug failures */ }
}

// =======================================================
// STOCKS · ANALYTICS (Part 4)
// =======================================================
async function renderStocksAnalytics(){
  const days = S.analyticsDays || 30;
  document.getElementById("main-content").innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <p style="font-size:13px;color:var(--text2);flex:1;margin:0">
        Trade analytics from closed paper trades · strategy / regime / exit / time-of-day breakdowns, quality metrics, and Structure Filter insights.
      </p>
      <div style="display:flex;gap:4px">
        ${[7,30,90,365].map(d=>`<button class="fpill${days===d?" active":""}" onclick="S.analyticsDays=${d};renderStocksAnalytics()">${d===365?"1y":d+"d"}</button>`).join("")}
      </div>
      <button class="btn btn-sm" onclick="renderStocksAnalytics()">↻ Refresh</button>
    </div>
    <div id="anl-summary" style="margin-bottom:14px"></div>
    <div id="anl-panels"></div>
    <div id="anl-footer" style="margin-top:14px;font-size:11px;color:var(--text3)"></div>`;

  let a;
  try {
    const r = await fetch(`/api/analytics?days=${days}`);
    if (!r.ok) throw new Error("HTTP "+r.status);
    a = await r.json();
  } catch (e) {
    document.getElementById("anl-panels").innerHTML =
      `<div class="empty">Failed to load analytics: ${e.message}</div>`;
    return;
  }

  const q = a.quality || {};
  const summaryHtml = (()=>{
    if (!a.totalClosed) {
      return `<div class="empty">No closed trades in the last ${days} days.</div>`;
    }
    const wrCol = q.winRate>=55?"var(--green)":q.winRate>=45?"var(--amber)":"var(--red)";
    const pfCol = q.profitFactor>=1.5?"var(--green)":q.profitFactor>=1?"var(--amber)":"var(--red)";
    const expCol= q.expectancy>0?"var(--green)":"var(--red)";
    const shCol = (q.sharpe||0)>=1?"var(--green)":(q.sharpe||0)>=0?"var(--amber)":"var(--red)";
    return `<div class="stat-grid">
      ${sc("Closed trades", a.totalClosed, "var(--text)", `${days}d window`)}
      ${sc("Win rate", `${(q.winRate||0).toFixed(1)}%`, wrCol, `${q.wins||0}W / ${q.losses||0}L`)}
      ${sc("Profit factor", (q.profitFactor||0).toFixed(2), pfCol, "gross win / gross loss")}
      ${sc("Expectancy", INR((q.expectancy||0).toFixed(0)), expCol, "per trade")}
      ${sc("Sharpe", (q.sharpe||0).toFixed(2), shCol, "annualized")}
      ${sc("Sortino", (q.sortino||0).toFixed(2), shCol, "annualized · downside")}
      ${sc("Max drawdown", `−${INR((q.maxDrawdown||0).toFixed(0))}`, "var(--red)", "trough vs peak")}
      ${sc("Avg hold", `${q.avgHoldMin!=null?Math.round(q.avgHoldMin):"-"}m`,"var(--text2)")}
      ${sc("Net P&L", `${(q.netPnL||0)>=0?"+":""}${INR((q.netPnL||0).toFixed(0))}`, clr(q.netPnL))}
    </div>`;
  })();
  document.getElementById("anl-summary").innerHTML = summaryHtml;

  // Helper: group-table renderer
  const gtable = (title, rows, cols) => {
    if (!rows || !rows.length) return `<div class="empty" style="margin-bottom:12px">${title}: no data</div>`;
    return `
      <div class="sec-title" style="margin-top:14px">${title}</div>
      <div class="tw"><table>
        <thead><tr>${cols.map(c=>`<th${c.r?' style="text-align:right"':""}>${c.h}</th>`).join("")}</tr></thead>
        <tbody>${rows.map(row=>`<tr>${cols.map(c=>{
          const v = c.f ? c.f(row[c.k], row) : row[c.k];
          const style = c.r?'text-align:right;font-family:monospace':'';
          const col = c.color ? `color:${c.color(row[c.k], row)}` : "";
          return `<td style="${style};${col}">${v??"-"}</td>`;
        }).join("")}</tr>`).join("")}</tbody>
      </table></div>`;
  };

  const wrFmt = v => `${(v||0).toFixed(1)}%`;
  const wrCol = v => v>=55?"var(--green)":v>=45?"var(--amber)":"var(--red)";
  const pnlFmt= v => `${(v||0)>=0?"+":""}${INR((v||0).toFixed(0))}`;
  const pnlCol= v => clr(v);

  const cols = [
    {h:"Key",      k:"key"},
    {h:"Trades",   k:"trades",      r:true},
    {h:"Wins",     k:"wins",        r:true},
    {h:"Losses",   k:"losses",      r:true},
    {h:"Win %",    k:"winRate",     r:true, f:wrFmt, color:wrCol},
    {h:"Net P&L",  k:"netPnL",      r:true, f:pnlFmt, color:pnlCol},
    {h:"Avg win",  k:"avgWin",      r:true, f:v=>INR((v||0).toFixed(0))},
    {h:"Avg loss", k:"avgLoss",     r:true, f:v=>INR((v||0).toFixed(0))},
    {h:"PF",       k:"profitFactor",r:true, f:v=>(v||0).toFixed(2)},
    {h:"Expect",   k:"expectancy",  r:true, f:pnlFmt, color:pnlCol},
  ];

  let panels = "";

  // ─── Realistic P&L (slippage + brokerage) ───
  if (a.realistic) {
    const r = a.realistic;
    panels += `
      <div class="sec-title" style="margin-top:14px">Realistic P&amp;L (slippage + brokerage)</div>
      <div class="stat-grid">
        ${sc("Gross P&L", `${r.grossPnL>=0?"+":""}${INR(r.grossPnL.toFixed(0))}`, clr(r.grossPnL), "before costs")}
        ${sc("Net P&L",   `${r.netPnL>=0?"+":""}${INR(r.netPnL.toFixed(0))}`,     clr(r.netPnL),   "after slippage + brokerage")}
        ${sc("Total costs", INR(r.totalCosts.toFixed(0)), "var(--amber)", `avg ${INR(r.avgCostPerTrade.toFixed(0))}/trade`)}
        ${sc("Drag", `${r.grossPnL ? ((r.grossPnL - r.netPnL)/Math.abs(r.grossPnL)*100).toFixed(1) : '0.0'}%`, "var(--text2)", "cost impact")}
      </div>`;
  }

  panels += gtable("By Strategy", a.byStrategy||[], cols);
  panels += gtable("By Regime",   a.byRegime||[],   cols);
  panels += gtable("By Exit Reason", a.byExit||[],  cols);
  panels += gtable("By Time of Day", a.byTimeBucket||[], cols);

  // ─── Confidence calibration ───
  if (a.confidenceBuckets && a.confidenceBuckets.length) {
    panels += gtable("Confidence calibration · is higher confidence actually better?", a.confidenceBuckets, cols);
  }

  // ─── A/B flag comparisons ───
  if (a.flagCompare && Object.keys(a.flagCompare).length) {
    const flagRows = [];
    for (const [flag, group] of Object.entries(a.flagCompare)) {
      flagRows.push({ ...group.on,  key: `${flag} · ON`  });
      flagRows.push({ ...group.off, key: `${flag} · OFF` });
    }
    panels += gtable("A/B Filter Comparison · ON vs OFF", flagRows, cols);
  }
  if (a.byExperiment && a.byExperiment.length) {
    panels += gtable("By Experiment Group", a.byExperiment, cols);
  }

  // ─── Duration distribution ───
  if (a.durationDistribution && a.durationDistribution.some(d=>d.count>0)) {
    const maxCount = Math.max(...a.durationDistribution.map(d=>d.count));
    panels += `
      <div class="sec-title" style="margin-top:14px">Hold time distribution</div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px">
        ${a.durationDistribution.map(d=>{
          const w = maxCount > 0 ? (d.count / maxCount * 100) : 0;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px">
            <div style="width:60px;color:var(--text2)">${d.bucket}</div>
            <div style="flex:1;background:var(--bg2);border-radius:4px;height:14px;position:relative">
              <div style="background:var(--text);height:100%;width:${w}%;border-radius:4px"></div>
            </div>
            <div style="width:80px;text-align:right;font-family:monospace">${d.count} · ${d.pct||0}%</div>
          </div>`;
        }).join("")}
      </div>`;
  }

  // ─── Equity curve (SVG) ───
  if (a.dailyEquity && a.dailyEquity.length > 0) {
    const pts = a.dailyEquity;
    const W = 720, H = 180, mL = 40, mR = 10, mT = 10, mB = 20;
    const cW = W - mL - mR, cH = H - mT - mB;
    const eqs   = pts.map(p=>p.equity);
    const minEq = Math.min(0, ...eqs);
    const maxEq = Math.max(0, ...eqs);
    const range = (maxEq - minEq) || 1;
    const toX = i => mL + (i / Math.max(1, pts.length - 1)) * cW;
    const toY = v => mT + cH - ((v - minEq) / range) * cH;
    // Equity path
    const eqPath = pts.map((p, i) => `${i===0?"M":"L"} ${toX(i).toFixed(1)} ${toY(p.equity).toFixed(1)}`).join(" ");
    // Running peak path for drawdown shading
    let peak = -Infinity;
    const peakSeries = pts.map(p => { peak = Math.max(peak, p.equity); return peak; });
    const ddPath = `${eqPath} L ${toX(pts.length-1).toFixed(1)} ${toY(peakSeries[peakSeries.length-1]).toFixed(1)} ` +
                   pts.map((p, i) => `L ${toX(pts.length-1-i).toFixed(1)} ${toY(peakSeries[pts.length-1-i]).toFixed(1)}`).join(" ") + " Z";
    // Zero line
    const zeroY = toY(0);
    panels += `
      <div class="sec-title" style="margin-top:14px">Equity curve · ${pts.length} days</div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;overflow:auto">
        <svg width="${W}" height="${H}" style="max-width:100%">
          <line x1="${mL}" y1="${zeroY}" x2="${W-mR}" y2="${zeroY}" stroke="rgba(255,255,255,0.1)" stroke-dasharray="3,3"/>
          <path d="${ddPath}" fill="rgba(248,81,73,0.08)" stroke="none"/>
          <path d="${eqPath}" fill="none" stroke="#3fb950" stroke-width="1.5"/>
          <text x="${mL-4}" y="${toY(maxEq)+4}" text-anchor="end" font-size="10" fill="#6e7681">${INR(maxEq.toFixed(0))}</text>
          <text x="${mL-4}" y="${toY(minEq)+4}" text-anchor="end" font-size="10" fill="#6e7681">${INR(minEq.toFixed(0))}</text>
          <text x="${mL-4}" y="${zeroY+4}"      text-anchor="end" font-size="10" fill="#6e7681">0</text>
        </svg>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">Green = cumulative equity · pink shading = drawdown from running peak</div>
      </div>`;
  }

  // ═══════════════════════════════════════════════════════════════════════
  // PHASE 4 PANELS
  // ═══════════════════════════════════════════════════════════════════════

  // ─── Auto Insights (Part 8) — load lazily ───
  panels += `<div class="sec-title" style="margin-top:14px">Auto insights · deterministic pattern detection</div>
    <div id="anl-insights-box" style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--text2)">loading insights…</div>`;

  // ─── Walk-forward windows (Part 14) ───
  if (a.walkForward && a.walkForward.length) {
    const wfCols = [
      {h:"Window",  k:"window"},
      {h:"Trades",  k:"trades", r:true},
      {h:"Win %",   k:"winRate", r:true, f:wrFmt, color:wrCol},
      {h:"Net P&L", k:"netPnL",  r:true, f:pnlFmt, color:pnlCol},
      {h:"Expect",  k:"expectancy", r:true, f:pnlFmt, color:pnlCol},
      {h:"PF",      k:"profitFactor", r:true, f:v=>(v||0).toFixed(2)},
    ];
    panels += gtable("Walk-forward · 7d / 30d / 90d · avoid overfitting", a.walkForward, wfCols);
  }

  // ─── Cost impact by strategy (Part 11) ───
  if (a.costByStrategy && a.costByStrategy.length) {
    const ciCols = [
      {h:"Strategy", k:"strategy"},
      {h:"Trades",   k:"trades", r:true},
      {h:"Gross P&L",k:"grossPnL", r:true, f:pnlFmt, color:pnlCol},
      {h:"Net P&L",  k:"netPnL",   r:true, f:pnlFmt, color:pnlCol},
      {h:"Total cost",k:"totalCost",r:true, f:v=>INR((v||0).toFixed(0))},
      {h:"Avg cost", k:"avgCost",  r:true, f:v=>INR((v||0).toFixed(0))},
      {h:"Cost/Gross %", k:"costPctOfGross", r:true, f:v=>`${(v||0).toFixed(1)}%`,
       color:v => v>=30?"var(--red)":v>=15?"var(--amber)":"var(--text2)"},
      {h:"Low edge?",k:"lowEdge",  r:true, f:v=>v?"⚠":""},
    ];
    panels += gtable("Cost impact by strategy · flags low-edge strategies", a.costByStrategy, ciCols);
  }

  // ─── Stability per strategy (Part 12) ───
  if (a.stabilityByStrategy && a.stabilityByStrategy.length) {
    const stCols = [
      {h:"Strategy",       k:"strategy"},
      {h:"Trades",         k:"trades", r:true},
      {h:"Net P&L",        k:"netPnL", r:true, f:pnlFmt, color:pnlCol},
      {h:"Max DD",         k:"maxDrawdown", r:true, f:v=>INR((v||0).toFixed(0)), color:()=>"var(--red)"},
      {h:"Longest L streak",k:"longestLossStreak", r:true},
      {h:"Max recovery (trades)", k:"maxRecoveryBars", r:true},
    ];
    panels += gtable("Stability per strategy · drawdown + recovery", a.stabilityByStrategy, stCols);
  }

  // ─── Cohort analysis (Part 13) ───
  if (a.cohorts && a.cohorts.length) {
    panels += gtable("Candidate cohorts · performance by structure flags", a.cohorts, cols);
  }

  // ─── Threshold optimization (Part 1) ───
  if (a.thresholds && a.thresholds.length) {
    const thPanels = a.thresholds.map(th => {
      if (!th.buckets || !th.buckets.length) return "";
      const tCols = [
        {h:"Range",   k:"range"},
        {h:"Trades",  k:"trades",     r:true},
        {h:"Win %",   k:"winRate",    r:true, f:wrFmt, color:wrCol},
        {h:"Net P&L", k:"netPnL",     r:true, f:pnlFmt, color:pnlCol},
        {h:"Expect",  k:"expectancy", r:true, f:pnlFmt, color:pnlCol},
        {h:"PF",      k:"profitFactor",r:true, f:v=>(v||0).toFixed(2)},
      ];
      return gtable(`Threshold · ${th.name}${th.currentValue!=null?` (current: ${th.currentValue})`:""}`, th.buckets, tCols);
    }).join("");
    panels += `<div class="sec-title" style="margin-top:14px">Threshold optimization · performance by actual value</div>${thPanels}`;
  }

  // ─── Confidence sizing simulation (Part 7) ───
  if (a.sizingSim) {
    const sim = a.sizingSim;
    panels += `
      <div class="sec-title" style="margin-top:14px">Confidence sizing simulation · paper-only what-if</div>
      <div class="stat-grid">
        ${sc("Real net",  `${sim.realNet>=0?"+":""}${INR(sim.realNet.toFixed(0))}`, clr(sim.realNet), "uniform sizing")}
        ${sc("Sim net",   `${sim.simNet>=0?"+":""}${INR(sim.simNet.toFixed(0))}`,   clr(sim.simNet),   "sized by confidence")}
        ${sc("Edge",      `${sim.edge>=0?"+":""}${INR(sim.edge.toFixed(0))}`,       clr(sim.edge),     `${sim.edgePct}% vs real`)}
      </div>
      <div class="tw" style="margin-top:8px"><table>
        <thead><tr><th>Band</th><th style="text-align:right">Trades</th><th style="text-align:right">Real P&L</th><th style="text-align:right">Sim P&L</th><th style="text-align:right">Δ</th></tr></thead>
        <tbody>${Object.entries(sim.byBand).map(([k,v])=>`
          <tr><td>${k}</td>
              <td style="text-align:right;font-family:monospace">${v.trades}</td>
              <td style="text-align:right;font-family:monospace;color:${clr(v.pnl)}">${pnlFmt(v.pnl)}</td>
              <td style="text-align:right;font-family:monospace;color:${clr(v.sim)}">${pnlFmt(v.sim)}</td>
              <td style="text-align:right;font-family:monospace;color:${clr(v.sim-v.pnl)}">${pnlFmt(v.sim-v.pnl)}</td>
          </tr>`).join("")}
        </tbody></table></div>`;
  }

  // ─── Portfolio stats (Part 6) ───
  if (a.portfolioStats) {
    const ps = a.portfolioStats;
    panels += `
      <div class="sec-title" style="margin-top:14px">Ranking engine averages (${ps.samples} trades with ranking data)</div>
      <div class="stat-grid">
        ${sc("Avg ranking score",   ps.avgRankingScore.toFixed(3),  "var(--text)")}
        ${sc("Avg structure quality", ps.avgStructureQ.toFixed(3), "var(--text2)")}
        ${sc("Avg reward/risk",     ps.avgRewardRisk.toFixed(3),   "var(--text2)")}
        ${sc("Avg portfolio impact",ps.avgPortfolioImpact.toFixed(3), "var(--text2)")}
      </div>`;
  }

  // ─── Rejected trade analysis (Part 9) — load lazily ───
  panels += `<div class="sec-title" style="margin-top:14px">Rejected trade analysis · what happened after rejection</div>
    <div id="anl-rejects-box" style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--text2)">loading rejected trades…</div>`;

  // Filter insights (existing Phase 3)
  const fi = a.filterInsights || {};
  const fiHtml = `
    <div class="sec-title" style="margin-top:18px">Structure Filter insights</div>
    <div class="stat-grid">
      ${sc("Scanned (last pass)", fi.total||0, "var(--text)", "BUY candidates")}
      ${sc("Approved (last pass)", fi.approved||0, "var(--green)")}
      ${sc("Rej · Structure", fi.rejectedByStructure||0, (fi.rejectedByStructure||0)>0?"var(--amber)":"var(--text2)")}
      ${sc("Rej · LLM", fi.rejectedByLLM||0, (fi.rejectedByLLM||0)>0?"var(--amber)":"var(--text2)")}
      ${sc("Pass2 entered", fi.pass2Entered||0, "var(--green)")}
      ${sc("Pass2 skipped slots", fi.pass2SkippedSlots||0, "var(--text2)")}
      ${sc("Pass2 skipped corr", fi.pass2SkippedCorr||0, "var(--text2)")}
      ${sc("Pass2 skipped dup", fi.pass2SkippedDup||0, "var(--text2)")}
    </div>
    ${fi.topRejectReasons && Object.keys(fi.topRejectReasons).length ? `
      <div style="font-size:11px;color:var(--text3);margin-top:8px">Top reject reasons: ${
        Object.entries(fi.topRejectReasons).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>`${k}×${v}`).join(" · ")
      }</div>` : ""}`;
  panels += fiHtml;

  document.getElementById("anl-panels").innerHTML = panels;

  // ─── Lazy-load Phase 4 Auto Insights + Rejected trades ───
  (async () => {
    try {
      const r = await fetch(`/api/insights?days=${days}`);
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      const box = document.getElementById("anl-insights-box");
      if (box) {
        const list = (data.insights || []).map(s => `<li style="margin:4px 0">${s.replace(/</g,"&lt;")}</li>`).join("");
        box.innerHTML = list ? `<ul style="margin:0;padding-left:18px">${list}</ul>` : "No insights yet.";
      }
    } catch (e) {
      const box = document.getElementById("anl-insights-box");
      if (box) box.innerHTML = `<span style="color:var(--red)">insights load failed: ${e.message}</span>`;
    }
    try {
      const r = await fetch(`/api/rejected-trades?days=${Math.min(days,30)}`);
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      const box = document.getElementById("anl-rejects-box");
      if (!box) return;
      const agg = data.byReason || [];
      const recent = (data.recent || []).slice(0, 20);
      if (!agg.length && !recent.length) {
        box.innerHTML = "No rejected candidates tracked yet. Rejections are recorded during live scans.";
        return;
      }
      let html = "";
      if (agg.length) {
        html += `<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Aggregated by reject reason · positive false-reject score = possible missed trade</div>`;
        html += `<div class="tw"><table>
          <thead><tr><th>Reject reason</th><th style="text-align:right">Total</th><th style="text-align:right">Settled</th><th style="text-align:right">Avg max upside</th><th style="text-align:right">Avg max downside</th><th style="text-align:right">False-reject score</th></tr></thead>
          <tbody>${agg.map(r => `
            <tr>
              <td>${(r.reason||"").replace(/</g,"&lt;")}</td>
              <td style="text-align:right;font-family:monospace">${r.total}</td>
              <td style="text-align:right;font-family:monospace">${r.settled}</td>
              <td style="text-align:right;font-family:monospace;color:${(r.avgMaxUpside||0)>0?"var(--green)":"var(--text2)"}">${r.avgMaxUpside!=null?(r.avgMaxUpside>=0?"+":"")+r.avgMaxUpside+"%":"-"}</td>
              <td style="text-align:right;font-family:monospace;color:${(r.avgMaxDownside||0)<0?"var(--red)":"var(--text2)"}">${r.avgMaxDownside!=null?(r.avgMaxDownside>=0?"+":"")+r.avgMaxDownside+"%":"-"}</td>
              <td style="text-align:right;font-family:monospace;color:${(r.falseRejectScore||0)>0?"var(--green)":"var(--text2)"}">${r.falseRejectScore!=null?(r.falseRejectScore>=0?"+":"")+r.falseRejectScore:"-"}</td>
            </tr>`).join("")}
          </tbody></table></div>`;
      }
      if (recent.length) {
        html += `<div style="font-size:11px;color:var(--text3);margin-top:10px;margin-bottom:4px">Recent rejections (last ${recent.length})</div>`;
        html += `<div class="tw"><table>
          <thead><tr><th>Symbol</th><th>Reason</th><th>Strategy</th><th>Regime</th><th style="text-align:right">Entry</th><th style="text-align:right">Max up</th><th style="text-align:right">Max down</th><th>Settled</th></tr></thead>
          <tbody>${recent.map(r => `
            <tr>
              <td>${r.symbol||""}</td>
              <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.reject_reason||"").replace(/</g,"&lt;")}</td>
              <td style="font-size:11px">${r.strategy||""}</td>
              <td style="font-size:11px">${r.regime||""}</td>
              <td style="text-align:right;font-family:monospace">${r.entry_price!=null?INR(+r.entry_price):"-"}</td>
              <td style="text-align:right;font-family:monospace;color:${(r.max_upside_pct||0)>0?"var(--green)":"var(--text2)"}">${r.max_upside_pct!=null?(+r.max_upside_pct).toFixed(2)+"%":"-"}</td>
              <td style="text-align:right;font-family:monospace;color:${(r.max_downside_pct||0)<0?"var(--red)":"var(--text2)"}">${r.max_downside_pct!=null?(+r.max_downside_pct).toFixed(2)+"%":"-"}</td>
              <td style="font-size:10px">${r.settled?"✓":"…"}</td>
            </tr>`).join("")}
          </tbody></table></div>`;
      }
      box.innerHTML = html;
    } catch (e) {
      const box = document.getElementById("anl-rejects-box");
      if (box) box.innerHTML = `<span style="color:var(--red)">rejected-trades load failed: ${e.message}</span>`;
    }
  })();
  document.getElementById("anl-footer").innerHTML =
    `Analytics window: last ${days} days · generated ${a.generatedAt?new Date(a.generatedAt).toLocaleString():"-"}`;
}
