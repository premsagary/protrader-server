    + '<table style="width:100%;border-collapse:collapse;font-size:11px">';

  // Header row
  html += '<thead><tr style="background:var(--bg2)">';
  html += '<th style="text-align:right;padding:6px 8px;color:var(--text3);position:sticky;left:0;background:var(--bg2);z-index:5">#</th>';
  html += sortableHeader('sym',   'Stock', 'left',  'position:sticky;left:36px;background:var(--bg2);z-index:5;min-width:130px');
  html += sortableHeader('grp',   'Grp',   'center');
  html += sortableHeader('score', 'Score', 'right');
  html += sortableHeader('price', 'Price', 'right', 'border-right:2px solid var(--border3)');
  activeCols.forEach(function(col){
    var isSorted = stockDataSortKey===col.k;
    var arrow = isSorted ? (stockDataSortDir==='asc'?' ▲':' ▼') : '';
    var hc = isSorted ? '#a78bfa' : col.hc;
    var onclick = 'if(stockDataSortKey===\''+col.k+'\'){stockDataSortDir=stockDataSortDir===\'asc\'?\'desc\':\'asc\';}else{stockDataSortKey=\''+col.k+'\';stockDataSortDir=\'desc\';}renderStockDataPage()';
    html += '<th onclick="'+onclick+'" style="text-align:right;padding:6px 8px;color:'+hc+';cursor:pointer;user-select:none;white-space:nowrap'
      + (col.br?';border-right:1px solid var(--border2)':'')+'">'
      + col.l+arrow+'</th>';
  });
  html += '</tr></thead>';

  // Body rows
  html += '<tbody>';
  var grpCol = {NIFTY50:'var(--blue)',NEXT50:'#8b5cf6',MIDCAP:'#f59e0b',SMALLCAP:'#10b981'};
  if(filtered.length===0){
    html += '<tr><td colspan="'+(5+activeCols.length)+'" style="padding:40px;text-align:center;color:var(--text4);font-size:12px">No stocks match the current filter / search.</td></tr>';
  }
  filtered.forEach(function(s, idx){
    var bg = idx%2===0?'var(--bg)':'var(--bg2)';
    var gc = grpCol[s.grp]||'var(--text3)';
    var scoreCol = s.score>=75?'var(--green)':s.score>=55?'#f59e0b':'var(--red)';
    html += '<tr style="border-bottom:1px solid var(--border2);background:'+bg+'">'
      + '<td style="padding:5px 8px;text-align:right;color:var(--text3);position:sticky;left:0;background:'+bg+';z-index:3">'+(idx+1)+'</td>'
      + '<td style="padding:5px 8px;position:sticky;left:36px;background:'+bg+';z-index:3">'
        + '<div style="font-weight:600">'+s.sym+'</div>'
        + '<div style="font-size:10px;color:var(--text3)">'+(s.sector||'')+'</div>'
      + '</td>'
      + '<td style="padding:5px 8px;text-align:center"><span style="background:'+gc+'22;color:'+gc+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">'+s.grp+'</span></td>'
      + '<td style="padding:5px 8px;text-align:right;font-weight:700;color:'+scoreCol+'">'+(s.score!=null?s.score:'-')+'</td>'
      + '<td style="padding:5px 8px;text-align:right;border-right:2px solid var(--border3)">'+(s.price?'₹'+parseFloat(s.price).toFixed(1):'-')+'</td>';
    activeCols.forEach(function(col){
      html += '<td style="padding:5px 8px;text-align:right'+(col.br?';border-right:1px solid var(--border2)':'')+'">'
        + col.r(s)+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  html += '<div style="margin-top:10px;font-size:10px;color:var(--text4)">Tip: click any column header to sort. Click again to flip ascending/descending. Data from /api/stocks/score · refreshed daily 7AM IST.</div>';
  html += '</div>'; // end padding wrapper

  cont.innerHTML = html;

  // Keep search box focused + caret at end after re-render
  try{
    var sb = document.getElementById('sd-search');
    if(sb && stockDataSearch){
      sb.focus();
      var v = sb.value; sb.value=''; sb.value=v;
    }
  }catch(e){}
}

function buildStockCard(s, medal){
  var gc = {NIFTY50:'var(--blue)',NEXT50:'#8b5cf6',MIDCAP:'#f59e0b',SMALLCAP:'#10b981'}[s.grp]||'var(--text3)';
  var sc = s.score>=75?'var(--green)':s.score>=55?'#f59e0b':'var(--red)';
  var isFallenAngel = s.score>=50 && (s.pctFromHigh||0)<=-20 && (s.rsi||50)<=50;
  var px = s.price;

  var h='<div style="background:var(--bg2);border:1.5px solid '+(isFallenAngel?'rgba(245,158,11,.4)':'var(--border)')+';border-radius:12px;padding:14px;position:relative;overflow:hidden">';

  // Fallen Angel ribbon
  if(isFallenAngel){
    var fallPct=Math.abs(s.pctFromHigh||0).toFixed(0);
    h+='<div style="position:absolute;top:0;right:0;background:#f59e0b;color:#000;font-size:10px;font-weight:800;padding:3px 10px;border-radius:0 12px 0 8px">🔥 -'+fallPct+'% FROM PEAK</div>';
  }

  // -- HEADER (Phase 4: Composite + Conviction) --------------------
  var convClass = (s.conviction||'watch').toLowerCase().replace(/\s+/g,'-');
  var horizonClass = (s.horizon||'swing').toLowerCase();
  h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:20px">'+medal+'</span>';
  h+='<div>';
  h+='<div style="font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px">'+s.sym;
  h+=' <span class="conviction-pill '+convClass+'">'+(s.conviction||'Watch')+'</span>';
  h+=' <span class="horizon-pill '+horizonClass+'">'+(s.horizon||'swing')+'</span>';
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--text3)">'+s.name+(s.sector?' · '+s.sector:'')+'</div>';
  h+='</div></div>';
  h+='<div style="text-align:right">';
  h+='<div style="font-size:21px;font-weight:800;color:'+sc+'">'+(s.composite_score||s.score)+'<span style="font-size:10px;color:var(--text4);font-weight:400">/100</span></div>';
  if(px) h+='<div style="font-size:13px;font-weight:700">₹'+px.toFixed(1)+'</div>';
  h+='</div></div>';

  // Composite score breakdown bar (FA + TA + Momentum + Risk)
  var fa=s.fa_score||0, ta=s.ta_score||0, mom=s.momentum_score||0, risk=s.risk_score||0;
  var total4=fa+ta+mom+risk||1;
  h+='<div class="score-bar" style="margin-bottom:6px" title="FA:'+fa+' TA:'+ta+' Mom:'+mom+' Risk:'+risk+'">';
  h+='<div class="seg fa" style="width:'+(fa/total4*100).toFixed(0)+'%"></div>';
  h+='<div class="seg ta" style="width:'+(ta/total4*100).toFixed(0)+'%"></div>';
  h+='<div class="seg mom" style="width:'+(mom/total4*100).toFixed(0)+'%"></div>';
  h+='<div class="seg risk" style="width:'+(risk/total4*100).toFixed(0)+'%"></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-bottom:10px">';
  h+='<span><span style="color:var(--blue)">●</span> FA:'+fa+'</span>';
  h+='<span><span style="color:var(--green)">●</span> TA:'+ta+'</span>';
  h+='<span><span style="color:var(--amber)">●</span> Mom:'+mom+'</span>';
  h+='<span><span style="color:var(--purple)">●</span> Risk:'+risk+'</span>';
  h+='</div>';

  // Tags row
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">';
  h+='<span style="background:'+gc+'22;color:'+gc+';border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">'+s.grp+'</span>';
  if(s.sector) h+='<span style="background:var(--bg3);color:var(--text3);border-radius:4px;padding:1px 7px;font-size:10px">'+s.sector+'</span>';
  if(s.goldenCross===true)  h+='<span style="background:rgba(245,158,11,.15);color:#f59e0b;border-radius:4px;padding:1px 7px;font-size:10px">⚡Golden Cross</span>';
  if(s.goldenCross===false) h+='<span style="background:rgba(239,68,68,.1);color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px">Death Cross</span>';
  if(s.supertrendSig==='bullish') h+='<span style="background:rgba(34,197,94,.1);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px">ST Bullish</span>';
  if(s.supertrendSig==='bearish') h+='<span style="background:rgba(239,68,68,.1);color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px">ST Bearish</span>';
  if(s.accumDist==='Accumulation') h+='<span style="background:rgba(59,130,246,.1);color:var(--blue);border-radius:4px;padding:1px 7px;font-size:10px">Accumulation</span>';
  if(s.bullishDiv) h+='<span style="background:rgba(34,197,94,.15);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px">RSI Div ⬆</span>';
  if(isFallenAngel&&(s.rsi||50)<=35) h+='<span style="background:rgba(34,197,94,.15);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px">RSI Oversold</span>';
  if(s.alreadyOwn) h+='<span style="background:rgba(139,92,246,.15);color:#8b5cf6;border-radius:4px;padding:1px 7px;font-size:10px">✓ You own this</span>';
  h+='</div>';

  // -- FALLEN ANGEL SCORECARD ---------------------------------------
  if(isFallenAngel && s.fallenScore!=null){
    var fc=s.fallenColor||'#f59e0b';
    h+='<div style="background:'+fc+'10;border:1px solid '+fc+'40;border-radius:10px;padding:10px;margin-bottom:10px">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
    h+='<div style="font-size:10px;font-weight:700;color:'+fc+'">'+s.fallenIcon+' Fallen Angel Score</div>';
    h+='<div style="font-size:18px;font-weight:800;color:'+fc+'">'+s.fallenScore+'<span style="font-size:10px;font-weight:400;color:var(--text3)">/100</span></div>';
    h+='</div>';
    h+='<div style="background:var(--bg3);border-radius:3px;height:5px;margin-bottom:7px;overflow:hidden">';
    h+='<div style="height:100%;border-radius:3px;background:'+fc+';width:'+s.fallenScore+'%"></div></div>';
    h+='<div style="font-size:11px;font-weight:700;color:'+fc+';margin-bottom:7px">'+s.fallenVerdict+'</div>';
    if(s.fallenHits){
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
      Object.entries(s.fallenHits).forEach(function(e){
        var pts=e[1], pos=pts>=0;
        h+='<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 6px;background:'+(pos?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)')+';border-radius:4px">';
        h+='<span style="color:var(--text3)">'+e[0]+'</span>';
        h+='<span style="font-weight:700;color:'+(pos?'var(--green)':'var(--red)')+'">'+( pts>0?'+':'')+pts+'</span>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }

  // -- SHOW MORE toggle (wraps Fundamentals + Technicals + extras) --
  var smId='sm-'+s.sym;
  h+='<div style="text-align:center;margin-bottom:6px">';
  h+='<button onclick="var d=document.getElementById(\''+smId+'\');var b=this;if(d.style.display===\'none\'){d.style.display=\'block\';b.textContent=\'▲ Show less\';}else{d.style.display=\'none\';b.textContent=\'▼ Show more\';}" '
   +'style="background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);border-radius:5px;padding:3px 14px;font-size:10px;font-weight:700;cursor:pointer;width:100%">▼ Show more</button>';
  h+='</div>';
  h+='<div id="'+smId+'" style="display:none">';

  // -- FUNDAMENTALS SECTION ----------------------------------------
  h+='<div style="font-size:10px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Fundamentals</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">';
  function mc(l,v,c,sub){
    return '<div style="background:var(--bg3);border-radius:6px;padding:5px 6px;text-align:center">'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:1px">'+l+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:'+(c||'var(--text)')+'">'+v+'</div>'
      +(sub?'<div style="font-size:10px;color:var(--text4)">'+sub+'</div>':'')
      +'</div>';
  }
  var na='<span style="color:var(--text4)">--</span>';
  h+=mc('ROE',    s.roe!=null?s.roe.toFixed(1)+'%':na,    s.roe>=20?'var(--green)':s.roe>=15?'#f59e0b':s.roe>=10?'var(--text)':'var(--red)',   s.roe>=20?'Excellent':s.roe>=15?'Good':s.roe>=10?'Average':'Weak');
  h+=mc('D/E',    s.debtToEq!=null?s.debtToEq.toFixed(2)+'x':na, s.debtToEq<=0.3?'var(--green)':s.debtToEq<=1?'#f59e0b':s.debtToEq<=2?'var(--text)':'var(--red)', s.debtToEq<=0.3?'Debt-free':s.debtToEq<=1?'Low':s.debtToEq<=2?'Moderate':'High');
  h+=mc('P/E',    s.pe!=null?s.pe.toFixed(1)+'x':na,      s.pe<15?'var(--green)':s.pe<25?'#f59e0b':s.pe<40?'var(--text)':'var(--red)',        s.pe<15?'Cheap':s.pe<25?'Fair':s.pe<40?'Premium':'Expensive');
  h+=mc('PEG',    s.peg!=null?s.peg.toFixed(2)+'x':na,    s.peg<1?'var(--green)':s.peg<2?'#f59e0b':'var(--red)',                              s.peg<1?'Underval':s.peg<2?'Fair':'Overval');
  h+=mc('Rev Gr', s.revGrowth!=null?'+'+s.revGrowth.toFixed(1)+'%':na, s.revGrowth>=15?'var(--green)':s.revGrowth>=5?'#f59e0b':s.revGrowth>=0?'var(--text)':'var(--red)', s.revGrowth>=15?'Strong':s.revGrowth>=5?'Moderate':'Slow');
  h+=mc('EPS Gr', s.earGrowth!=null?(s.earGrowth>0?'+':'')+s.earGrowth.toFixed(1)+'%':na, s.earGrowth>=20?'var(--green)':s.earGrowth>=10?'#f59e0b':s.earGrowth>=0?'var(--text)':'var(--red)', s.earGrowth>=20?'Strong':s.earGrowth>=0?'Growing':'Declining');
  h+=mc('Op Mgn', s.opMargin!=null?s.opMargin.toFixed(1)+'%':na,   s.opMargin>=20?'var(--green)':s.opMargin>=10?'#f59e0b':'var(--text)',     s.opMargin>=20?'High':s.opMargin>=10?'OK':'Low');
  h+=mc('Beta',   s.beta!=null?s.beta.toFixed(2):na,               s.beta<0.8?'var(--green)':s.beta<1.3?'var(--text)':'var(--red)',          s.beta<0.8?'Low Risk':s.beta<1.3?'Market':'High Risk');
  h+='</div>';

  // -- TECHNICALS SECTION ------------------------------------------
  h+='<div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Technicals</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">';
  var above200=px&&s.dma200?px>s.dma200:null;
  var above50=px&&s.dma50?px>s.dma50:null;
  h+=mc('200 DMA', s.dma200?'₹'+s.dma200.toFixed(0):na, above200?'var(--green)':'var(--red)', above200?'Above':'Below');
  h+=mc('50 DMA',  s.dma50?'₹'+s.dma50.toFixed(0):na,  above50?'var(--green)':'var(--red)',  above50?'Above':'Below');
  h+=mc('RSI-14',  s.rsi!=null?s.rsi.toFixed(0):na,       s.rsi<35?'var(--green)':s.rsi<50?'#f59e0b':s.rsi<70?'var(--text)':'var(--red)', s.rsi<35?'Oversold':s.rsi<50?'Neutral':s.rsi<70?'Healthy':'Overbought');
  h+=mc('MACD',    s.macdHist!=null?(s.macdHist>0?'+':'')+s.macdHist:na, s.macdBull?'var(--green)':'var(--red)', s.macdBull?'Bullish':'Bearish');
  h+=mc('ADX',     s.adx!=null?s.adx.toFixed(0):na,       s.adx>25?'var(--green)':'#f59e0b',  s.adx>35?'V.Strong':s.adx>25?'Strong':'Weak');
  h+=mc('BB%B',    s.bbPct!=null?(s.bbPct*100).toFixed(0)+'%':na, s.bbPct<0.2?'var(--green)':s.bbPct>0.8?'var(--red)':'var(--text)', s.bbPct<0.2?'Lower BB':s.bbPct>0.8?'Upper BB':'Mid');
  h+=mc('Volume',  s.volRatio!=null?s.volRatio.toFixed(2)+'x':na, s.volRatio>1.3?'var(--green)':s.volRatio<0.7?'var(--red)':'var(--text)', s.volTrend||'');
  h+=mc('OBV',     s.obvRising!=null?(s.obvRising?'Rising':'Falling'):na, s.obvRising?'var(--green)':'var(--red)', 'On-bal vol');
  h+='</div>';

  // -- PRICE ACTION ------------------------------------------------
  h+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Price Action</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">';
  h+=mc('1M Ret',  s.change1m!=null?(s.change1m*100>0?'+':'')+( s.change1m*100).toFixed(1)+'%':na, s.change1m>0?'var(--green)':'var(--red)','');
  h+=mc('3M Ret',  s.change3m!=null?(s.change3m*100>0?'+':'')+( s.change3m*100).toFixed(1)+'%':na, s.change3m>0?'var(--green)':'var(--red)','');
  h+=mc('6M Ret',  s.change6m!=null?(s.change6m*100>0?'+':'')+( s.change6m*100).toFixed(1)+'%':na, s.change6m>0?'var(--green)':'var(--red)','');
  h+=mc('1Y Ret',  s.change52w!=null?(s.change52w*100>0?'+':'')+(s.change52w*100).toFixed(1)+'%':na,s.change52w>0?'var(--green)':'var(--red)','');
  h+=mc('52W Hi',  s.wk52Hi?'₹'+s.wk52Hi.toFixed(0):na, 'var(--text)',s.pctFromHigh!=null?s.pctFromHigh.toFixed(1)+'% away':'');
  h+=mc('52W Lo',  s.wk52Lo?'₹'+s.wk52Lo.toFixed(0):na, 'var(--text)',px&&s.wk52Lo?'+'+(((px-s.wk52Lo)/s.wk52Lo)*100).toFixed(1)+'% above':'');
  h+=mc('vs 200D', s.pctAbove200!=null?(s.pctAbove200>0?'+':'')+s.pctAbove200+'%':na, s.pctAbove200>0&&s.pctAbove200<25?'var(--green)':s.pctAbove200>30?'#f59e0b':'var(--red)','from 200DMA');
  h+=mc('Vol%',    s.annualVol!=null?s.annualVol+'%':na,   s.annualVol<25?'var(--green)':s.annualVol<40?'var(--text)':'var(--red)','Annual vol');
  h+='</div>';

  // -- BUY ZONE for fallen angels ----------------------------------
  if(isFallenAngel&&(s.dma50||s.dma200)){
    h+='<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:8px 10px;margin-bottom:8px">';
    h+='<div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">Target Buy Zones</div>';
    h+='<div style="font-size:10px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap">';

    if(s.dma200) h+='<span>200DMA: <b>₹'+s.dma200.toFixed(0)+'</b></span>';
    if(s.rsi<=35)h+='<span style="color:var(--green)">RSI '+s.rsi.toFixed(0)+' - Oversold</span>';
    h+='</div></div>';
  }

  // -- QUICK VERDICT (now uses server-side conviction) ---------------
  var convColor = s.conviction_color || (s.conviction==='Strong Buy'?'var(--green)':s.conviction==='Buy'?'var(--green)':s.conviction==='Accumulate'?'var(--amber)':s.conviction==='Watch'?'var(--text3)':'var(--red)');
  var compPct = Math.min(100, s.composite_score || s.score || 0);
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
  h+='<div style="flex:1;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden">';
  h+='<div style="height:100%;background:'+convColor+';width:'+compPct+'%;border-radius:4px"></div></div>';
  h+='<span style="font-size:11px;font-weight:700;color:'+convColor+';white-space:nowrap">'+(s.conviction||'Watch')+'</span>';
  h+='</div>';

  // -- OVERSOLD SIGNAL BADGES (new: Stochastic + BB %B) --------------------
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">';
  if(s.bullishDiv)    h+='<span style="background:rgba(34,197,94,.15);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">RSI Div ⬆ (Varsity #1)</span>';
  if(s.rsi!=null&&s.rsi<=30) h+='<span style="background:rgba(34,211,238,.12);color:#22d3ee;border-radius:4px;padding:1px 7px;font-size:10px">RSI '+s.rsi+' — Oversold</span>';
  if(s.stochK!=null&&s.stochK<=20) h+='<span style="background:rgba(99,102,241,.12);color:#818cf8;border-radius:4px;padding:1px 7px;font-size:10px">Stoch '+s.stochK.toFixed(0)+' — Oversold</span>';

var _faPredCache = {};

async function predictFallenAngel(sym, cardId) {
  var btn = document.getElementById('btn-'+cardId);
  var txt = document.getElementById('txt-'+cardId);
  if(btn){btn.textContent='⏳...';btn.disabled=true;}
  if(txt){txt.style.color='#f59e0b';txt.textContent='MiroFish agents analyzing '+sym+'...';}
  if(_faPredCache[sym]){ _fillFACard(cardId,sym,_faPredCache[sym]); if(btn){btn.textContent='🔄';btn.disabled=false;} return; }
  var stock=(stockRecData&&stockRecData.stocks||[]).find(function(s){return s.sym===sym;});
  try {
    var resp=await fetch('/api/mirofish/fa-predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      sym:s.sym, name:stock?stock.name:s.sym, sector:s.sector, grp:s.grp,
      price:s.price, pctFromHigh:s.pctFromHigh, wk52Hi:s.wk52Hi, wk52Lo:s.wk52Lo,
      pctAbove200:s.pctAbove200, dma200:s.dma200, dma50:s.dma50,
      roe:s.roe, debtToEq:s.debtToEq, pe:s.pe, opMargin:s.opMargin,
      earGrowth:s.earGrowth, revGrowth:s.revGrowth,
      rsi:s.rsi, stochK:s.stochK, bbPct:s.bbPct,
      adx:s.adx, beta:s.beta, annualVol:s.annualVol,
      macdBull:stock?stock.macdBull:null, macdHist:s.macdHist,
      obvRising:stock?stock.obvRising:null, bullishDiv:stock?stock.bullishDiv:null,
      bearishDiv:stock?stock.bearishDiv:null,
      volRatio:s.volRatio, supertrendSig:s.supertrendSig,
      fallenScore:stock?stock.fallenScore:null, fallenVerdict:stock?stock.fallenVerdict:null,
      stopLoss:stock?stock.stopLoss:null, stopReason:stock?stock.stopReason:null,
      target:stock?stock.target:null,     targetReason:stock?stock.targetReason:null,
      rrRatio:stock?stock.rrRatio:null,   goodRR:stock?stock.goodRR:null,
    })});
    var d=await resp.json();
    if(d.error) throw new Error(d.error);
    _faPredCache[sym]=d;
    _fillFACard(cardId,sym,d);
  } catch(e) {
    if(txt){txt.style.color='var(--red)';txt.textContent=e.message.includes('ANTHROPIC')?'Set ANTHROPIC_API_KEY in Railway':'Error: '+e.message;}
  }
  if(btn){btn.textContent='🔄';btn.disabled=false;}
}

function _fillFACard(cardId, sym, d) {
  var txt=document.getElementById('txt-'+cardId);
  var px=d.current_price||0;
  var horizons={'6M':d.price_6m,'1Y':d.price_1y,'2Y':d.price_2y,'3Y':d.price_3y};
  Object.keys(horizons).forEach(function(yr){
    var target=horizons[yr];
    var valEl=document.getElementById('val-'+cardId+'-'+yr);
    var pctEl=document.getElementById('pct-'+cardId+'-'+yr);
    if(!valEl) return;
    if(target&&px){
      var gain=((target/px-1)*100);
      valEl.textContent='\u20b9'+Math.round(target).toLocaleString('en-IN');
      valEl.style.color=gain>=0?'var(--green)':'var(--red)';
      if(pctEl){pctEl.textContent=(gain>=0?'+':'')+gain.toFixed(0)+'%';pctEl.style.color=gain>=0?'var(--green)':'var(--red)';}
    } else { valEl.textContent='\u2014'; }
  });
  if(txt){
    txt.style.color='var(--text2)';

function psFmt(n){
  if(n==null||isNaN(n))return '—';
  if(Math.abs(n)>=1e7) return '₹'+(n/1e7).toFixed(2)+'Cr';
  if(Math.abs(n)>=1e5) return '₹'+(n/1e5).toFixed(2)+'L';
  return '₹'+Math.round(n).toLocaleString('en-IN');
}

async function ltRunAIValidation(){
  var btn=document.getElementById('lt-ai-btn')||event.target;
  if(btn){ btn.textContent='🧠 Running...'; btn.disabled=true; }
  _ltAILogEntries=[];

  var log=document.getElementById('lt-ai-log');
  if(log){
    log.style.display='block';
    log.innerHTML='<div style="text-align:center;padding:16px">'
      +'<div style="font-size:22px;margin-bottom:6px">🏛</div>'
      +'<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px">Long Term AI Deep Review in progress…</div>'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:10px">Querying 5 AI models with full Varsity v2 data — 4 pillars, fundamentals, expected return, timing overlay, peers, macro</div>'
      +'<div style="height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;max-width:240px;margin:0 auto">'
      +'<div style="height:100%;background:linear-gradient(90deg,#f59e0b,#22d3ee);width:60%;animation:mfpulse 1.2s ease-in-out infinite;border-radius:2px"></div></div>'
      +'<div id="lt-ai-progress-models" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:10px"></div>'
      +'<div id="lt-ai-progress-text" style="font-size:10px;color:var(--text4);margin-top:6px">Starting…</div>'
      +'</div>';
  }

  // Poll /api/ai/status every 2s for live model-by-model progress
  var pollSince=Date.now();
  var pollTimer=setInterval(async function(){
    try{
      var sr=await fetch('/api/ai/status?since='+pollSince);
      var st=await sr.json();
      if(st.steps&&st.steps.length){
        st.steps.forEach(function(s){ if(s.ts>pollSince) pollSince=s.ts; });
      }
      if(st.models&&Object.keys(st.models).length){
        var mp=document.getElementById('lt-ai-progress-models');
        if(mp){
          var ph='';
          var done=0,total=0;
          Object.keys(st.models).forEach(function(k){
            var m=st.models[k]; total++;
            if(m.status==='ok'||m.status==='error'||m.status==='skipped') done++;
            var bg=m.status==='ok'?'#166534':m.status==='error'?'#991b1b':m.status==='skipped'?'#92400e':'#1e3a5f';
            var icon=m.status==='ok'?'✅':m.status==='error'?'❌':m.status==='skipped'?'⏭':'⏳';
            var extra=m.took_ms?' ('+((m.took_ms/1000).toFixed(1))+'s)':'';
            ph+='<span style="background:'+bg+';color:#fff;padding:2px 8px;border-radius:12px;font-size:10px;white-space:nowrap">'+icon+' '+m.name+extra+'</span>';
          });
          mp.innerHTML=ph;
          var ptxt=document.getElementById('lt-ai-progress-text');
          if(ptxt) ptxt.textContent=done+'/'+total+' models completed…';
        }
      }
      if(!st.running) clearInterval(pollTimer);
    }catch(e){}
  },2000);

  // Fire the validation call (runs ~30-90s)
  try{
    var amt=parseFloat((document.getElementById('lt-amount')||{}).value)||ltPortfolioAmount||100000;
    var r=await fetch('/api/ai/validate-longterm?amount='+amt+'&mode=deep');
    _ltAIValidation=await r.json();
    clearInterval(pollTimer);
    // Refresh persisted DB cache so badges stay after a page refresh. Server
    // already wrote the new rows to ai_stock_reviews during validateLongTerm…
    // so this just pulls them back for the in-memory lookup fallback.
    _ltAIReviewsDB=null;
    ltLoadAIReviewsDB();
    // Re-render the tab so the AI results panel becomes part of the page
    var tc=document.getElementById('ps-tab-content');
    if(tc) tc.innerHTML=psRenderLongTermTab();
  }catch(e){
    clearInterval(pollTimer);
    _ltAIValidation={error:'Long Term AI review failed: '+e.message};
    var tc2=document.getElementById('ps-tab-content');
    if(tc2) tc2.innerHTML=psRenderLongTermTab();
  }
  finally{
    var btn2=document.getElementById('lt-ai-btn');
    if(btn2){ btn2.disabled=false; btn2.textContent='🧠 AI Deep Review'; }
  }
}

// Renders the Long Term AI consensus panel. Mirrors psRenderAIValidation but
// speaks Varsity v2 language (4 pillars, bucket, expected return) instead of
// swing signal language. Displays the full per-stock consensus table with
// per-model verdict chips, Varsity module citation, and thesis reasoning.
function psRenderLTAIValidation(){
  if(!_ltAIValidation) return '';
  var v=_ltAIValidation;
  var h='';
  if(v.error){
    h+='<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 14px;margin-top:14px">';
    h+='<div style="font-size:11px;color:#ef4444">🏛 Long Term AI Error: '+v.error+'</div></div>';
    return h;
  }

  h+='<div id="lt-ai-validation-panel" style="margin-top:14px">';

  // Header card — Varsity v2 Multi-model consensus
  h+='<div style="background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(34,211,238,.06));border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:14px;margin-bottom:14px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">';
  h+='<div style="font-size:12px;font-weight:800;color:#f59e0b;display:flex;align-items:center;gap:6px">🏛 Long Term AI Consensus <span style="font-size:9px;color:var(--text4);font-weight:600">· Varsity v2 · 4-pillar · 12M horizon</span></div>';
  var modelsInfo=(v.models_used||1)+'/'+(v.models_total||1)+' models';
  var tokInfo=v.total_tokens?('  ·  '+(v.total_tokens.input||0).toLocaleString()+' in + '+(v.total_tokens.output||0).toLocaleString()+' out = '+(v.total_tokens.total||0).toLocaleString()+' tokens'):'';
  h+='<div style="font-size:9px;color:var(--text4)">'+(v.took_ms?(v.took_ms/1000).toFixed(1)+'s':'')+'  ·  '+modelsInfo+tokInfo+'</div>';
  h+='</div>';

  // Model status pills
  if(v.model_details&&v.model_details.length){
    h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">';
    v.model_details.forEach(function(md){
      var sc=md.status==='ok'?'#22c55e':md.status==='skipped'?'#64748b':'#ef4444';
      var si=md.status==='ok'?'✅':md.status==='skipped'?'⏭':'❌';
      var tkStr=md.tokens?(' · '+((md.tokens.input||0)+(md.tokens.output||0)).toLocaleString()+'tok'):'';
      var tkTitle=md.tokens?((md.tokens.input||0)+' in + '+(md.tokens.output||0)+' out'):(md.error||'OK');
      h+='<span style="background:'+sc+'15;color:'+sc+';border-radius:4px;padding:2px 6px;font-size:8px;font-weight:700;white-space:nowrap" title="'+tkTitle+' ('+(md.took_ms||0)+'ms)">'+si+' '+md.name+tkStr+'</span>';
    });
    h+='</div>';
    var failed=v.model_details.filter(function(md){return md.status==='error';});
    if(failed.length){
      h+='<div style="margin-bottom:10px">';
      failed.forEach(function(md){
        h+='<div style="font-size:10px;color:#ef4444;padding:2px 0">❌ <b>'+md.name+'</b> failed: '+(md.error||'Unknown')+'</div>';
      });
      h+='</div>';
    }
  }

  // Portfolio summary from LT result
  if(v.portfolio_summary){
    var ps=v.portfolio_summary;
    var rc=ps.regime==='BULL'?'#22c55e':ps.regime==='BEAR'?'#ef4444':'#f59e0b';
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px;font-size:10px;color:var(--text3);margin-bottom:6px">';
    h+='<span style="background:'+rc+'18;color:'+rc+';padding:2px 8px;border-radius:4px;font-weight:700">Regime: '+(ps.regime||'NEUTRAL')+'</span>';
    h+='<span>Invested: ₹'+(ps.invested||0).toLocaleString('en-IN')+'</span>';
    h+='<span>Cash: ₹'+(ps.cashReserve||0).toLocaleString('en-IN')+' ('+((ps.cashPct||0))+'%)</span>';
    if(ps.portfolioExpReturn!=null) h+='<span>Exp 12M: '+((ps.portfolioExpReturn*100).toFixed(1))+'%</span>';
    if(ps.usingPrior) h+='<span style="color:#f59e0b">cold-start prior</span>';
    h+='</div>';
  }

  // Portfolio flags — collapsed
  if(v.portfolio_flags&&v.portfolio_flags.length){
    h+='<div style="margin-top:6px">';
    h+='<div onclick="var el=document.getElementById(\'lt-ai-concerns\');var a=document.getElementById(\'lt-ai-concerns-arr\');if(el){el.style.display=el.style.display===\'none\'?\'block\':\'none\';if(a)a.textContent=el.style.display===\'none\'?\'▶\':\'▼\';}" style="font-size:10px;font-weight:700;color:#f97316;cursor:pointer"><span id="lt-ai-concerns-arr">▶</span> ⚠ Portfolio Concerns ('+v.portfolio_flags.length+')</div>';
    h+='<div id="lt-ai-concerns" style="display:none;margin-top:4px">';
    v.portfolio_flags.forEach(function(f){
      h+='<div style="font-size:10px;color:var(--text3);padding:2px 0;padding-left:12px">• '+String(f).replace(/</g,'&lt;')+'</div>';
    });
    h+='</div></div>';
  }
  // Missed signals — collapsed
  if(v.missed_signals&&v.missed_signals.length){
    h+='<div style="margin-top:6px">';
    h+='<div onclick="var el=document.getElementById(\'lt-ai-missed\');var a=document.getElementById(\'lt-ai-missed-arr\');if(el){el.style.display=el.style.display===\'none\'?\'block\':\'none\';if(a)a.textContent=el.style.display===\'none\'?\'▶\':\'▼\';}" style="font-size:10px;font-weight:700;color:#ef4444;cursor:pointer"><span id="lt-ai-missed-arr">▶</span> 🔍 Things We Missed ('+v.missed_signals.length+')</div>';
    h+='<div id="lt-ai-missed" style="display:none;margin-top:4px">';
    v.missed_signals.forEach(function(m){
      h+='<div style="font-size:10px;color:#ef4444;padding:2px 0;padding-left:12px">• '+String(m).replace(/</g,'&lt;')+'</div>';
    });
    h+='</div></div>';
  }
  h+='</div>'; // close header card

  // NOTE: The per-stock consensus table was removed from this panel. Per-stock
  // verdicts now render INLINE in the Long Term picks table (AI Reviews column)
  // matching the Swing Trade layout, and the full per-model reasoning is in an
  // expandable row under each pick. This panel only shows portfolio-level
  // summary info (model status, flags, missed signals, portfolio summary).

  h+='</div>'; // close #lt-ai-validation-panel
  return h;
}

  if(s.weightedConfidence!=null) h+='<span style="font-size:10px;color:var(--text3)">Confidence: '+((s.weightedConfidence||0)*100).toFixed(0)+'%</span>';

  var bb=(d.diagnostics&&d.diagnostics.bucketBreakdown)||{};

  var betas=picks.map(function(p){return p.beta;}).filter(function(x){return x!=null&&isFinite(x);});
  var avgBeta=betas.length?(betas.reduce(function(a,b){return a+b;},0)/betas.length):null;
  var expReturnAmt=s.portfolioExpReturnAmt||Math.round((d.investableAmount||0)*(s.portfolioExpReturn||0));

    +(sub?'<div style="font-size:9px;color:var(--text4);margin-top:1px">'+sub+'</div>':'')+'</div>';}

  h+=sc('Avg Score',avgScore.toFixed(1)+'/100',avgScore>=75?'#22c55e':avgScore>=60?'#f59e0b':'#ef4444');
  h+=sc('Beta',(avgBeta!=null?avgBeta.toFixed(2):'—'),(avgBeta==null?'var(--text3)':avgBeta<1?'#22c55e':avgBeta<1.3?'#f59e0b':'#ef4444'));
  h+=sc('Exp Return (12M)',(expPct>=0?'+':'')+expPct.toFixed(1)+'%'+(s.usingPrior?' *':''),expCol,(expReturnAmt>=0?'+':'')+psFmt(expReturnAmt));
  h+=sc('Proj Value',psFmt((d.investableAmount||0)+expReturnAmt),expCol);

  h+='<button onclick="ltRegenerate()" style="background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">♻ Regenerate</button>';

    (refTs?(s.lastRefreshed?'Refreshed ':'Generated ')+new Date(refTs).toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'}):'Just built')+'</span>';
  var marketOpen=s.marketOpen!=null?s.marketOpen:null;
  if(marketOpen!=null) h+='<span style="font-size:10px;color:'+(marketOpen?'#22c55e':'#ef4444')+'">● '+(marketOpen?'Open':'Closed')+'</span>';
  h+='</div>';

  // ── Long-Term picks table ──

    var vCol=p.valuationLabel==='UNDERVALUED'?'#22c55e':p.valuationLabel==='OVERVALUED'?'#ef4444':'var(--text2)';
    // Kijun buy-zone badge (Varsity M2 Ch21: Kijun-sen as dynamic pullback entry)

    var kTip=kbz==='UNKNOWN'?'Kijun data not available'
      :('Kijun dist: '+(kDist>=0?'+':'')+(kDist!=null?kDist.toFixed(1):'?')+'%'
          +(tov.tkBull===true?' · TK bullish (T>K)':tov.tkBull===false?' · TK bearish (T<K)':''));
    var rowBg=(i%2===0)?'var(--bg2)':'var(--bg)';
    // ── AI REVIEWS lookup (must happen before the <tr> so the cell can be

    // AI Reviews column (2nd column — matches Swing Trade Portfolio layout)

        else{_ltAiSkipNames.push(sn);}
      });
      h+='<div style="font-size:8px;font-weight:700;line-height:1.6">';
      if(_ltAiAgree>0) h+='<div style="color:#22c55e">✅'+_ltAiAgree+' Agreed <span style="font-weight:500;opacity:0.8">('+_ltAiAgreeNames.join(', ')+')</span></div>';

      if(_ltAiDisagree>0) h+='<div style="color:#ef4444">❌'+_ltAiDisagree+' Disagree <span style="font-weight:500;opacity:0.8">('+_ltAiDisagreeNames.join(', ')+')</span></div>';
      if(_ltAiSkipNames.length>0) h+='<div style="color:#6b7280">⏭'+_ltAiSkipNames.length+' No Review <span style="font-weight:500;opacity:0.8">('+_ltAiSkipNames.join(', ')+')</span></div>';
      h+='<div onclick="psToggleAIRow(\'lt-'+p.sym+'\')" id="ai-toggle-lt-'+p.sym+'" style="color:#22d3ee;cursor:pointer;margin-top:1px;font-weight:600;display:flex;align-items:center;gap:2px"><span id="ai-arrow-lt-'+p.sym+'">▶</span> Show AI Reviews ('+_ltAiTotal+' models)</div>';
      h+='</div>';
    } else {
      h+='<span style="font-size:8px;color:var(--text4)">—</span>';
    }
    h+='</td>';

    h+='<td style="padding:6px 8px"><span style="color:'+bCol+';font-weight:800;font-size:11px">'+(p.scoreBucket||'—')+'</span></td>';
    h+='<td style="padding:6px 8px;text-align:right;font-weight:700;color:'+bCol+'">'+(p.scoreV2!=null?p.scoreV2.toFixed(1):'-')+'</td>';
    h+='<td style="padding:6px 8px;text-align:right;font-weight:700">'+(p.allocPct!=null?p.allocPct.toFixed(1):'-')+'%</td>';
    h+='<td style="padding:6px 8px;text-align:right">'+(p.shares||0)+'</td>';
    h+='<td style="padding:6px 8px;text-align:right">'+psFmt(p.allocAmt||0)+'</td>';
    h+='<td style="padding:6px 8px;text-align:right;font-weight:700;color:'+erCol+'">'+(er>=0?'+':'')+er.toFixed(1)+'%</td>';
    h+='<td style="padding:6px 8px;text-align:right;color:'+rCol+';font-size:10px;font-weight:700">'+(p.riskLevel||'-')+'</td>';
    h+='<td style="padding:6px 8px;text-align:right;color:'+vCol+';font-size:10px">'+(p.valuationLabel||'-')+'</td>';

    // Track column — "I Bought" marks the pick as a LONGTERM holding
    var ltPrice=(p.currentPrice||p.price||0);
    h+='<td style="padding:6px 8px;text-align:center">'

      +'style="background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:2px 8px;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap">I Bought</button>'
      +'</td>';
    h+='</tr>';

    // ── AI Review expandable row (hidden by default, toggled by badge click) ──
    // The id is prefixed with "lt-" so the same psToggleAIRow() helper used by
    // the swing table can open/close this row without symbol collisions when
    // a stock sits in both portfolios simultaneously.
    if(_ltAIStockReview){
      var ltAiR2=_ltAIStockReview;
      var ltPm2=ltAiR2.per_model||ltAiR2.models||{};
      var ltPmKeys2=Object.keys(ltPm2);
      var _ltMn2={'groq-llama':'Groq Llama 3.3 70B','gpt-nano':'GPT-4.1-nano','deepseek':'DeepSeek V3','claude-haiku':'Claude Haiku 4.5','mistral':'Mistral Small'};
      h+='<tr id="ai-row-lt-'+p.sym+'" style="display:none;background:var(--bg2)">';
      // colspan = 12 columns in the LT table (Stock/Bucket/ScoreV2/Alloc%/Shares/
      // Invested/Exp 12M/Risk/Value/Timing/AI Reviews/Track)
      h+='<td colspan="12" style="padding:8px 12px;border-bottom:1px solid var(--border)">';
      h+='<div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:6px">🏛 Long-Term AI Model Reviews for '+p.sym+'</div>';
      h+='<div style="display:grid;gap:4px">';
      ltPmKeys2.forEach(function(mid){
        var mv2=ltPm2[mid];
        var v2c=mv2.verdict==='AGREE'?'#22c55e':mv2.verdict==='DISAGREE'?'#ef4444':mv2.verdict==='NO_REVIEW'?'#6b7280':'#f59e0b';
        var v2i=mv2.verdict==='AGREE'?'✅':mv2.verdict==='DISAGREE'?'❌':mv2.verdict==='NO_REVIEW'?'⏭':'⚠️';
        var mName2=_ltMn2[mid]||mv2.model_name||mid;
        var reason2=mv2.varsity_reasoning||mv2.recommendation||'';
        var risk2=mv2.risk_flag||'';
        var vmod=mv2.varsity_module||'';
        h+='<div style="background:var(--bg);border-radius:5px;padding:6px 10px;border-left:3px solid '+v2c+';'+(mv2.verdict==='NO_REVIEW'?'opacity:0.5;':'')+'">';
        h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">';
        h+='<span style="font-size:10px;font-weight:800;color:'+v2c+'">'+v2i+' '+mName2+'</span>';
        h+='<span style="font-size:8px;font-weight:800;color:'+v2c+';text-transform:uppercase;background:'+v2c+'15;padding:1px 5px;border-radius:3px">'+String(mv2.verdict||'').replace('_',' ')+'</span>';
        if(mv2.confidence&&mv2.verdict!=='NO_REVIEW') h+='<span style="font-size:8px;color:var(--text4)">'+mv2.confidence+'% conf</span>';
        if(vmod) h+='<span style="font-size:8px;color:var(--text4);font-style:italic">'+String(vmod).replace(/</g,'&lt;')+'</span>';
        h+='</div>';
        if(reason2) h+='<div style="font-size:9px;color:var(--text3);line-height:1.4;margin-top:2px">'+String(reason2).replace(/</g,'&lt;')+'</div>';
        if(risk2&&mv2.verdict!=='NO_REVIEW') h+='<div style="font-size:9px;color:#f97316;margin-top:2px">⚠ '+String(risk2).replace(/</g,'&lt;')+'</div>';
        h+='</div>';
      });
      h+='</div></td></tr>';
    }
  });
  h+='</tbody></table></div>';

  if(s.usingPrior){
    h+='<div style="margin-top:6px;font-size:10px;color:var(--text3)">* Using cold-start Bayesian prior — expected returns will sharpen as forward-return history accumulates.</div>';
  }
  return h;
}

function psRenderAIValidation(){

  if(v.error){
    h+='<div id="ps-ai-validation-panel" style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:10px;padding:10px 14px;margin-bottom:14px">';

  h+='<div id="ps-ai-validation-panel">';

  h+='<div style="background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,211,238,.06));border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:14px;margin-bottom:14px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div style="font-size:12px;font-weight:800;color:#22c55e;display:flex;align-items:center;gap:6px">🤖 AI Multi-Model Consensus</div>';

  h+='<div style="font-size:9px;color:var(--text4)">'+(v.took_ms?(v.took_ms/1000).toFixed(1)+'s':'')+'  ·  '+modelsInfo+tokInfo+'</div>';
  h+='</div>';

  // Model status pills — show errors inline
  if(v.model_details&&v.model_details.length){
    h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">';
    v.model_details.forEach(function(md){
      var sc=md.status==='ok'?'#22c55e':md.status==='skipped'?'#64748b':'#ef4444';
      var si=md.status==='ok'?'✅':md.status==='skipped'?'⏭':'❌';
      var tkStr=md.tokens?(' · '+(md.tokens.input+md.tokens.output).toLocaleString()+'tok'):'';
      var tkTitle=md.tokens?(md.tokens.input+' in + '+md.tokens.output+' out'):(md.error||'OK');
      h+='<span style="background:'+sc+'15;color:'+sc+';border-radius:4px;padding:2px 6px;font-size:8px;font-weight:700;white-space:nowrap" title="'+tkTitle+' ('+(md.took_ms||0)+'ms)">'+si+' '+md.name+tkStr+'</span>';
    });
    h+='</div>';
    // Show failed models with error reasons
    var failed=v.model_details.filter(function(md){return md.status==='error';});
    if(failed.length>0){
      h+='<div style="margin-bottom:10px">';
      failed.forEach(function(md){
        h+='<div style="font-size:10px;color:#ef4444;padding:2px 0">❌ <b>'+md.name+'</b> failed: '+(md.error||'Unknown error')+'</div>';
      });
      h+='</div>';
    }
  }

  if(v.overall_assessment){
    h+='<div style="font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5">'+v.overall_assessment+'</div>';
  }
  if(v.regime){
    var rc=v.regime==='BULL'?'#22c55e':v.regime==='BEAR'?'#ef4444':'#f59e0b';
    h+='<span style="background:'+rc+'15;color:'+rc+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-right:6px">Regime: '+v.regime+'</span>';
  }

  // Portfolio flags (from all models) — collapsed by default
  if(v.portfolio_flags&&v.portfolio_flags.length){
    h+='<div style="margin-top:10px">';
    h+='<div onclick="var el=document.getElementById(\'ai-concerns-list\');var a=document.getElementById(\'ai-concerns-arr\');if(el){el.style.display=el.style.display===\'none\'?\'block\':\'none\';if(a)a.textContent=el.style.display===\'none\'?\'▶\':\'▼\';}" style="font-size:10px;font-weight:700;color:#f97316;margin-bottom:4px;cursor:pointer"><span id="ai-concerns-arr">▶</span> ⚠ Portfolio Concerns ('+v.portfolio_flags.length+' from all models)</div>';
    h+='<div id="ai-concerns-list" style="display:none">';
    v.portfolio_flags.forEach(function(f){
      h+='<div style="font-size:10px;color:var(--text3);padding:2px 0;padding-left:12px">• '+f+'</div>';
    });
    h+='</div></div>';
  }

  // Missed signals — collapsed by default
  if(v.missed_signals&&v.missed_signals.length){
    h+='<div style="margin-top:10px">';
    h+='<div onclick="var el=document.getElementById(\'ai-missed-list\');var a=document.getElementById(\'ai-missed-arr\');if(el){el.style.display=el.style.display===\'none\'?\'block\':\'none\';if(a)a.textContent=el.style.display===\'none\'?\'▶\':\'▼\';}" style="font-size:10px;font-weight:700;color:#ef4444;margin-bottom:4px;cursor:pointer"><span id="ai-missed-arr">▶</span> 🔍 Missed Signals ('+v.missed_signals.length+')</div>';
    h+='<div id="ai-missed-list" style="display:none">';
    v.missed_signals.forEach(function(m){
      h+='<div style="font-size:10px;color:#ef4444;padding:2px 0;padding-left:12px">• '+m+'</div>';
    });
    h+='</div></div>';
  }

  h+='</div>'; // close consensus card

  h+='</div>'; // close #ps-ai-validation-panel
  return h;
}

var _aiLogEntries=[];
function aiLog(msg,type){
  var color=type==='ok'?'#22c55e':type==='err'?'#ef4444':type==='warn'?'#f59e0b':'#94a3b8';
  var icon=type==='ok'?'✅':type==='err'?'❌':type==='warn'?'⚠️':'⏳';
  var time=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var html='<div style="color:'+color+';padding:1px 0">'+icon+' <span style="color:var(--text4)">'+time+'</span> '+msg+'</div>';
  _aiLogEntries.push(html);
  var log=document.getElementById('ps-ai-log');
  if(!log)return;
  log.style.display='block';
  log.innerHTML+=html;
  log.scrollTop=log.scrollHeight;
}
function aiLogRestore(){
  var log=document.getElementById('ps-ai-log');
  if(!log||!_aiLogEntries.length)return;
  log.style.display='block';
  log.innerHTML=_aiLogEntries.join('');
  log.scrollTop=log.scrollHeight;
}

async function psRunAIValidation(mode){
  var btn=document.getElementById('ps-ai-btn')||event.target;
  btn.textContent='🧠 Running...';
  btn.disabled=true;
  _aiLogEntries=[];

  // Hide any existing AI validation panel and show clean loading state
  var existingAI=document.getElementById('ps-ai-validation-panel');
  if(existingAI) existingAI.style.display='none';

  var log=document.getElementById('ps-ai-log');
  if(log){
    log.style.display='block';
    log.innerHTML='<div style="text-align:center;padding:20px">'
      +'<div style="font-size:24px;margin-bottom:8px">🧠</div>'
      +'<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">AI Deep Review in progress...</div>'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:12px">Querying 5 AI models with full portfolio + fundamentals + technicals</div>'
      +'<div style="height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;max-width:240px;margin:0 auto">'
      +'<div style="height:100%;background:linear-gradient(90deg,#22c55e,#22d3ee);width:60%;animation:mfpulse 1.2s ease-in-out infinite;border-radius:2px"></div></div>'
      +'<div id="ps-ai-progress-models" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:12px"></div>'
      +'<div id="ps-ai-progress-text" style="font-size:10px;color:var(--text4);margin-top:8px">Starting...</div>'
      +'</div>';
  }

  // Poll /api/ai/status every 2s for real-time model-by-model progress
  var pollSince=Date.now();
  var completedModels=0;
  var pollTimer=setInterval(async function(){
    try{
      var sr=await fetch('/api/ai/status?since='+pollSince);
      var st=await sr.json();
      if(st.steps&&st.steps.length){
        st.steps.forEach(function(s){
          if(s.ts>pollSince) pollSince=s.ts;
        });
      }
      // Live model status pills in compact progress view
      if(st.models&&Object.keys(st.models).length){
        var mp=document.getElementById('ps-ai-progress-models');
        if(mp){
          var ph='';
          var done=0,total=0;
          Object.keys(st.models).forEach(function(k){
            var m=st.models[k];
            total++;
            if(m.status==='ok'||m.status==='error'||m.status==='skipped') done++;
            var bg=m.status==='ok'?'#166534':m.status==='error'?'#991b1b':m.status==='skipped'?'#92400e':'#1e3a5f';
            var icon=m.status==='ok'?'✅':m.status==='error'?'❌':m.status==='skipped'?'⏭':'⏳';
            var extra=m.took_ms?' ('+((m.took_ms/1000).toFixed(1))+'s)':'';
            ph+='<span style="background:'+bg+';color:#fff;padding:2px 8px;border-radius:12px;font-size:10px;white-space:nowrap">'+icon+' '+m.name+extra+'</span>';
          });
          mp.innerHTML=ph;
          completedModels=done;
          var ptxt=document.getElementById('ps-ai-progress-text');
          if(ptxt) ptxt.textContent=done+'/'+total+' models completed...';
        }
      }
      if(!st.running) clearInterval(pollTimer);
    }catch(e){}
  },2000);

  // Fire AI validation call (runs ~30-90s)
  try{
    var r=await fetch('/api/ai/validate?mode='+mode);
    _psAIValidation=await r.json();
    clearInterval(pollTimer);

    // On completion — fully re-render the tab so AI results are baked in
    var tc=document.getElementById('ps-tab-content');
    if(tc){
      if(_psTab==='model') tc.innerHTML=psRenderModelTab();
      else if(_psTab==='holdings') tc.innerHTML=psRenderHoldingsTab();
    }
  }catch(e){
    clearInterval(pollTimer);
    _psAIValidation={error:'AI review failed: '+e.message};
    var tc=document.getElementById('ps-tab-content');
    if(tc){
      if(_psTab==='model') tc.innerHTML=psRenderModelTab();
      else if(_psTab==='holdings') tc.innerHTML=psRenderHoldingsTab();
    }
  }
  finally{
    var btn2=document.getElementById('ps-ai-btn');
    if(btn2){btn2.disabled=false;btn2.textContent='🧠 AI Deep Review';}
  }
}

async function psLoadAIValidation(){
  try{
    var r=await fetch('/api/ai/validation');
    var d=await r.json();
    if(d&&!d.error)_psAIValidation=d;
  }catch(e){}
}

  if(sig.urgency==='URGENT')h+=' <span style="color:#ef4444;font-size:9px;font-weight:800;background:rgba(239,68,68,.12);padding:1px 5px;border-radius:3px">🔴 URGENT</span>';

  if(sig.acted)h+=' <span style="color:#22c55e;font-size:9px">✓ Acted</span>';
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+(sig.reason||'')+'</div>';
  h+='</div>';
  h+='<div style="text-align:right;min-width:80px">';

function psRenderSignalsTab(){
  var h='';
  if(!_psSignals){
    h+='<div style="text-align:center;padding:40px;color:var(--text3)">Loading signals...</div>';
    return h;
  }

  // ── ACTION BUTTONS ──
  h+='<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">';
  h+='<button onclick="psLoadSignals()" style="background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.25);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">🔄 Refresh</button>';
  h+='<button onclick="psGenerateSignals()" style="background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.25);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">⚡ Generate Signals</button>';
  h+='</div>';

  if(!_psSignals.length){
    h+='<div style="text-align:center;padding:40px;color:var(--text3)">No signals yet. Start tracking positions to see signal history.</div>';
    return h;
  }

  // ── CATEGORIZE: AI Recommendations vs Your Activity ──
  // FRESH_BUY is shown in Model Portfolio tab, not here
  var aiExitSignals=[];   // EXIT, REDUCE — AI says sell/reduce your holdings
  var aiSwitchSignals=[]; // SWITCH — AI says swap stocks
  var alertSignals=[];    // SECTOR_WARN, DRAWDOWN — portfolio alerts
  var yourActivity=[];    // BUY, SELL, ADD — your executed trades

  _psSignals.forEach(function(sig){
    var t=sig.signal_type;
    if(t==='FRESH_BUY') return; // skip — shown in Model Portfolio tab
    if(t==='EXIT'||t==='REDUCE') aiExitSignals.push(sig);
    else if(t==='SWITCH') aiSwitchSignals.push(sig);
    else if(t==='SECTOR_WARN'||t==='DRAWDOWN') alertSignals.push(sig);
    else yourActivity.push(sig); // BUY, SELL, ADD — user actions
  });

  // All AI recommendations combined (no FRESH_BUY)
  var aiAll=aiExitSignals.concat(aiSwitchSignals).concat(alertSignals);
  aiAll.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});

  // Urgent = only AI signals that need attention
  var urgentItems=aiAll.filter(function(s){return s.urgency==='URGENT'||s.urgency==='HIGH';});

  // ── FILTER PILLS ──
  var filters=[
    {key:'all',       label:'All AI Signals',    count:aiAll.length, color:'#22d3ee'},
    {key:'action',    label:'🚨 Needs Action',   count:urgentItems.length, color:'#ef4444'},
    {key:'exit',      label:'📉 Exit / Reduce',  count:aiExitSignals.length, color:'#ef4444'},
    {key:'switch',    label:'🔄 Switch',         count:aiSwitchSignals.length, color:'#a855f7'},
    {key:'alerts',    label:'⚠ Alerts',          count:alertSignals.length, color:'#f97316'},
    {key:'history',   label:'📋 My Trades',      count:yourActivity.length, color:'#94a3b8'},
  ];
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">';
  filters.forEach(function(f){
    var active=_psSignalFilter===f.key;
    var bg=active?f.color+'25':'var(--bg2)';
    var border=active?f.color:'var(--border)';
    h+='<button onclick="psSetSignalFilter(\''+f.key+'\')" style="background:'+bg+';color:'+(active?f.color:'var(--text3)')+';border:1px solid '+border+';border-radius:20px;padding:4px 12px;font-size:11px;font-weight:'+(active?'700':'500')+';cursor:pointer;display:flex;align-items:center;gap:4px">';
    h+=f.label;
    if(f.count>0)h+=' <span style="background:'+(active?f.color:'var(--border)')+';color:'+(active?'#fff':'var(--text3)')+';border-radius:10px;padding:0 6px;font-size:10px;font-weight:700;min-width:18px;text-align:center">'+f.count+'</span>';
    h+='</button>';
  });
  h+='</div>';

  // ── RENDER BASED ON FILTER ──
  var flt=_psSignalFilter;

  if(flt==='all'){
    // Urgent AI signals first
    if(urgentItems.length){
      h+='<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px;margin-bottom:14px">';
      h+='<div style="font-size:11px;font-weight:800;color:#ef4444;margin-bottom:8px;display:flex;align-items:center;gap:6px">🚨 Needs Your Attention ('+urgentItems.length+')</div>';
      urgentItems.forEach(function(sig){ h+=psRenderSignalCard(sig); });
      h+='</div>';
    }
    // AI Exit/Reduce recommendations
    if(aiExitSignals.length){
      h+='<div style="margin-bottom:14px">';

      h+='</div>';
    }
  } else if(flt==='history'){
    h+='<div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:8px">📋 Your Trade History ('+yourActivity.length+')</div>';
    if(!yourActivity.length){

        h2+='</div></div>';
        h+=h2;
      });

  } else {
    var list=flt==='action'?urgentItems:flt==='exit'?aiExitSignals:flt==='switch'?aiSwitchSignals:alertSignals;
    var titles={action:'🚨 Needs Your Attention',exit:'📉 AI Says Exit / Reduce',switch:'🔄 AI Switch Suggestions',alerts:'⚠ Portfolio Alerts'};

    } else {
      list.forEach(function(sig){ h+=psRenderSignalCard(sig); });
    }
  }

  return h;
}

// ── PERFORMANCE + RISK TAB ──
function psRenderPerformanceTab(){
  var h='';
  if(!_psPerf){
    h+='<div style="text-align:center;padding:40px;color:var(--text3)">Loading performance & risk...</div>';
    return h;
  }
  var st=_psPerf.stats||{};
  var risk=_psPerf.risk||{};

  h+='<div style="display:flex;gap:8px;margin-bottom:12px">';
  h+='<button onclick="psLoadPerformance()" style="background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.25);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">🔄 Refresh</button>';
  h+='</div>';

  // ── RISK DASHBOARD ──
  if(risk.numPositions>0){
    h+='<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">📊 Risk Dashboard (Varsity M9)</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px">';
    function sc(l,v,c,sub){return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:2px">'+l+'</div>'
      +'<div style="font-size:15px;font-weight:800;color:'+(c||'var(--text)')+'">'+v+'</div>'
      +(sub?'<div style="font-size:9px;color:var(--text4);margin-top:1px">'+sub+'</div>':'')+'</div>';}
    h+=sc('Risk Rating',risk.riskRating,risk.riskColor);
    h+=sc('Portfolio Vol',risk.portfolioVol+'%',risk.portfolioVol<25?'#22c55e':risk.portfolioVol<35?'#f59e0b':'#ef4444','annualized');
    h+=sc('Beta',risk.portfolioBeta,risk.portfolioBeta<1?'#22c55e':risk.portfolioBeta<1.3?'#f59e0b':'#ef4444');
    h+=sc('VaR (1-day)',psFmt(risk.var95_1d),'#ef4444','95% confidence');
    h+=sc('VaR (1-week)',psFmt(risk.var95_1w),'#ef4444','95% confidence');
    h+=sc('Diversification',risk.effectiveStocks+' stocks',risk.effectiveStocks>=5?'#22c55e':'#f59e0b','effective positions');
    h+=sc('Max Sector',risk.maxSector,risk.maxSectorPct>30?'#ef4444':'#22c55e',risk.maxSectorPct+'% allocation');
    if(risk.maxDrawdown!=null)h+=sc('Max Drawdown',risk.maxDrawdown+'%',risk.maxDrawdown<-10?'#ef4444':risk.maxDrawdown<-5?'#f59e0b':'#22c55e','from peak');
    h+='</div>';

    // Sector allocation bars
    if(risk.sectorPcts){
      h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px">';
      h+='<div style="font-size:11px;font-weight:700;margin-bottom:8px;color:var(--text2)">Sector Exposure</div>';
      var secs=Object.entries(risk.sectorPcts).sort(function(a,b){return b[1]-a[1];});
      secs.forEach(function(s){
        var warn=s[1]>30;
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
        h+='<div style="width:100px;font-size:10px;color:var(--text3);text-align:right">'+s[0]+'</div>';
        h+='<div style="flex:1;background:var(--bg3);border-radius:3px;height:16px;position:relative">';
        h+='<div style="width:'+Math.min(s[1],100)+'%;background:'+(warn?'#ef4444':'#22d3ee')+';height:100%;border-radius:3px"></div>';
        h+='</div>';
        h+='<div style="width:40px;font-size:10px;font-weight:700;color:'+(warn?'#ef4444':'var(--text)')+'">'+s[1]+'%</div>';
        if(warn)h+='<span style="font-size:9px;color:#ef4444;font-weight:700">⚠ >30%</span>';
        h+='</div>';
      });
      h+='</div>';
    }
  }

  // ── TRADE STATS ──
  h+='<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">📈 Trade Performance</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px">';
  function sc2(l,v,c){return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">'
    +'<div style="font-size:10px;color:var(--text3);margin-bottom:2px">'+l+'</div>'
    +'<div style="font-size:15px;font-weight:800;color:'+(c||'var(--text)')+'">'+v+'</div></div>';}
  h+=sc2('Total Trades',st.totalTrades||0,'var(--text)');
  h+=sc2('Win Rate',(st.winRate||0)+'%',(st.winRate||0)>=50?'#22c55e':'#ef4444');
  h+=sc2('Wins / Losses',(st.wins||0)+' / '+(st.losses||0),(st.wins||0)>(st.losses||0)?'#22c55e':'#ef4444');
  h+=sc2('Total P&L',((st.totalRealised||0)>=0?'+':'')+psFmt(st.totalRealised||0),(st.totalRealised||0)>=0?'#22c55e':'#ef4444');
  h+=sc2('Avg Win',psFmt(st.avgWin||0),'#22c55e');
  h+=sc2('Avg Loss',psFmt(st.avgLoss||0),'#ef4444');
  h+='</div>';

  // ── EQUITY CURVE (simple text-based if we have snapshots) ──
  var ec=_psPerf.equityCurve||[];
  if(ec.length>1){
    h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px">';
    h+='<div style="font-size:11px;font-weight:700;margin-bottom:8px;color:var(--text2)">Equity Curve</div>';
    var maxV=Math.max.apply(null,ec.map(function(s){return s.current_value||0;}));
    var minV=Math.min.apply(null,ec.map(function(s){return s.current_value||0;}));
    var range=maxV-minV||1;
    h+='<div style="display:flex;align-items:flex-end;gap:2px;height:100px">';
    ec.forEach(function(s){
      var pct=((s.current_value-minV)/range)*100;
      var col=(s.total_pnl||0)>=0?'#22c55e':'#ef4444';
      h+='<div title="'+new Date(s.snap_date).toLocaleDateString('en-IN')+': '+psFmt(s.current_value)+'" style="flex:1;min-width:4px;background:'+col+';border-radius:2px 2px 0 0;height:'+Math.max(pct,2)+'%"></div>';
    });
    h+='</div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text4);margin-top:4px">';
    h+='<span>'+new Date(ec[0].snap_date).toLocaleDateString('en-IN')+'</span>';
    h+='<span>'+new Date(ec[ec.length-1].snap_date).toLocaleDateString('en-IN')+'</span>';
    h+='</div></div>';
  }

  // ── CLOSED TRADES ──
  var ct=_psPerf.closedTrades||[];
  if(ct.length){
    h+='<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Closed Trades</div>';
    h+='<div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">';
    h+='<table style="width:100%;border-collapse:collapse;font-size:11px">';
    h+='<thead><tr style="background:var(--bg3);border-bottom:1px solid var(--border)">';
    ['Stock','Buy Date','Sell Date','P&L','P&L%'].forEach(function(hdr){
      h+='<th style="padding:7px 6px;text-align:left;font-size:10px;color:var(--text3);font-weight:700">'+hdr+'</th>';
    });
    h+='</tr></thead><tbody>';
    ct.forEach(function(t,i){
      var c2=(t.realised_pnl||0)>=0?'#22c55e':'#ef4444';
      h+='<tr style="background:'+(i%2===0?'var(--bg2)':'var(--bg)')+'">';
      h+='<td style="padding:5px;font-weight:700;color:var(--text)">'+t.sym+'</td>';
      h+='<td style="padding:5px;font-size:10px;color:var(--text3)">'+(t.buy_date?new Date(t.buy_date).toLocaleDateString('en-IN'):'—')+'</td>';
      h+='<td style="padding:5px;font-size:10px;color:var(--text3)">'+(t.sell_date?new Date(t.sell_date).toLocaleDateString('en-IN'):'—')+'</td>';
      h+='<td style="padding:5px;font-weight:700;color:'+c2+'">'+(t.realised_pnl>=0?'+':'')+'₹'+(+t.realised_pnl).toFixed(0)+'</td>';
      h+='<td style="padding:5px;font-weight:700;color:'+c2+'">'+(t.realised_pct>=0?'+':'')+(+t.realised_pct).toFixed(1)+'%</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  } else {
    h+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">No closed trades yet. Sell positions to see performance history.</div>';
  }
  return h;
}

// ── API CALLS ──
// Auto-load model portfolio (called when tab opens and no data exists)
async function psAutoLoadModel(){
  if(_psLoading||_psData)return;
  _psLoading=true;
  renderPortfolioSuggestion(); // show loading state
  try{
    var r=await fetch('/api/portfolio/model?amount='+_psAmount);
    var d=await r.json();
    if(d.error){
      console.log('Model auto-load:',d.error);
      // Retry once after 3 seconds
      setTimeout(function(){_psLoading=false;if(!_psData)psAutoLoadModel();},3000);
      return;
    }
    _psData=d;
    psStartAutoRefresh();
    if(_psTab==='model'){var rc=document.getElementById('ps-results');if(rc)rc.innerHTML=psRenderModelResults(d);}
  }catch(e){console.log('Model auto-load error:',e.message);setTimeout(function(){_psLoading=false;},3000);}
  finally{_psLoading=false;}
}

async function psGenerate(){
  if(_psLoading)return;
  _psLoading=true;
  var btn=document.getElementById('ps-gen-btn');
  if(btn){btn.textContent='⏳ Analyzing...';btn.style.opacity='0.6';}
  try{
    var amt=parseFloat(document.getElementById('ps-amount').value)||100000;
    _psAmount=amt;
    var r=await fetch('/api/portfolio/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:amt})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    _psData=d;
    psStartAutoRefresh();
    var rc=document.getElementById('ps-results');
    if(rc) rc.innerHTML=psRenderModelResults(d);
  }catch(e){alert('Error: '+e.message);}
  finally{_psLoading=false;if(btn){btn.textContent='Generate Portfolio';btn.style.opacity='1';}}
}

async function psRefresh(){
  if(!_psData)return;
  try{
    var r=await fetch('/api/portfolio/suggest/refresh?amount='+_psAmount);
    var d=await r.json();
    if(d.error)return;
    _psData=d;
    if(_psTab==='model'){var rc=document.getElementById('ps-results');if(rc)rc.innerHTML=psRenderModelResults(d);}
    var ts=document.getElementById('ps-last-ref');
    if(ts)ts.textContent='Refreshed '+new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});
  }catch(e){console.log('Refresh error:',e.message);}
}

async function psRegenerate(){
  if(_psLoading)return;
  _psLoading=true;
  try{
    var r=await fetch('/api/portfolio/suggest/regenerate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:_psAmount})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    _psData=d;
    psStartAutoRefresh();
    if(_psTab==='model'){var rc=document.getElementById('ps-results');if(rc)rc.innerHTML=psRenderModelResults(d);}
  }catch(e){alert('Error: '+e.message);}
  finally{_psLoading=false;}
}

// ── USER ACTIONS ──
async function psBuyStock(sym,qty,price,sl,tgt,conv){
  var actualQty=prompt('How many shares of '+sym+' did you buy? (suggested: '+qty+')',''+qty);
  if(!actualQty)return;
  var actualPrice=prompt('At what price? (current: ₹'+price+')',''+price);
  if(!actualPrice)return;
  try{
    var r=await fetch('/api/portfolio/buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sym:sym,qty:parseInt(actualQty),price:parseFloat(actualPrice),stopLoss:sl||null,target:tgt||null,conviction:conv,reason:'Swing Trade model suggestion',portfolioType:'SWING'})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ '+sym+' tracked as Swing Trade! Check My Holdings tab.');
    _psPositions=null; // force reload
  }catch(e){alert('Error: '+e.message);}
}

// Long Term buy — mirrors psBuyStock but tags the position as LONGTERM so
// My Holdings can show the strategy tag. Long-term picks don't carry SL or
// target (buy-and-hold horizon), so those are left null.
async function ltBuyStock(sym,qty,price,bucket,score){
  var actualQty=prompt('How many shares of '+sym+' did you buy? (suggested: '+qty+')',''+qty);
  if(!actualQty)return;
  var actualPrice=prompt('At what price? (current: ₹'+price+')',''+price);
  if(!actualPrice)return;
  try{
    var convLabel=bucket==='A'?'Strong Buy':bucket==='B'?'Buy':bucket==='C'?'Accumulate':'Watch';
    var r=await fetch('/api/portfolio/buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sym:sym,qty:parseInt(actualQty),price:parseFloat(actualPrice),stopLoss:null,target:null,conviction:convLabel,qualityScore:score||null,reason:'Long Term Varsity v2 pick (Bucket '+bucket+')',portfolioType:'LONGTERM'})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ '+sym+' tracked as Long Term! Check My Holdings tab.');
    _psPositions=null; // force reload
  }catch(e){alert('Error: '+e.message);}
}

async function psSellPosition(id,sym,price){
  var actualPrice=prompt('Sell '+sym+' at what price? (current: ₹'+price+')',''+price);
  if(!actualPrice)return;
  var reason=prompt('Reason for selling? (optional)','');
  try{
    var r=await fetch('/api/portfolio/sell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,price:parseFloat(actualPrice),reason:reason||null})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ Sold! P&L: '+(d.pnl>=0?'+':'')+'₹'+d.pnl.toFixed(0)+' ('+d.pnlPct+'%)');
    psLoadPositions();
  }catch(e){alert('Error: '+e.message);}
}

async function psAddPosition(id,sym,price){
  var qty=prompt('How many more shares of '+sym+' to add?','');
  if(!qty)return;
  var actualPrice=prompt('At what price?',''+price);
  if(!actualPrice)return;
  try{
    var r=await fetch('/api/portfolio/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,qty:parseInt(qty),price:parseFloat(actualPrice)})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ Added! New avg: ₹'+d.newAvg.toFixed(0)+', Total qty: '+d.newQty);
    psLoadPositions();
  }catch(e){alert('Error: '+e.message);}
}

function psStartAutoRefresh(){
  if(_psRefreshInt) clearInterval(_psRefreshInt);
  _psRefreshInt=setInterval(function(){
    if(!_psData)return;
    psRefresh();
    // Also refresh holdings if on that tab
    if(_psTab==='holdings') psLoadPositions();
  }, 60000);
  // Full regeneration every hour
  setInterval(function(){
    if(!_psData)return;
    psRegenerate();
  }, 3600000);
}

async function adminLoadUsers() {
  var el = document.getElementById('admin-users-list');
  if (!el) return;
  try {
    var r = await fetch('/api/admin/users');
    var users = await r.json();
    if (!Array.isArray(users)) { el.innerHTML = '<div style="color:var(--red)">Failed to load users</div>'; return; }
    if (users.length === 0) { el.innerHTML = 'No users found'; return; }
    var h = '<table style="width:100%;border-collapse:collapse">';
    h += '<tr style="border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-align:left">';
    h += '<th style="padding:6px 8px">Username</th><th style="padding:6px 8px">Role</th><th style="padding:6px 8px">Created</th><th style="padding:6px 8px">Last Login</th><th style="padding:6px 8px;text-align:right">Actions</th></tr>';
    users.forEach(function(u) {
      var created = u.created_at ? new Date(u.created_at).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'2-digit'}) : '-';
      var lastLogin = u.last_login ? new Date(u.last_login).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Never';
      var roleBadge = u.role === 'admin'
        ? '<span style="background:#f59e0b22;color:#f59e0b;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600">Admin</span>'
        : '<span style="background:#3b82f622;color:#3b82f6;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600">User</span>';
      h += '<tr style="border-bottom:1px solid var(--border2)">';
      h += '<td style="padding:8px;font-weight:600;color:var(--text)">' + u.username + '</td>';
      h += '<td style="padding:8px">' + roleBadge + '</td>';
      h += '<td style="padding:8px;color:var(--text3)">' + created + '</td>';
      h += '<td style="padding:8px;color:var(--text3)">' + lastLogin + '</td>';
      h += '<td style="padding:8px;text-align:right">';
      h += '<button onclick="adminResetPw(' + u.id + ',\'' + u.username + '\')" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:10px;color:#f59e0b;cursor:pointer;margin-right:4px">Reset PW</button>';
      if (u.username !== (_authUser && _authUser.username)) {
        h += '<button onclick="adminDeleteUser(' + u.id + ',\'' + u.username + '\')" style="background:#ef444422;border:1px solid #ef444444;border-radius:4px;padding:3px 8px;font-size:10px;color:#ef4444;cursor:pointer">Delete</button>';
      }
      h += '</td></tr>';
    });
    h += '</table>';
    el.innerHTML = h;
  } catch(e) { el.innerHTML = '<div style="color:var(--red)">' + e.message + '</div>'; }
}

async function adminCreateUser() {
  var uEl = document.getElementById('admin-new-user');
  var pEl = document.getElementById('admin-new-pass');
  var rEl = document.getElementById('admin-new-role');
  var msg = document.getElementById('admin-user-msg');
  if (!uEl.value.trim() || !pEl.value) { msg.textContent = '❌ Fill all fields'; msg.style.color = 'var(--red)'; return; }
  if (pEl.value.length < 6) { msg.textContent = '❌ Password min 6 chars'; msg.style.color = 'var(--red)'; return; }
  try {
    var r = await fetch('/api/admin/users', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: uEl.value.trim(), password: pEl.value, role: rEl.value })
    });
    var d = await r.json();
    if (!r.ok) { msg.textContent = '❌ ' + (d.error || 'Failed'); msg.style.color = 'var(--red)'; return; }
    msg.textContent = '✅ User ' + d.username + ' created'; msg.style.color = 'var(--green)';
    uEl.value = ''; pEl.value = '';
    adminLoadUsers();
  } catch(e) { msg.textContent = '❌ ' + e.message; msg.style.color = 'var(--red)'; }
}

async function adminDeleteUser(id, username) {
  if (!confirm('Delete user "' + username + '"? This cannot be undone.')) return;
  try {
    var r = await fetch('/api/admin/users/' + id, { method: 'DELETE' });
    var d = await r.json();
    if (!r.ok) { alert(d.error || 'Failed'); return; }
    adminLoadUsers();
  } catch(e) { alert(e.message); }
}

async function adminResetPw(id, username) {
  var newPw = prompt('New password for "' + username + '" (min 6 chars):');
  if (!newPw || newPw.length < 6) { if(newPw !== null) alert('Password must be at least 6 characters'); return; }
  try {
    var r = await fetch('/api/admin/users/' + id + '/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: newPw })
    });
    var d = await r.json();
    if (!r.ok) { alert(d.error || 'Failed'); return; }
    alert('Password reset for ' + username);
  } catch(e) { alert(e.message); }
}

var _adminPollTimer = null;
var _adminLogTimer  = null;
var _adminLogSince  = 0;

function adminLog(msg, level) {
  var el = document.getElementById('admin-log');
  if (!el) return;
  var t   = new Date().toLocaleTimeString('en-IN');
  var col = level === 'error' ? '#f87171' : level === 'warn' ? '#fbbf24' : '#94a3b8';
  var atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 20;
  el.innerHTML += '<div style="color:'+col+'"><span style="color:#475569">['+t+']</span> '+msg.replace(/</g,'&lt;')+'</div>';
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function adminClearLog() {
  var el = document.getElementById('admin-log');
  if (el) el.innerHTML = '';
}

function adminScrollLog() {
  var el = document.getElementById('admin-log');
  if (el) el.scrollTop = el.scrollHeight;
}

function adminStartLogPoll() {
  if (_adminLogTimer) clearInterval(_adminLogTimer);
  _adminLogSince = Date.now() - 60000; // start with last 60s of logs
  adminFetchLogs(true); // immediate first fetch
  _adminLogTimer = setInterval(adminFetchLogs, 3000); // poll every 3s
}

async function adminFetchLogs(initial) {
  var statusEl = document.getElementById('log-status');
  try {
    var r = await fetch('/api/admin/logs?since='+_adminLogSince);
    var d = await r.json();
    if (d.lines && d.lines.length) {
      d.lines.forEach(function(l) { adminLog(l.msg, l.level); });
      _adminLogSince = d.now;
    }
    if (statusEl) statusEl.textContent = '● Live';
    if (statusEl) statusEl.style.color = '#10b981';
  } catch(e) {
    if (statusEl) { statusEl.textContent = '○ Disconnected'; statusEl.style.color = '#ef4444'; }
  }
}

async function adminLoadStatus() {
  var el = document.getElementById('admin-status');
  if (!el) return;
  try {
    var r = await fetch('/api/admin/pipeline');
    var d = await r.json();

    var anyRunning = d.fundamentals?.running || d.scoring?.running;

    // Build status cards from unified pipeline response
    var univStatus = d.universe || {};
    var fundStatus = d.fundamentals || {};
    var scoreStatus = d.scoring || {};
    var kiteStatus = d.kite || {};

    var fundVal = fundStatus.running
      ? '⏳ ' + (fundStatus.progress?.done||0) + '/' + (fundStatus.progress?.total||'?') + ' syncing'
      : (fundStatus.count||0) + ' stocks';
    var fundSub = fundStatus.running ? 'Syncing from Screener.in...'
      : fundStatus.age || 'Never synced';

    var scoreVal = scoreStatus.running ? '⏳ Scoring...' : (scoreStatus.count||0) + ' stocks';
    var scoreSub = scoreStatus.running ? 'Fetching Kite candles...' : scoreStatus.age || 'Never scored';

    el.innerHTML =
      adminCard('🌐 Universe', (univStatus.count||0)+' stocks', univStatus.age||'Never synced', '#3b82f6') +
      adminCard('📊 Fundamentals', fundVal, fundSub, fundStatus.running?'#f59e0b':'#10b981') +
      adminCard('⚡ Scored', scoreVal, scoreSub, scoreStatus.running?'#f59e0b':'#10b981') +
      adminCard('🔗 Kite', kiteStatus.connected ? (kiteStatus.tokenValid ? '● Connected' : '⚠ Token expired') : '○ Disconnected', kiteStatus.connected ? (kiteStatus.tokenValid ? 'Token valid' : 'Re-auth needed') : 'No session', kiteStatus.tokenValid ? '#10b981' : '#ef4444');

    // Show uptime
    var uptimeEl = document.getElementById('pipeline-uptime');
    if (uptimeEl && d.uptime) {
      var h = Math.floor(d.uptime / 3600);
      var m = Math.floor((d.uptime % 3600) / 60);
      uptimeEl.textContent = 'Uptime: ' + (h > 0 ? h+'h ' : '') + m + 'm';
    }

    // Auto-poll while anything is running
    if (anyRunning) {
      if (!_adminPollTimer) _adminPollTimer = setInterval(adminLoadStatus, 5000);
    } else {
      if (_adminPollTimer) { clearInterval(_adminPollTimer); _adminPollTimer = null; }
    }
  } catch(e) {
    el.innerHTML = '<div style="color:#ef4444;font-size:11px;padding:12px">Status load error: '+e.message+'</div>';
  }
}

function adminCard(title, value, sub, color) {

    +'<div style="font-size:10px;color:var(--text3);margin-bottom:4px">'+title+'</div>'

async function adminUploadScreenerCSV(inputEl) {
  var file = inputEl.files[0];
  if (!file) return;
  inputEl.value = ''; // reset so same file can be re-uploaded
  var msgEl = document.getElementById('admin-force-msg');
  if (msgEl) { msgEl.textContent = '⏳ Uploading ' + file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)...'; msgEl.style.color = '#f59e0b'; }
  try {
    var text = await file.text();
    var r = await fetch('/api/fundamentals/import', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: text
    });
    var d = await r.json();
    if (d.error) throw new Error(d.error);
    var msg = '✅ Imported <b>' + d.imported + '</b> stocks (' + (d.matchedCols||'?') + ' columns matched)';
    if (d.unmatchedCols && d.unmatchedCols.length > 0) msg += '<br><span style="color:#f59e0b;font-size:9px">⚠ Unmatched: ' + d.unmatchedCols.slice(0,10).join(', ') + '</span>';
    if (msgEl) { msgEl.innerHTML = msg; msgEl.style.color = '#10b981'; }
    setTimeout(adminLoadStatus, 3000);
    setTimeout(function() { if (msgEl) msgEl.textContent = ''; }, 15000);
  } catch(e) {
    if (msgEl) { msgEl.textContent = '❌ CSV import failed: ' + e.message; msgEl.style.color = '#ef4444'; }
  }
}

// AUTH — Login, logout, session management
// ══════════════════════════════════════════════════════════════════════════════
var _authToken = null;
var _authUser = null;

// Wrap fetch to auto-attach auth token
var _origFetch = window.fetch;
window.fetch = function(url, opts) {
  opts = opts || {};
  if (_authToken && typeof url === 'string' && url.startsWith('/api') && !url.startsWith('/api/auth/login')) {
    opts.headers = opts.headers || {};
    if (typeof opts.headers === 'object' && !Array.isArray(opts.headers)) {
      opts.headers['Authorization'] = 'Bearer ' + _authToken;
    }
  }
  return _origFetch.call(window, url, opts).then(function(resp){
    // If 401 on any API call, force re-login
    if(resp.status === 401 && typeof url === 'string' && url.startsWith('/api') && !url.startsWith('/api/auth')){
      _authToken = null;
      _authUser = null;
      try{ localStorage.removeItem('pt_token'); }catch(e){}
      showLogin();
    }
    return resp;
  });
};

  // Show/hide admin tab based on role
  var adminBtn = document.getElementById('mode-admin');
  if(adminBtn) adminBtn.style.display = (_authUser && _authUser.role === 'admin') ? '' : 'none';
  // Start inactivity timer
  _resetInactivityTimer();
}

async function doLogin() {
  var btn = document.getElementById('login-btn');
  var errEl = document.getElementById('login-error');
  var username = document.getElementById('login-username').value.trim();
  var password = document.getElementById('login-password').value;
  if(!username || !password) { errEl.textContent = 'Enter username and password'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var r = await _origFetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || 'Login failed'; errEl.style.display = 'block'; return; }
    _authToken = d.token;
    _authUser = { username: d.username, role: d.role };
    try { localStorage.setItem('pt_token', d.token); } catch(e){}
    showApp();
    _init();
  } catch(e) {
    errEl.textContent = 'Connection error'; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doLogout() {
  try { await _origFetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + _authToken } }); } catch(e){}
  _authToken = null;
  _authUser = null;
  try { localStorage.removeItem('pt_token'); } catch(e){}
  showLogin();
}

// ── Inactivity auto-logout (disabled) ──
function _resetInactivityTimer() {}
function _clearInactivityTimer() {}

// On page load — check for saved session
(async function checkSession() {
  var saved = null;
  try { saved = localStorage.getItem('pt_token'); } catch(e){}
  if (!saved) { showLogin(); return; }
  try {
    var r = await _origFetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + saved } });
    if (!r.ok) { showLogin(); return; }
    var d = await r.json();
    _authToken = saved;
    _authUser = { username: d.username, role: d.role };
    showApp();
    _init();
  } catch(e) { showLogin(); }
})();
</script>
