    var bg = idx%2===0?'var(--bg)':'var(--bg2)';
    var isTop3 = idx < 3 && stockRecFilter!=='ALL' || allStocks.indexOf(s)<3;
    var rowBorder = isTop3 ? 'border-left:3px solid #f59e0b;' : '';
    var gc = grpCol[s.grp]||'var(--text3)';
    var scoreCol = s.score>=75?'var(--green)':s.score>=55?'#f59e0b':'var(--red)';

    html += '<tr data-ri="'+idx+'" style="'+rowBorder+'border-bottom:1px solid var(--border2);background:'+bg+'">'
      +'<td style="padding:5px 8px;text-align:right;color:var(--text3);position:sticky;left:0;background:'+bg+';z-index:3">'+(s.rank)+'</td>'
      +'<td style="padding:5px 8px;position:sticky;left:36px;background:'+bg+';z-index:3;border-right:0">'
        +'<div style="font-weight:600">'+s.sym+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">'+s.sector+'</div>'
      +'</td>'
      +'<td style="padding:5px 8px;text-align:center"><span style="background:'+gc+'22;color:'+gc+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">'+s.grp+'</span></td>'
      +'<td style="padding:5px 8px;text-align:right;font-weight:700;color:'+scoreCol+'">'+s.score+'</td>'
      +'<td style="padding:5px 8px;text-align:right;border-right:2px solid var(--border3)">'+(s.price?'₹'+parseFloat(s.price).toFixed(1):'-')+'</td>';

    activeCols.forEach(function(col){
      html += '<td style="padding:5px 8px;text-align:right'+(col.br?';border-right:1px solid var(--border2)':'')+'">'
        +col.r(s)+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  if(filtered.length > SHOW_INITIAL && !stockRecShowAll){
    html += '<div style="text-align:center;padding:12px 0">'
      +'<span onclick="stockRecShowAll=true;renderStockRec()" style="cursor:pointer;font-size:11px;color:#f59e0b;font-weight:600;padding:6px 22px;border:1px solid #f59e0b60;border-radius:20px;display:inline-block;background:var(--bg2)">'
      +'Show all '+(filtered.length-SHOW_INITIAL)+' more ▾</span></div>';
  } else if(stockRecShowAll && filtered.length > SHOW_INITIAL){
    html += '<div style="text-align:center;padding:12px 0">'
      +'<span onclick="stockRecShowAll=false;renderStockRec()" style="cursor:pointer;font-size:11px;color:#f59e0b;font-weight:600;padding:6px 22px;border:1px solid #f59e0b60;border-radius:20px;display:inline-block;background:var(--bg2)">'
      +'Show less ▴</span></div>';
  }

  html += '</div>'; // end left (table) column

  html += '</div>'; // end flex row

  html += '<div style="border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--bg2);margin-top:16px">';
  html += '<div style="font-weight:600;font-size:12px;margin-bottom:10px">Scoring Methodology - 100 Points</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  var pillars=[
    {name:'Quality',pts:25,c:'#f59e0b',factors:'ROE · ROA/ROCE · Debt/Equity · Operating Margin · Percentile vs sector peers'},
    {name:'Value',pts:20,c:'var(--green)',factors:'P/E ratio · P/B ratio · PEG (growth-adj value) · Dividend Yield · NSE Value 50 methodology'},
    {name:'Momentum',pts:20,c:'var(--blue)',factors:'52-week price return · % from 52w high · Beta · NSE Momentum index methodology'},
    {name:'Growth',pts:20,c:'#8b5cf6',factors:'Revenue growth YoY · EPS growth YoY · Analyst consensus (Kite + Screener.in)'},
    {name:'Technical',pts:15,c:'var(--red)',factors:'Price vs 50 DMA · Price vs 200 DMA · Golden/Death Cross · Volume accumulation'},
  ];
  pillars.forEach(function(p){
    html += '<div style="background:var(--bg3);border-radius:8px;padding:8px 12px;flex:1;min-width:150px">'
      +'<div style="color:'+p.c+';font-weight:700;font-size:11px">'+p.name+' <span style="opacity:.7">'+p.pts+' pts</span></div>'
      +'<div style="color:var(--text3);font-size:10px;margin-top:4px;line-height:1.5">'+p.factors+'</div>'
      +'</div>';
  });
  html += '</div>';
  html += '<div style="margin-top:10px;font-size:10px;color:var(--text4)">Data: Kite + Screener.in v11 fundamentals · All scores percentile-ranked within sector · Refreshed daily 7AM IST · Source: NSE Quality/Value/Momentum index methodology</div>';
  html += '</div>';

  html += '</div>';
  cont.innerHTML = html;
}

function buildStockCard(s, medal){
  var gc = {NIFTY50:'var(--blue)',NEXT50:'#8b5cf6',MIDCAP:'#f59e0b',SMALLCAP:'#10b981'}[s.grp]||'var(--text3)';
  var sc = s.score>=75?'var(--green)':s.score>=55?'#f59e0b':'var(--red)';
  var isFallenAngel = s.score>=50 && (s.pctFromHigh||0)<=-20 && (s.rsi||50)<=50;
  var px = s.price;

  var h='<div style="background:var(--bg2);border:1.5px solid '+(isFallenAngel?'rgba(245,158,11,.4)':'var(--border)')+';border-radius:12px;padding:14px;position:relative;overflow:hidden">';

  // Fallen Angel ribbon
  if(isFallenAngel){
    var fallPct=Math.abs(s.pctFromHigh||0).toFixed(0);
    h+='<div style="position:absolute;top:0;right:0;background:#f59e0b;color:#000;font-size:10px;font-weight:800;padding:3px 10px;border-radius:0 12px 0 8px">🔥 -'+fallPct+'% FROM PEAK</div>';
  }

  // -- HEADER (Phase 4: Composite + Conviction) --------------------
  var convClass = (s.conviction||'watch').toLowerCase().replace(/\s+/g,'-');
  var horizonClass = (s.horizon||'swing').toLowerCase();
  h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:20px">'+medal+'</span>';
  h+='<div>';
  h+='<div style="font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px">'+s.sym;
  h+=' <span class="conviction-pill '+convClass+'">'+(s.conviction||'Watch')+'</span>';
  h+=' <span class="horizon-pill '+horizonClass+'">'+(s.horizon||'swing')+'</span>';
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--text3)">'+s.name+(s.sector?' · '+s.sector:'')+'</div>';
  h+='</div></div>';
  h+='<div style="text-align:right">';
  h+='<div style="font-size:21px;font-weight:800;color:'+sc+'">'+(s.composite_score||s.score)+'<span style="font-size:10px;color:var(--text4);font-weight:400">/100</span></div>';
  if(px) h+='<div style="font-size:13px;font-weight:700">₹'+px.toFixed(1)+'</div>';
  h+='</div></div>';

  // Composite score breakdown bar (FA + TA + Momentum + Risk)
  var fa=s.fa_score||0, ta=s.ta_score||0, mom=s.momentum_score||0, risk=s.risk_score||0;
  var total4=fa+ta+mom+risk||1;
  h+='<div class="score-bar" style="margin-bottom:6px" title="FA:'+fa+' TA:'+ta+' Mom:'+mom+' Risk:'+risk+'">';
  h+='<div class="seg fa" style="width:'+(fa/total4*100).toFixed(0)+'%"></div>';
  h+='<div class="seg ta" style="width:'+(ta/total4*100).toFixed(0)+'%"></div>';
  h+='<div class="seg mom" style="width:'+(mom/total4*100).toFixed(0)+'%"></div>';
  h+='<div class="seg risk" style="width:'+(risk/total4*100).toFixed(0)+'%"></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:8px;font-size:10px;color:var(--text3);margin-bottom:10px">';
  h+='<span><span style="color:var(--blue)">●</span> FA:'+fa+'</span>';
  h+='<span><span style="color:var(--green)">●</span> TA:'+ta+'</span>';
  h+='<span><span style="color:var(--amber)">●</span> Mom:'+mom+'</span>';
  h+='<span><span style="color:var(--purple)">●</span> Risk:'+risk+'</span>';
  h+='</div>';

  // Tags row
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">';
  h+='<span style="background:'+gc+'22;color:'+gc+';border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">'+s.grp+'</span>';
  if(s.sector) h+='<span style="background:var(--bg3);color:var(--text3);border-radius:4px;padding:1px 7px;font-size:10px">'+s.sector+'</span>';
  if(s.goldenCross===true)  h+='<span style="background:rgba(245,158,11,.15);color:#f59e0b;border-radius:4px;padding:1px 7px;font-size:10px">⚡Golden Cross</span>';
  if(s.goldenCross===false) h+='<span style="background:rgba(239,68,68,.1);color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px">Death Cross</span>';
  if(s.supertrendSig==='bullish') h+='<span style="background:rgba(34,197,94,.1);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px">ST Bullish</span>';
  if(s.supertrendSig==='bearish') h+='<span style="background:rgba(239,68,68,.1);color:var(--red);border-radius:4px;padding:1px 7px;font-size:10px">ST Bearish</span>';
  if(s.accumDist==='Accumulation') h+='<span style="background:rgba(59,130,246,.1);color:var(--blue);border-radius:4px;padding:1px 7px;font-size:10px">Accumulation</span>';
  if(s.bullishDiv) h+='<span style="background:rgba(34,197,94,.15);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px">RSI Div ⬆</span>';
  if(isFallenAngel&&(s.rsi||50)<=35) h+='<span style="background:rgba(34,197,94,.15);color:var(--green);border-radius:4px;padding:1px 7px;font-size:10px">RSI Oversold</span>';
  if(s.alreadyOwn) h+='<span style="background:rgba(139,92,246,.15);color:#8b5cf6;border-radius:4px;padding:1px 7px;font-size:10px">✓ You own this</span>';
  h+='</div>';

  // -- FALLEN ANGEL SCORECARD ---------------------------------------
  if(isFallenAngel && s.fallenScore!=null){
    var fc=s.fallenColor||'#f59e0b';
    h+='<div style="background:'+fc+'10;border:1px solid '+fc+'40;border-radius:10px;padding:10px;margin-bottom:10px">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
    h+='<div style="font-size:10px;font-weight:700;color:'+fc+'">'+s.fallenIcon+' Fallen Angel Score</div>';
    h+='<div style="font-size:18px;font-weight:800;color:'+fc+'">'+s.fallenScore+'<span style="font-size:10px;font-weight:400;color:var(--text3)">/100</span></div>';
    h+='</div>';
    h+='<div style="background:var(--bg3);border-radius:3px;height:5px;margin-bottom:7px;overflow:hidden">';
    h+='<div style="height:100%;border-radius:3px;background:'+fc+';width:'+s.fallenScore+'%"></div></div>';
    h+='<div style="font-size:11px;font-weight:700;color:'+fc+';margin-bottom:7px">'+s.fallenVerdict+'</div>';
    if(s.fallenHits){
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
      Object.entries(s.fallenHits).forEach(function(e){
        var pts=e[1], pos=pts>=0;
        h+='<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 6px;background:'+(pos?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)')+';border-radius:4px">';
        h+='<span style="color:var(--text3)">'+e[0]+'</span>';
        h+='<span style="font-weight:700;color:'+(pos?'var(--green)':'var(--red)')+'">'+( pts>0?'+':'')+pts+'</span>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }

  // -- SHOW MORE toggle (wraps Fundamentals + Technicals + extras) --
  var smId='sm-'+s.sym;
  h+='<div style="text-align:center;margin-bottom:6px">';
  h+='<button onclick="var d=document.getElementById(\''+smId+'\');var b=this;if(d.style.display===\'none\'){d.style.display=\'block\';b.textContent=\'▲ Show less\';}else{d.style.display=\'none\';b.textContent=\'▼ Show more\';}" '
   +'style="background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);border-radius:5px;padding:3px 14px;font-size:10px;font-weight:700;cursor:pointer;width:100%">▼ Show more</button>';
  h+='</div>';
  h+='<div id="'+smId+'" style="display:none">';

  // -- FUNDAMENTALS SECTION ----------------------------------------
  h+='<div style="font-size:10px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Fundamentals</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">';
  function mc(l,v,c,sub){
    return '<div style="background:var(--bg3);border-radius:6px;padding:5px 6px;text-align:center">'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:1px">'+l+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:'+(c||'var(--text)')+'">'+v+'</div>'
      +(sub?'<div style="font-size:10px;color:var(--text4)">'+sub+'</div>':'')
      +'</div>';
  }
  var na='<span style="color:var(--text4)">--</span>';
  h+=mc('ROE',    s.roe!=null?s.roe.toFixed(1)+'%':na,    s.roe>=20?'var(--green)':s.roe>=15?'#f59e0b':s.roe>=10?'var(--text)':'var(--red)',   s.roe>=20?'Excellent':s.roe>=15?'Good':s.roe>=10?'Average':'Weak');
  h+=mc('D/E',    s.debtToEq!=null?s.debtToEq.toFixed(2)+'x':na, s.debtToEq<=0.3?'var(--green)':s.debtToEq<=1?'#f59e0b':s.debtToEq<=2?'var(--text)':'var(--red)', s.debtToEq<=0.3?'Debt-free':s.debtToEq<=1?'Low':s.debtToEq<=2?'Moderate':'High');
  h+=mc('P/E',    s.pe!=null?s.pe.toFixed(1)+'x':na,      s.pe<15?'var(--green)':s.pe<25?'#f59e0b':s.pe<40?'var(--text)':'var(--red)',        s.pe<15?'Cheap':s.pe<25?'Fair':s.pe<40?'Premium':'Expensive');
  h+=mc('PEG',    s.peg!=null?s.peg.toFixed(2)+'x':na,    s.peg<1?'var(--green)':s.peg<2?'#f59e0b':'var(--red)',                              s.peg<1?'Underval':s.peg<2?'Fair':'Overval');
  h+=mc('Rev Gr', s.revGrowth!=null?'+'+s.revGrowth.toFixed(1)+'%':na, s.revGrowth>=15?'var(--green)':s.revGrowth>=5?'#f59e0b':s.revGrowth>=0?'var(--text)':'var(--red)', s.revGrowth>=15?'Strong':s.revGrowth>=5?'Moderate':'Slow');
  h+=mc('EPS Gr', s.earGrowth!=null?(s.earGrowth>0?'+':'')+s.earGrowth.toFixed(1)+'%':na, s.earGrowth>=20?'var(--green)':s.earGrowth>=10?'#f59e0b':s.earGrowth>=0?'var(--text)':'var(--red)', s.earGrowth>=20?'Strong':s.earGrowth>=0?'Growing':'Declining');
  h+=mc('Op Mgn', s.opMargin!=null?s.opMargin.toFixed(1)+'%':na,   s.opMargin>=20?'var(--green)':s.opMargin>=10?'#f59e0b':'var(--text)',     s.opMargin>=20?'High':s.opMargin>=10?'OK':'Low');
  h+=mc('Beta',   s.beta!=null?s.beta.toFixed(2):na,               s.beta<0.8?'var(--green)':s.beta<1.3?'var(--text)':'var(--red)',          s.beta<0.8?'Low Risk':s.beta<1.3?'Market':'High Risk');
  h+='</div>';

  // -- TECHNICALS SECTION ------------------------------------------
  h+='<div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Technicals</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">';
  var above200=px&&s.dma200?px>s.dma200:null;
  var above50=px&&s.dma50?px>s.dma50:null;
  h+=mc('200 DMA', s.dma200?'₹'+s.dma200.toFixed(0):na, above200?'var(--green)':'var(--red)', above200?'Above':'Below');
  h+=mc('50 DMA',  s.dma50?'₹'+s.dma50.toFixed(0):na,  above50?'var(--green)':'var(--red)',  above50?'Above':'Below');
  h+=mc('RSI-14',  s.rsi!=null?s.rsi.toFixed(0):na,       s.rsi<35?'var(--green)':s.rsi<50?'#f59e0b':s.rsi<70?'var(--text)':'var(--red)', s.rsi<35?'Oversold':s.rsi<50?'Neutral':s.rsi<70?'Healthy':'Overbought');
  h+=mc('MACD',    s.macdHist!=null?(s.macdHist>0?'+':'')+s.macdHist:na, s.macdBull?'var(--green)':'var(--red)', s.macdBull?'Bullish':'Bearish');
  h+=mc('ADX',     s.adx!=null?s.adx.toFixed(0):na,       s.adx>25?'var(--green)':'#f59e0b',  s.adx>35?'V.Strong':s.adx>25?'Strong':'Weak');
  h+=mc('BB%B',    s.bbPct!=null?(s.bbPct*100).toFixed(0)+'%':na, s.bbPct<0.2?'var(--green)':s.bbPct>0.8?'var(--red)':'var(--text)', s.bbPct<0.2?'Lower BB':s.bbPct>0.8?'Upper BB':'Mid');
  h+=mc('Volume',  s.volRatio!=null?s.volRatio.toFixed(2)+'x':na, s.volRatio>1.3?'var(--green)':s.volRatio<0.7?'var(--red)':'var(--text)', s.volTrend||'');
  h+=mc('OBV',     s.obvRising!=null?(s.obvRising?'Rising':'Falling'):na, s.obvRising?'var(--green)':'var(--red)', 'On-bal vol');
  h+='</div>';

  // -- PRICE ACTION ------------------------------------------------
  h+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Price Action</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px">';
  h+=mc('1M Ret',  s.change1m!=null?(s.change1m*100>0?'+':'')+( s.change1m*100).toFixed(1)+'%':na, s.change1m>0?'var(--green)':'var(--red)','');
  h+=mc('3M Ret',  s.change3m!=null?(s.change3m*100>0?'+':'')+( s.change3m*100).toFixed(1)+'%':na, s.change3m>0?'var(--green)':'var(--red)','');
  h+=mc('6M Ret',  s.change6m!=null?(s.change6m*100>0?'+':'')+( s.change6m*100).toFixed(1)+'%':na, s.change6m>0?'var(--green)':'var(--red)','');
  h+=mc('1Y Ret',  s.change52w!=null?(s.change52w*100>0?'+':'')+(s.change52w*100).toFixed(1)+'%':na,s.change52w>0?'var(--green)':'var(--red)','');
  h+=mc('52W Hi',  s.wk52Hi?'₹'+s.wk52Hi.toFixed(0):na, 'var(--text)',s.pctFromHigh!=null?s.pctFromHigh.toFixed(1)+'% away':'');
  h+=mc('52W Lo',  s.wk52Lo?'₹'+s.wk52Lo.toFixed(0):na, 'var(--text)',px&&s.wk52Lo?'+'+(((px-s.wk52Lo)/s.wk52Lo)*100).toFixed(1)+'% above':'');
  h+=mc('vs 200D', s.pctAbove200!=null?(s.pctAbove200>0?'+':'')+s.pctAbove200+'%':na, s.pctAbove200>0&&s.pctAbove200<25?'var(--green)':s.pctAbove200>30?'#f59e0b':'var(--red)','from 200DMA');
  h+=mc('Vol%',    s.annualVol!=null?s.annualVol+'%':na,   s.annualVol<25?'var(--green)':s.annualVol<40?'var(--text)':'var(--red)','Annual vol');
  h+='</div>';

  // -- BUY ZONE for fallen angels ----------------------------------
  if(isFallenAngel&&(s.dma50||s.dma200)){
    h+='<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:8px 10px;margin-bottom:8px">';
    h+='<div style="font-size:10px;font-weight:700;color:#f59e0b;margin-bottom:4px">Target Buy Zones</div>';
    h+='<div style="font-size:10px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap">';
    if(s.dma50)  h+='<span>50DMA: <b>₹'+s.dma50.toFixed(0)+'</b></span>';
    if(s.dma200) h+='<span>200DMA: <b>₹'+s.dma200.toFixed(0)+'</b></span>';
    if(s.rsi<=35)h+='<span style="color:var(--green)">RSI '+s.rsi.toFixed(0)+' - Oversold</span>';
    h+='</div></div>';
  }

  // -- QUICK VERDICT (now uses server-side conviction) ---------------
  var convColor = s.conviction_color || (s.conviction==='Strong Buy'?'var(--green)':s.conviction==='Buy'?'var(--green)':s.conviction==='Accumulate'?'var(--amber)':s.conviction==='Watch'?'var(--text3)':'var(--red)');
  var compPct = Math.min(100, s.composite_score || s.score || 0);
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
  h+='<div style="flex:1;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden">';
  h+='<div style="height:100%;background:'+convColor+';width:'+compPct+'%;border-radius:4px"></div></div>';
  h+='<span style="font-size:11px;font-weight:700;color:'+convColor+';white-space:nowrap">'+(s.conviction||'Watch')+'</span>';
  h+='</div>';

  // -- OVERSOLD SIGNAL BADGES (new: Stochastic + BB %B) --------------------
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">';

async function startMiroFish() {
  mfishData = null;
  var cont = document.getElementById('main-content');
  if(cont) {
    cont.innerHTML = '<div style="padding:48px;text-align:center">'
      + '<div style="font-size:32px;margin-bottom:16px">🐟</div>'
      + '<div style="font-size:14px;color:#bc8cff;font-weight:600;margin-bottom:8px">MiroFish simulation running...</div>'
      + '<div style="font-size:12px;color:var(--text3);margin-bottom:20px">5 agents analyzing Fallen Angels in parallel · ~60-90 seconds</div>'
      + '<div style="font-size:11px;color:var(--text3)">Fundamental · Technical · Contrarian · Risk · Quant</div>'
      + '</div>';
  }
  try {
    await fetch('/api/mirofish/run', {method:'POST'});
    if(mfishPolling) clearInterval(mfishPolling);
    mfishPolling = setInterval(async function(){
      if(S.mode!=="mirofish"){ clearInterval(mfishPolling); mfishPolling=null; return; }
      var st = await fetch('/api/mirofish/status').then(function(r){return r.json();}).catch(function(){return {};});
      if(!st.running && st.hasResult){
        clearInterval(mfishPolling); mfishPolling=null;
        // Refresh global lookup map so Fallen Angel cards update immediately
        await loadMiroFishLookup();
        renderMiroFish();
      }
    }, 6000);
  } catch(e) {
    if(cont) cont.innerHTML = '<div style="padding:24px;color:var(--red)">Error: '+e.message+'</div>';
  }
}

  try {
    var resp=await fetch('/api/mirofish/fa-predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      sym:s.sym, name:stock?stock.name:s.sym, sector:s.sector, grp:s.grp,
      price:s.price, pctFromHigh:s.pctFromHigh, wk52Hi:s.wk52Hi, wk52Lo:s.wk52Lo,
      pctAbove200:s.pctAbove200, dma200:s.dma200, dma50:s.dma50,
      roe:s.roe, debtToEq:s.debtToEq, pe:s.pe, opMargin:s.opMargin,
      earGrowth:s.earGrowth, revGrowth:s.revGrowth,
      rsi:s.rsi, stochK:s.stochK, bbPct:s.bbPct,
      adx:s.adx, beta:s.beta, annualVol:s.annualVol,

      target:stock?stock.target:null,     targetReason:stock?stock.targetReason:null,
      rrRatio:stock?stock.rrRatio:null,   goodRR:stock?stock.goodRR:null,
    })});
    var d=await resp.json();
    if(d.error) throw new Error(d.error);

    _fillFACard(cardId,sym,d);
  } catch(e) {
    if(txt){txt.style.color='var(--red)';txt.textContent=e.message.includes('ANTHROPIC')?'Set ANTHROPIC_API_KEY in Railway':'Error: '+e.message;}

}

function _fillFACard(cardId, sym, d) {
  var txt=document.getElementById('txt-'+cardId);
  var px=d.current_price||0;
  var horizons={'6M':d.price_6m,'1Y':d.price_1y,'2Y':d.price_2y,'3Y':d.price_3y};
  Object.keys(horizons).forEach(function(yr){
    var target=horizons[yr];
    var valEl=document.getElementById('val-'+cardId+'-'+yr);
    var pctEl=document.getElementById('pct-'+cardId+'-'+yr);
    if(!valEl) return;
    if(target&&px){
      var gain=((target/px-1)*100);
      valEl.textContent='\u20b9'+Math.round(target).toLocaleString('en-IN');
      valEl.style.color=gain>=0?'var(--green)':'var(--red)';
      if(pctEl){pctEl.textContent=(gain>=0?'+':'')+gain.toFixed(0)+'%';pctEl.style.color=gain>=0?'var(--green)':'var(--red)';}
    } else { valEl.textContent='\u2014'; }
  });
  if(txt){
    txt.style.color='var(--text2)';
    var vc=d.verdict&&d.verdict.includes('Strong')?'#22c55e':d.verdict&&d.verdict.includes('Likely')?'#86efac':'#f59e0b';
    txt.innerHTML=(d.verdict?'<span style="color:'+vc+';font-weight:700">'+d.verdict+'</span> &middot; ':'')+
      (d.analysis||'')+
      (d.key_risk?'<br><span style="color:var(--red);font-size:10px">&#9888; '+d.key_risk+'</span>':'')+
      '<br><span style="color:var(--text4);font-size:10px">Confidence: '+(d.confidence||'\u2014')+' &middot; MiroFish 5-agent analysis</span>';
  }
}

function psFmt(n){
  if(n==null||isNaN(n))return '—';
  if(Math.abs(n)>=1e7) return '₹'+(n/1e7).toFixed(2)+'Cr';
  if(Math.abs(n)>=1e5) return '₹'+(n/1e5).toFixed(2)+'L';
  return '₹'+Math.round(n).toLocaleString('en-IN');
}

// ── PERFORMANCE TAB ──
function psRenderPerformanceTab(){
  var h='';
  if(!_psPerf){

  }
  var st=_psPerf.stats||{};

  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px">';

  h+=sc('Total Trades',st.totalTrades,'var(--text)');
  h+=sc('Win Rate',st.winRate+'%',st.winRate>=50?'#22c55e':'#ef4444');
  h+=sc('Wins / Losses',st.wins+' / '+st.losses,st.wins>st.losses?'#22c55e':'#ef4444');
  h+=sc('Total P&L',(st.totalRealised>=0?'+':'')+psFmt(st.totalRealised),st.totalRealised>=0?'#22c55e':'#ef4444');
  h+=sc('Avg Win',psFmt(st.avgWin),'#22c55e');
  h+=sc('Avg Loss',psFmt(st.avgLoss),'#ef4444');
  h+='</div>';

  // Closed trades
  var ct=_psPerf.closedTrades||[];
  if(ct.length){
    h+='<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">Closed Trades</div>';
    h+='<div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">';

    h+='<thead><tr style="background:var(--bg3);border-bottom:1px solid var(--border)">';
    ['Stock','Buy Date','Sell Date','P&L','P&L%'].forEach(function(hdr){
      h+='<th style="padding:7px 6px;text-align:left;font-size:10px;color:var(--text3);font-weight:700">'+hdr+'</th>';
    });
    h+='</tr></thead><tbody>';
    ct.forEach(function(t,i){
      var c2=(t.realised_pnl||0)>=0?'#22c55e':'#ef4444';
      h+='<tr style="background:'+(i%2===0?'var(--bg2)':'var(--bg)')+'">';
      h+='<td style="padding:5px;font-weight:700;color:var(--text)">'+t.sym+'</td>';
      h+='<td style="padding:5px;font-size:10px;color:var(--text3)">'+(t.buy_date?new Date(t.buy_date).toLocaleDateString('en-IN'):'—')+'</td>';
      h+='<td style="padding:5px;font-size:10px;color:var(--text3)">'+(t.sell_date?new Date(t.sell_date).toLocaleDateString('en-IN'):'—')+'</td>';
      h+='<td style="padding:5px;font-weight:700;color:'+c2+'">'+(t.realised_pnl>=0?'+':'')+'₹'+(+t.realised_pnl).toFixed(0)+'</td>';
      h+='<td style="padding:5px;font-weight:700;color:'+c2+'">'+(t.realised_pct>=0?'+':'')+(+t.realised_pct).toFixed(1)+'%</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  } else {
    h+='<div style="text-align:center;padding:30px;color:var(--text3);font-size:12px">No closed trades yet. Sell positions to see performance history.</div>';
  }
  return h;
}

// ── API CALLS ──
async function psGenerate(){
  if(_psLoading)return;
  _psLoading=true;
  var btn=document.getElementById('ps-gen-btn');
  if(btn){btn.textContent='⏳ Analyzing...';btn.style.opacity='0.6';}
  try{
    var amt=parseFloat(document.getElementById('ps-amount').value)||100000;
    _psAmount=amt;
    var r=await fetch('/api/portfolio/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:amt})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    _psData=d;
    psStartAutoRefresh();
    var rc=document.getElementById('ps-results');
    if(rc) rc.innerHTML=psRenderModelResults(d);
  }catch(e){alert('Error: '+e.message);}
  finally{_psLoading=false;if(btn){btn.textContent='Generate Portfolio';btn.style.opacity='1';}}
}

async function psRefresh(){
  if(!_psData)return;
  try{
    var r=await fetch('/api/portfolio/suggest/refresh?amount='+_psAmount);
    var d=await r.json();
    if(d.error)return;
    _psData=d;
    if(_psTab==='model'){var rc=document.getElementById('ps-results');if(rc)rc.innerHTML=psRenderModelResults(d);}
    var ts=document.getElementById('ps-last-ref');
    if(ts)ts.textContent='Refreshed '+new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});
  }catch(e){console.log('Refresh error:',e.message);}
}

async function psRegenerate(){
  if(_psLoading)return;
  _psLoading=true;
  try{
    var r=await fetch('/api/portfolio/suggest/regenerate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:_psAmount})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    _psData=d;
    psStartAutoRefresh();
    if(_psTab==='model'){var rc=document.getElementById('ps-results');if(rc)rc.innerHTML=psRenderModelResults(d);}
  }catch(e){alert('Error: '+e.message);}
  finally{_psLoading=false;}
}

async function psLoadPositions(){
  try{
    var r=await fetch('/api/portfolio/positions');
    _psPositions=await r.json();
    if(_psTab==='holdings'){var tc=document.getElementById('ps-tab-content');if(tc)tc.innerHTML=psRenderHoldingsTab();}
  }catch(e){console.log('Load positions error:',e.message);}
}

async function psLoadSignals(){
  try{
    var r=await fetch('/api/portfolio/signals?limit=50');
    _psSignals=await r.json();
    if(_psTab==='signals'){var tc=document.getElementById('ps-tab-content');if(tc)tc.innerHTML=psRenderSignalsTab();}
  }catch(e){console.log('Load signals error:',e.message);}
}

async function psLoadPerformance(){
  try{
    var r=await fetch('/api/portfolio/performance');
    _psPerf=await r.json();
    if(_psTab==='performance'){var tc=document.getElementById('ps-tab-content');if(tc)tc.innerHTML=psRenderPerformanceTab();}
  }catch(e){console.log('Load performance error:',e.message);}
}

// ── USER ACTIONS ──
async function psBuyStock(sym,qty,price,sl,tgt,conv){
  var actualQty=prompt('How many shares of '+sym+' did you buy? (suggested: '+qty+')',''+qty);
  if(!actualQty)return;
  var actualPrice=prompt('At what price? (current: ₹'+price+')',''+price);
  if(!actualPrice)return;
  try{
    var r=await fetch('/api/portfolio/buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sym:sym,qty:parseInt(actualQty),price:parseFloat(actualPrice),stopLoss:sl||null,target:tgt||null,conviction:conv,reason:'Model portfolio suggestion'})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ '+sym+' tracked! Check My Holdings tab.');
    _psPositions=null; // force reload
  }catch(e){alert('Error: '+e.message);}
}

async function psSellPosition(id,sym,price){
  var actualPrice=prompt('Sell '+sym+' at what price? (current: ₹'+price+')',''+price);
  if(!actualPrice)return;
  var reason=prompt('Reason for selling? (optional)','');
  try{
    var r=await fetch('/api/portfolio/sell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,price:parseFloat(actualPrice),reason:reason||null})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ Sold! P&L: '+(d.pnl>=0?'+':'')+'₹'+d.pnl.toFixed(0)+' ('+d.pnlPct+'%)');
    psLoadPositions();
  }catch(e){alert('Error: '+e.message);}
}

async function psAddPosition(id,sym,price){
  var qty=prompt('How many more shares of '+sym+' to add?','');
  if(!qty)return;
  var actualPrice=prompt('At what price?',''+price);
  if(!actualPrice)return;
  try{
    var r=await fetch('/api/portfolio/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,qty:parseInt(qty),price:parseFloat(actualPrice)})});
    var d=await r.json();
    if(d.error){alert(d.error);return;}
    alert('✅ Added! New avg: ₹'+d.newAvg.toFixed(0)+', Total qty: '+d.newQty);
    psLoadPositions();
  }catch(e){alert('Error: '+e.message);}
}

function psStartAutoRefresh(){
  if(_psRefreshInt) clearInterval(_psRefreshInt);
  _psRefreshInt=setInterval(function(){
    if(!_psData)return;
    psRefresh();
    // Also refresh holdings if on that tab
    if(_psTab==='holdings') psLoadPositions();
  }, 60000);
  // Full regeneration every hour
  setInterval(function(){
    if(!_psData)return;
    psRegenerate();
  }, 3600000);
}

var _adminPollTimer = null;
var _adminLogTimer  = null;
var _adminLogSince  = 0;

function adminLog(msg, level) {
  var el = document.getElementById('admin-log');
  if (!el) return;
  var t   = new Date().toLocaleTimeString('en-IN');
  var col = level === 'error' ? '#f87171' : level === 'warn' ? '#fbbf24' : '#94a3b8';
  var atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 20;
  el.innerHTML += '<div style="color:'+col+'"><span style="color:#475569">['+t+']</span> '+msg.replace(/</g,'&lt;')+'</div>';
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function adminClearLog() {
  var el = document.getElementById('admin-log');
  if (el) el.innerHTML = '';
}

function adminScrollLog() {
  var el = document.getElementById('admin-log');
  if (el) el.scrollTop = el.scrollHeight;
}

function adminStartLogPoll() {
  if (_adminLogTimer) clearInterval(_adminLogTimer);
  _adminLogSince = Date.now() - 60000; // start with last 60s of logs
  adminFetchLogs(true); // immediate first fetch
  _adminLogTimer = setInterval(adminFetchLogs, 3000); // poll every 3s
}

async function adminFetchLogs(initial) {
  var statusEl = document.getElementById('log-status');
  try {
    var r = await fetch('/api/admin/logs?since='+_adminLogSince);
    var d = await r.json();
    if (d.lines && d.lines.length) {
      d.lines.forEach(function(l) { adminLog(l.msg, l.level); });
      _adminLogSince = d.now;
    }
    if (statusEl) statusEl.textContent = '● Live';
    if (statusEl) statusEl.style.color = '#10b981';
  } catch(e) {
    if (statusEl) { statusEl.textContent = '○ Disconnected'; statusEl.style.color = '#ef4444'; }
  }
}

async function adminLoadStatus() {
  var el = document.getElementById('admin-status');
  if (!el) return;
  try {
    var [univ, scr, score] = await Promise.all([
      fetch('/api/universe/status').then(r=>r.json()).catch(()=>({})),
      fetch('/api/screener/status').then(r=>r.json()).catch(()=>({})),
      fetch('/api/stocks/score').then(r=>r.json()).catch(()=>({})),
    ]);
    var scrRunning = scr.running;
    var scrMode    = scr.last_fetch?.mode === 'bulk' ? '🚀 Bulk' : '📡 Per-stock';
    var scrVal     = scrRunning
      ? '⏳ '+scr.progress?.done+'/'+scr.progress?.total+' ('+scr.progress?.errors+' err)'
      : (scr.db_total||0)+' stocks';
    var scrSub     = scrRunning ? 'Running '+scrMode+'...'
      : scr.db_last_import ? new Date(scr.db_last_import).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
      : 'Never run';
    var scoreCount = score.stocks ? score.stocks.length : 0;

    el.innerHTML =
      adminCard('🌐 Universe', (univ.total||0)+' stocks', univ.status||'Not loaded', '#3b82f6') +
      adminCard('📊 Screener '+scrMode, scrVal, scrSub, scrRunning?'#f59e0b':'#10b981') +
      adminCard('⚡ Scored', score.loading?'⏳ Scoring...':scoreCount+' stocks', score.loading?'Fetching Kite candles...':score.last_scored||'–', '#10b981') +
      adminCard('💾 In Memory', (scr.in_memory||0)+' fundamental', 'Loaded from screener_fundamentals', '#8b5cf6');

    // Auto-poll while anything is running
    if (scrRunning || score.loading) {
      if (!_adminPollTimer) {
        _adminPollTimer = setInterval(adminLoadStatus, 5000);
      }
    } else {
      if (_adminPollTimer) {
        clearInterval(_adminPollTimer);
        _adminPollTimer = null;
      }
    }
  } catch(e) {
    el.innerHTML = '<div style="color:#ef4444;font-size:11px;padding:12px">Status load error: '+e.message+'</div>';
  }
}

function adminCard(title, value, sub, color) {
  return '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px">'
    +'<div style="font-size:10px;color:var(--text3);margin-bottom:4px">'+title+'</div>'
    +'<div style="font-size:15px;font-weight:700;color:'+color+';margin-bottom:2px">'+value+'</div>'
    +'<div style="font-size:10px;color:var(--text4)">'+sub+'</div>'
    +'</div>';
}

async function adminRun(op) {
  var tagEl = document.getElementById('ar-'+op);
  if (tagEl) { tagEl.textContent = '⏳ Starting...'; tagEl.style.color = '#f59e0b'; }
  var endpoints = {
    universe: '/api/universe/refresh',
    screener: '/api/screener/fetch',
    rescore:  '/api/stocks/rescore',
    mfcache:  '/api/mf/rebuild-cache',
  };
  try {
    var r = await fetch(endpoints[op], {method:'POST'});
    var d = await r.json();
    if (tagEl) { tagEl.textContent = '✓ '+( d.message||'Started').slice(0,40); tagEl.style.color = '#10b981'; }
    setTimeout(adminLoadStatus, 2000);
    if (_adminPollTimer) clearInterval(_adminPollTimer);
    _adminPollTimer = setInterval(adminLoadStatus, 5000);
  } catch(e) {
    if (tagEl) { tagEl.textContent = '❌ '+e.message.slice(0,40); tagEl.style.color = '#ef4444'; }
  }
}

async function adminRunAll() {
  await adminRun('universe');
  await new Promise(r=>setTimeout(r,12000));
  await adminRun('rescore');
  await adminRun('mfcache');
  await new Promise(r=>setTimeout(r,2000));
  await adminRun('screener');
}

// Preload MiroFish lookup data (non-blocking)
async function loadMiroFishLookup() {
  try {
    const r = await fetch('/api/mirofish/status');
    if (r.ok) { const d = await r.json(); window._mfishStatus = d; }
  } catch(e) { /* non-critical — MiroFish loads on demand */ }
}

function _init() {
  // Load MiroFish lookup silently on startup (reads from DB, no Anthropic call)
  setTimeout(loadMiroFishLookup, 2000);
  // Start with MF Recommendation - loads instantly from in-memory cache
  try { setMode("mf"); } catch(e){ console.error('setMode error:', e); }
  try { fetchAll(); } catch(e){}
  try { fetchCryptoPrices(); } catch(e){}
  setInterval(function(){ try{ fetchAll(); }catch(e){} }, 15000);
  setInterval(function(){ try{ fetchCryptoPrices(); }catch(e){} }, 30000);
}

_init();


function checkAccess(mode) {
  if (_unlocked) {
    setMode(mode);
    return;
  }
  _pendingMode = mode;
  var modal = document.getElementById('passcode-modal');
  var input = document.getElementById('passcode-input');
  var err   = document.getElementById('passcode-error');
  modal.style.display = 'flex';
  err.style.display   = 'none';
  input.value = '';
  setTimeout(function(){ input.focus(); }, 100);
}

function submitPasscode() {
  var input = document.getElementById('passcode-input');
  var err   = document.getElementById('passcode-error');
  if (input.value === 'Letmeenter@1') {
    _unlocked = true;
    closePasscode();
    document.getElementById('mode-stocks').textContent = 'Stocks';
    document.getElementById('mode-crypto').textContent = 'Crypto';
    document.getElementById('mode-stocks').onclick = function(){ setMode('stocks'); };
    document.getElementById('mode-crypto').onclick = function(){ setMode('crypto'); };
    // Unlock admin tab too
    var adminBtn = document.getElementById('mode-admin');
    if (adminBtn) {
      adminBtn.onclick = function(){ setMode('admin'); };
      adminBtn.style.color = '#f59e0b';
    }
    if (_pendingMode) setMode(_pendingMode);
  } else {
    err.style.display = 'block';
    input.value = '';
    input.focus();
    // Shake animation
    input.style.border = '1.5px solid var(--red)';
    setTimeout(function(){ input.style.border = '1px solid var(--border)'; }, 1500);
  }
}

function closePasscode() {
  document.getElementById('passcode-modal').style.display = 'none';
  _pendingMode = null;
}

// Close on backdrop click - use event delegation since modal is after script
document.addEventListener('click', function(e){
  var modal = document.getElementById('passcode-modal');
  if(modal && e.target === modal) closePasscode();
});

// -- Passcode gate for Stocks & Crypto -----------------------------------------
var _unlocked = false;
var _pendingMode = null;
</script>
<!-- Passcode Modal -->
<div id="passcode-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <div style="font-size:36px;margin-bottom:12px">🔒</div>
    <div style="font-weight:700;font-size:16px;margin-bottom:6px">Private Section</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:24px;line-height:1.6">This section is restricted.<br>Enter passcode to unlock Stocks, Crypto & Admin.</div>
    <input id="passcode-input" type="password" placeholder="Enter passcode"
      style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:10px;text-align:center;letter-spacing:2px"
      onkeydown="if(event.key==='Enter')submitPasscode()"/>
    <div id="passcode-error" style="display:none;color:var(--red);font-size:11px;margin-bottom:10px">❌ Incorrect passcode. Try again.</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="closePasscode()" style="flex:1;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px">Cancel</button>
      <button onclick="submitPasscode()" style="flex:1;padding:9px;background:var(--blue);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-weight:600">Unlock</button>
    </div>
    <div style="margin-top:16px;font-size:10px;color:var(--text4)">Mutual Funds section is always accessible.</div>
  </div>
</div>

</div>
